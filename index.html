<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=Noto+Sans+Telugu:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EC;
    --paper:#FFFDF8;
    --maroon:#7A2048;
    --maroon-deep:#551531;
    --marigold:#E8871E;
    --marigold-light:#F7B155;
    --gold:#C79A2E;
    --ink:#3A2A1E;
    --ink-soft:#6B5B4E;
    --line:#EAD9BC;
    --good:#3F7D4F;
    --bad:#B54834;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 12% 8%, rgba(232,135,30,0.10), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(122,32,72,0.08), transparent 45%),
      var(--cream);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:28px 18px 60px;}

  header{text-align:center;margin-bottom:22px;}
  .diya{width:46px;height:46px;margin:0 auto 8px;display:block;}
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:2.1rem;
    margin:0 0 4px;
    color:var(--maroon-deep);
    letter-spacing:0.2px;
  }
  .tagline{color:var(--ink-soft);font-size:0.95rem;margin:0;}

  /* Language toggle */
  .lang-row{display:flex;justify-content:center;gap:8px;margin:18px 0 22px;flex-wrap:wrap;}
  .lang-btn{
    border:1.5px solid var(--line);
    background:var(--paper);
    color:var(--ink-soft);
    padding:7px 16px;
    border-radius:999px;
    font-family:'Work Sans',sans-serif;
    font-size:0.88rem;
    font-weight:600;
    cursor:pointer;
    transition:all .15s ease;
  }
  .lang-btn.active{
    background:var(--maroon);
    border-color:var(--maroon);
    color:#fff;
  }
  .lang-btn:focus-visible{outline:2px solid var(--marigold);outline-offset:2px;}

  /* Festival dropdown */
  .fest-select-row{margin-bottom:20px;}
  .calendar-year-label{
    text-align:center;
    font-size:0.78rem;
    font-weight:600;
    color:var(--gold);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin:0 0 8px;
  }
  #festSelect{
    width:100%;
    padding:13px 16px;
    border-radius:12px;
    border:1.5px solid var(--line);
    background:var(--paper);
    color:var(--maroon-deep);
    font-family:'Work Sans',sans-serif;
    font-weight:600;
    font-size:0.95rem;
    cursor:pointer;
    appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--marigold) 50%), linear-gradient(135deg, var(--marigold) 50%, transparent 50%);
    background-position: calc(100% - 22px) center, calc(100% - 15px) center;
    background-size: 7px 7px, 7px 7px;
    background-repeat: no-repeat;
  }
  #festSelect:focus-visible{outline:2px solid var(--maroon);outline-offset:2px;}

  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:18px;
    padding:26px 24px;
    box-shadow:0 4px 18px rgba(122,32,72,0.06);
  }
  .icon-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:10px;
  }
  .icon-wrap svg{width:64px;height:64px;}
  .festival-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:1.5rem;
    color:var(--maroon);
    margin:0 0 2px;
  }
  .festival-sub{
    color:var(--ink-soft);
    font-size:0.85rem;
    margin:0 0 18px;
    font-style:italic;
  }

  .section{margin-bottom:22px;}
  .section:last-child{margin-bottom:0;}
  .section-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Work Sans',sans-serif;
    font-weight:700;
    font-size:0.78rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--gold);
    margin-bottom:8px;
  }
  .section-label .rule{flex:1;height:1px;background:var(--line);}
  .section p{
    margin:0;
    line-height:1.65;
    font-size:1rem;
    color:var(--ink);
  }
  [lang="te"] p, [lang="ta"] p, [lang="hi"] p, [lang="te"] .festival-title, [lang="ta"] .festival-title, [lang="hi"] .festival-title,
  [lang="te"] .qtext, [lang="ta"] .qtext, [lang="hi"] .qtext, [lang="te"] .opt, [lang="ta"] .opt, [lang="hi"] .opt{
    font-family:'Noto Sans Telugu','Noto Sans Tamil','Noto Sans Devanagari','Work Sans',sans-serif;
    line-height:1.9;
  }
  [lang="ta"] p, [lang="ta"] .festival-title, [lang="ta"] .qtext, [lang="ta"] .opt{
    font-family:'Noto Sans Tamil','Work Sans',sans-serif;
  }
  [lang="hi"] p, [lang="hi"] .festival-title, [lang="hi"] .qtext, [lang="hi"] .opt{
    font-family:'Noto Sans Devanagari','Work Sans',sans-serif;
  }

  /* Shloka box */
  .shloka-box{
    background:linear-gradient(135deg, rgba(122,32,72,0.05), rgba(232,135,30,0.06));
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 20px;
  }
  .shloka-sanskrit{
    font-family:'Noto Sans Telugu','Work Sans',sans-serif;
    font-size:1.08rem;
    color:var(--maroon-deep);
    line-height:1.9;
    margin:0 0 8px;
    font-weight:600;
  }
  .shloka-translit{
    font-style:italic;
    color:var(--ink-soft);
    font-size:0.92rem;
    margin:0 0 10px;
    line-height:1.6;
  }
  .shloka-meaning{
    font-size:0.94rem;
    color:var(--ink);
    margin:0;
    line-height:1.6;
    border-top:1px dashed var(--line);
    padding-top:10px;
  }

  /* Quiz */
  .quiz-q{margin-bottom:18px;}
  .quiz-q:last-child{margin-bottom:0;}
  .qtext{font-weight:600;margin:0 0 10px;line-height:1.5;}
  .opts{display:grid;gap:8px;}
  .opt{
    text-align:left;
    padding:11px 14px;
    border-radius:10px;
    border:1.5px solid var(--line);
    background:#fff;
    cursor:pointer;
    font-size:0.95rem;
    color:var(--ink);
    transition:all .12s ease;
    font-family:inherit;
  }
  .opt:hover{border-color:var(--marigold);}
  .opt:focus-visible{outline:2px solid var(--maroon);outline-offset:2px;}
  .opt.correct{background:rgba(63,125,79,0.12);border-color:var(--good);color:var(--good);font-weight:600;}
  .opt.wrong{background:rgba(181,72,52,0.10);border-color:var(--bad);color:var(--bad);}
  .opt[disabled]{cursor:default;}
  .feedback{
    margin-top:8px;
    font-size:0.88rem;
    color:var(--ink-soft);
    min-height:1.2em;
  }
  .quiz-score{
    text-align:center;
    margin-top:16px;
    padding-top:16px;
    border-top:1px dashed var(--line);
    font-weight:600;
    color:var(--maroon);
    display:none;
  }
  .quiz-score.show{display:block;}
  .reset-btn{
    display:block;
    margin:10px auto 0;
    background:none;
    border:1.5px solid var(--maroon);
    color:var(--maroon);
    padding:6px 16px;
    border-radius:999px;
    font-size:0.82rem;
    font-weight:600;
    cursor:pointer;
    font-family:'Work Sans',sans-serif;
  }

  footer{text-align:center;margin-top:22px;color:var(--ink-soft);font-size:0.78rem;}

  @media (max-width:480px){
    .card{padding:20px 16px;}
    h1{font-size:1.7rem;}
    .tab{font-size:0.78rem;padding:10px 4px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="diya" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">

      <path d="M8 34c0 6 7.2 8 16 8s16-2 16-8" stroke="#7A2048" stroke-width="1.5" fill="none"/>
      <path id="flame" d="M24 10c-3 5-5 8-5 12a5 5 0 0010 0c0-4-2-7-5-12z" fill="#E8871E">

          values="M24 10c-3 5-5 8-5 12a5 5 0 0010 0c0-4-2-7-5-12z;

    <h1>Festival Companion</h1>
    <p class="tagline">Stories, sevens, and slokas for our family, before every temple visit</p>
  </header>

  <div class="lang-row" role="group" aria-label="Choose language">
    <button class="lang-btn active" data-lang="en">English</button>
    <button class="lang-btn" data-lang="hi">हिंदी</button>
    <button class="lang-btn" data-lang="te">తెలుగు</button>
    <button class="lang-btn" data-lang="ta">தமிழ்</button>
  </div>

  <div class="fest-select-row">
    <p class="calendar-year-label" id="calendarYearLabel"></p>
    <select id="festSelect" aria-label="Choose festival"></select>
  </div>

  <div class="card" id="cardRoot" lang="en"></div>

  <footer>Made with love for our kids, check with an elder or priest before treating this as final word 🙏</footer>
</div>

      title: "மகா சிவராத்திரி",
      sub: "சிவனின் மாபெரும் இரவு",
      story: "பண்டைக் காலத்தில் தேவர்களும் அசுரர்களும் இணைந்து அமிர்தத்திற்காக பாற்கடலைக் கடைந்தனர். அமிர்தம் வருவதற்கு முன், உலகையே அழிக்கக்கூடிய ஆலகால விஷம் தோன்றியது. அனைவரும் பயந்தபோது, சிவன் முன் வந்தார். உலகைக் காக்க சிவன் அந்த விஷத்தைத் தானே அருந்தினார். ஆனால் அதை விழுங்காமல், தன் தொண்டையிலேயே தேக்கி வைத்தார், உடலுக்கும் தீங்கு வராமல், உலகிற்கும் தீங்கு வராமல். அந்த விஷம் மிகவும் சக்திவாய்ந்ததால் அவரது தொண்டை நீலமாக மாறியது, அதனால்தான் சிவனை நீலகண்டன் என்றும் அழைக்கிறோம். தேவர்களும் பார்வதி தேவியும் அன்றிரவு முழுவதும் விழித்திருந்து அவரைப் பாதுகாத்து பிரார்த்தனை செய்தனர். அதனால்தான் மகா சிவராத்திரி அன்று பக்தர்களும் இரவு முழுவதும் விழித்திருக்கிறார்கள், உலகைக் காக்க சிவன் விஷத்தை ஏற்ற அந்த இரவை நினைவுகூர்ந்து.",
      temple: "சிவாலயத்தில் அர்ச்சகர்கள் இரவு முழுவதும் அபிஷேகம் செய்கிறார்கள், பால், நீர், தேன், வில்வ இலைகளால் சிவலிங்கத்திற்கு விடியும் வரை சில மணி நேரங்களுக்கு ஒருமுறை அபிஷேகம் செய்யப்படுகிறது. பக்தர்கள் 'ஓம் நமசிவாய' என்று ஜபித்து, பலர் விரதம் இருந்து இரவு முழுவதும் விழித்து பிரார்த்தனை செய்கின்றனர்.",
      why: "இரவு முழுவதும் விழித்திருப்பது, உலகம் முழுவதும் காக்கப்பட்ட அந்த இரவை நினைவூட்டுகிறது. விலையுயர்ந்தவற்றிற்குப் பதிலாக வில்வ இலைகள், பால், நீர் போன்ற எளிமையானவற்றை வழங்குவது, பக்தி என்பது விலையுயர்ந்த பரிசு அல்ல, மனமார்ந்த சமர்ப்பணம் என்பதை நினைவூட்டுகிறது.",
      shlokaSanskrit: "ॐ त्र्यम्बकं यजामहे सुगन्धिं पुष्टिवर्धनम् ।\nउर्वारुकमिव बन्धनान्मृत्योर्मुक्षीय मामृतात् ॥",
      shlokaTranslit: "ஓம் த்ர்யம்பகம் யஜாமஹே சுகந்திம் புஷ்டிவர்தனம்,\nஉர்வாருகமிவ பந்தனான் ம்ரித்யோர் முக்ஷீய மாம்ருதாத்",
      shlokaMeaning: "வளர்த்து பராமரிக்கும் முக்கண் சிவனை நாம் வழிபடுகிறோம். பழுத்த பழம் கொடியிலிருந்து எளிதில் விழுவது போல, அவர் நம்மை பயம் மற்றும் கஷ்டங்களின் பிணைப்புகளிலிருந்து விடுவித்து, நிலையானதை நோக்கி நடத்தட்டும்.",
      quiz: [
        {q:"விஷத்திலிருந்து உலகைக் காக்க சிவன் என்ன செய்தார்?", opts:["கடலில் எறிந்தார்","தொண்டையில் தேக்கி வைத்தார்","அசுரனுக்குக் கொடுத்தார்"], a:1},
        {q:"சிவனை 'நீலகண்டன்' என்று ஏன் அழைக்கிறோம்?", opts:["நீல கிரீடம் அணிவார்","விஷத்தால் தொண்டை நீலமானது","நீல நதி அருகில் வசிக்கிறார்"], a:1},
        {q:"அபிஷேகத்தின்போது சிவனுக்கு என்ன வழங்கப்படுகிறது?", opts:["பூக்கள் மட்டும்","பால், நீர், தேன், வில்வ இலைகள்","இனிப்புகள் மட்டும்"], a:1},
        {q:"மகா சிவராத்திரி அன்று பக்தர்கள் இரவு முழுவதும் என்ன செய்கிறார்கள்?", opts:["சீக்கிரம் தூங்குவார்கள்","விழித்திருந்து பிரார்த்திப்பார்கள்","வீடு திரும்புவார்கள்"], a:1}
      ]
    },
    hi: {
      title: "महाशिवरात्रि",
      sub: "भगवान शिव की महान रात्रि",
      story: "कई साल पहले, देवताओं और असुरों ने मिलकर अमृत की तलाश में समुद्र मंथन किया। अमृत निकलने से पहले, एक भयंकर विष निकला जो पूरी दुनिया को नष्ट कर सकता था। सब डर गए, तभी भगवान शिव आगे आए। दुनिया को बचाने के लिए शिव ने खुद वह विष पी लिया। लेकिन उन्होंने इसे निगला नहीं, इसे अपने गले में ही रोक लिया, ताकि यह न तो उनके शरीर को नुकसान पहुँचाए और न ही दुनिया को। विष इतना शक्तिशाली था कि उनका गला नीला पड़ गया, इसीलिए शिव को नीलकंठ भी कहा जाता है। देवता और माता पार्वती पूरी रात जागकर उनकी रक्षा करते और प्रार्थना करते रहे। इसीलिए महाशिवरात्रि पर भक्त भी पूरी रात जागते हैं, उस रात को याद करते हुए जब शिव ने पूरी दुनिया को बचाने के लिए विष अपनाया था।",
      temple: "शिवालय में पुजारी पूरी रात अभिषेक करते हैं, दूध, जल, शहद और बिल्व पत्तों से शिवलिंग का हर कुछ घंटों में अभिषेक किया जाता है, जब तक सुबह न हो जाए। भक्त 'ॐ नमः शिवाय' का जाप करते हैं और कई लोग व्रत रखकर पूरी रात जागते हैं।",
      why: "पूरी रात जागना हमें उस रात की याद दिलाता है जब पूरी दुनिया की रक्षा की गई थी। महंगी चीज़ों की जगह बिल्व पत्र, दूध और जल जैसी सामान्य चीज़ें अर्पित करना यह याद दिलाता है कि भक्ति महंगे उपहार में नहीं, सच्चे मन में होती है।",
      shlokaSanskrit: "ॐ त्र्यम्बकं यजामहे सुगन्धिं पुष्टिवर्धनम् ।\nउर्वारुकमिव बन्धनान्मृत्योर्मुक्षीय मामृतात् ॥",
      shlokaTranslit: null,
      shlokaMeaning: "हम त्रिनेत्रधारी शिव की पूजा करते हैं, जो सभी प्राणियों का पोषण करते हैं। जैसे पका हुआ फल आसानी से बेल से गिर जाता है, वैसे ही वे हमें भय और कठिनाइयों के बंधन से मुक्त करें और शाश्वत की ओर ले जाएं।",
      quiz: [
        {q:"संसार को विष से बचाने के लिए शिव ने क्या किया?", opts:["समुद्र में फेंक दिया","गले में रोक लिया","असुर को दे दिया"], a:1},
        {q:"शिव को 'नीलकंठ' क्यों कहा जाता है?", opts:["नीला मुकुट पहनते हैं","विष से गला नीला पड़ गया","नीली नदी के पास रहते हैं"], a:1},
        {q:"अभिषेक में शिव को क्या अर्पित किया जाता है?", opts:["केवल फूल","दूध, जल, शहद, बिल्व पत्र","केवल मिठाई"], a:1},
        {q:"महाशिवरात्रि पर भक्त रातभर क्या करते हैं?", opts:["जल्दी सो जाते हैं","जागकर प्रार्थना करते हैं","घर लौटते हैं"], a:1}
      ]
    }
  },

  ramanavami: {
    en: {
      title: "Sri Rama Navami",
      sub: "The birthday of Lord Rama",
      story: "In the ancient city of Ayodhya, King Dasharatha had no children for a long time, so he performed a special yagna (a sacred fire ceremony) asking the gods for a son. Soon after, his queen Kausalya gave birth to a baby boy, Rama, an avatar of Lord Vishnu, sent to earth to defeat the demon king Ravana and show the world what it means to live with truth and honor. Rama grew up to be brave, kind, and always kept his word, even when it was hard. When his father had promised the throne to Rama but was forced to send him to the forest for 14 years instead, Rama didn't argue or get angry, he calmly accepted it, because he'd rather keep his father's promise than fight for a crown. Years later, Rama fought and defeated Ravana to rescue his wife Sita, the very story we remember on Dussehra. Rama Navami is the day we celebrate his birth: a reminder that even a king's son chose truth and duty over comfort and power.",
      temple: "The temple performs a special abhishekam for Lord Rama, along with Sita, Lakshmana, and Hanuman, often around midday, the time Rama is believed to have been born. Devotees sing bhajans retelling stories from the Ramayana, and some temples hold a symbolic 'Sri Rama Pattabhishekam', Rama's coronation ceremony.",
      why: "We remember Rama's birthday to remind ourselves that being a good person, keeping promises, being fair, being patient, matters more than having power or comfort. Even though Rama was a prince, he chose to do the right thing, not just the easy thing.",
      shlokaSanskrit: "श्री राम राम रामेति रमे रामे मनोरमे ।\nसहस्रनाम तत्तुल्यं राम नाम वरानने ॥",
      shlokaTranslit: "Shri Rama Rama Rameti, Rame Rame Manorame,\nSahasranama Tattulyam, Rama Nama Varanane",
      shlokaMeaning: "I delight again and again in chanting the name of Rama, that most beautiful and pleasing name. O fair one, the single name 'Rama' is equal in power to chanting a thousand names of God.",

        {q:"What ceremony do some temples symbolically perform on Rama Navami?", opts:["Rama's coronation (Pattabhishekam)","Rama's wedding","Rama's farewell"], a:0}

    te: {
      title: "శ్రీరామ నవమి",
      sub: "శ్రీరాముని జన్మదినం",
      story: "పురాతన అయోధ్య నగరంలో దశరథ మహారాజుకు చాలాకాలం సంతానం లేకపోవడంతో, ఒక కుమారుని కోసం దేవతలను వేడుకుంటూ ప్రత్యేక యజ్ఞం చేశాడు. కొంతకాలానికి అతని భార్య కౌసల్య ఒక కుమారుడిని కన్నది, విష్ణువు అవతారమైన రాముడు, రావణుడిని సంహరించి, సత్యం, గౌరవంతో జీవించడం అంటే ఏమిటో లోకానికి చూపించడానికి భూమిపైకి వచ్చినవాడు. రాముడు ధైర్యవంతుడిగా, దయగలవాడిగా పెరిగాడు, కష్టమైనా ఎప్పుడూ తన మాటను నిలబెట్టుకునేవాడు. తండ్రి రాజ్యాన్ని రామునికి ఇస్తానని వాగ్దానం చేసినా, ఆ తర్వాత 14 సంవత్సరాలు అడవికి పంపవలసి వచ్చినప్పుడు, రాముడు వాదించలేదు, కోపగించలేదు, శాంతంగా అంగీకరించాడు, ఎందుకంటే కిరీటం కోసం పోరాడటం కంటే తండ్రి మాటను నిలబెట్టడమే మేలని అతని నమ్మకం. సంవత్సరాల తర్వాత, రాముడు తన భార్య సీతను రక్షించడానికి రావణుడిని ఎదుర్కొని సంహరించాడు, ఇదే మనం దసరా నాడు గుర్తుచేసుకునే కథ. రాజకుమారుడైనా సౌకర్యం, అధికారం కంటే సత్యం, కర్తవ్యాన్ని ఎంచుకున్నాడని గుర్తుచేసేదే రామనవమి.",
      temple: "రాముడు జన్మించాడని నమ్మే మధ్యాహ్న సమయంలో, సీత, లక్ష్మణ, హనుమంతులతో పాటు శ్రీరామునికి ప్రత్యేక అభిషేకం జరుగుతుంది. భక్తులు రామాయణ కథలను తెలిపే భజనలు పాడతారు, కొన్ని దేవాలయాల్లో సంకేతాత్మకంగా 'శ్రీరామ పట్టాభిషేకం' జరుపుతారు.",
      why: "అధికారం, సౌకర్యం కంటే మంచి వ్యక్తిగా ఉండటం, మాట నిలబెట్టుకోవడం, న్యాయంగా ఉండటం, ఓర్పుగా ఉండటం, ఎక్కువ ముఖ్యమని గుర్తుచేసుకోవడానికి మనం రాముని జన్మదినాన్ని గుర్తుచేసుకుంటాము. రాజకుమారుడైనా, రాముడు సులభమైనది కాదు, సరైనది చేయాలని ఎంచుకున్నాడు.",
      shlokaSanskrit: "श्री राम राम रामेति रमे रामे मनोरमे ।\nसहस्रनाम तत्तुल्यं राम नाम वरानने ॥",
      shlokaTranslit: "శ్రీ రామ రామ రామేతి, రమే రామే మనోరమే,\nసహస్రనామ తత్తుల్యం, రామ నామ వరాననే",
      shlokaMeaning: "అందమైన, ఆనందాన్నిచ్చే రాముని పేరును పదేపదే ఉచ్చరించడంలో నేను ఆనందిస్తాను. ఓ సుందరీ, 'రామ' అనే ఒక్క పేరు వెయ్యి దేవుని నామాలు జపించినంత శక్తివంతమైనది.",
      quiz: [
        {q:"దశరథ మహారాజు ఎందుకు ప్రత్యేక యజ్ఞం చేశాడు?", opts:["వర్షం కోసం","కుమారుని కోసం దేవతలను వేడుకోవడానికి","యుద్ధ విజయాన్ని జరుపుకోవడానికి"], a:1},
        {q:"రాముడు ఎవరి అవతారం?", opts:["శివుడు","విష్ణువు","బ్రహ్మ"], a:1},
        {q:"రాజు కావాల్సిన రాముడిని 14 సంవత్సరాలు అడవికి పంపినప్పుడు అతను ఏమి చేశాడు?", opts:["తండ్రితో వాదించాడు","తండ్రి మాటను నిలబెట్టడానికి శాంతంగా అంగీకరించాడు","వేరే రాజ్యానికి పారిపోయాడు"], a:1},
        {q:"రామనవమి నాడు కొన్ని దేవాలయాలు సంకేతాత్మకంగా ఏ వేడుక చేస్తాయి?", opts:["రామ పట్టాభిషేకం","రాముని వివాహం","రాముని వీడ్కోలు"], a:0}
      ]
    },
    ta: {
      title: "ஸ்ரீ ராம நவமி",
      sub: "ராமரின் பிறந்த நாள்",
      story: "பண்டைய அயோத்தி நகரில் தசரத மன்னருக்கு நீண்ட காலமாக குழந்தைகள் இல்லாததால், ஒரு மகனுக்காக தேவர்களை வேண்டி ஒரு சிறப்பு யாகம் செய்தார். சிறிது காலத்திற்குப் பிறகு, அவரது மனைவி கௌசல்யா ஒரு மகனைப் பெற்றெடுத்தார், விஷ்ணுவின் அவதாரமான ராமர், இராவணனை வெல்ல, உண்மையுடனும் மரியாதையுடனும் வாழ்வது என்றால் என்ன என்பதை உலகிற்குக் காட்ட பூமிக்கு வந்தவர். ராமர் தைரியமும் இரக்கமும் கொண்டவராக வளர்ந்தார், கடினமாக இருந்தாலும் எப்போதும் தன் வார்த்தையை காப்பாற்றினார். தந்தை அரியணையை ராமருக்கு வாக்களித்திருந்தும், அதற்குப் பதிலாக 14 ஆண்டுகள் காட்டிற்கு அனுப்ப வேண்டிய கட்டாயம் ஏற்பட்டபோது, ராமர் வாதிடவும் இல்லை, கோபப்படவும் இல்லை, அமைதியாக ஏற்றுக்கொண்டார், ஏனெனில் அரியணைக்காகப் போராடுவதை விட தந்தையின் வாக்கைக் காப்பாற்றுவதே சிறந்தது என்று அவர் நம்பினார். பல ஆண்டுகளுக்குப் பிறகு, தன் மனைவி சீதையை மீட்க ராமர் இராவணனை எதிர்த்து வென்றார், இதுவே தசரா அன்று நாம் நினைவுகூரும் கதை. இளவரசராக இருந்தும் வசதியையும் அதிகாரத்தையும் விட உண்மையையும் கடமையையும் தேர்ந்தெடுத்தார் என்பதை நினைவூட்டுவதே ராம நவமி.",
      temple: "ராமர் பிறந்ததாக நம்பப்படும் நண்பகல் நேரத்தில், சீதை, லக்ஷ்மணன், அனுமனுடன் சேர்த்து ராமருக்கு சிறப்பு அபிஷேகம் நடைபெறுகிறது. பக்தர்கள் ராமாயண கதைகளைச் சொல்லும் பஜனைகளைப் பாடுகிறார்கள், சில கோயில்களில் சின்னமாக 'ஸ்ரீ ராம பட்டாபிஷேகம்' கொண்டாடப்படுகிறது.",
      why: "அதிகாரத்தையும் வசதியையும் விட நல்லவராக இருப்பது, வாக்கைக் காப்பாற்றுவது, நியாயமாக இருப்பது, பொறுமையாக இருப்பது, முக்கியம் என்பதை நினைவூட்ட நாம் ராமரின் பிறந்த நாளை நினைவுகூர்கிறோம். இளவரசராக இருந்தும், ராமர் எளிதானதை அல்ல, சரியானதைத் தேர்ந்தெடுத்தார்.",
      shlokaSanskrit: "श्री राम राम रामेति रमे रामे मनोरमे ।\nसहस्रनाम तत्तुल्यं राम नाम वरानने ॥",
      shlokaTranslit: "ஸ்ரீ ராம ராம ராமேதி, ரமே ராமே மனோரமே,\nஸஹஸ்ரநாம தத்துல்யம், ராம நாம வராननே",
      shlokaMeaning: "அழகான, மகிழ்ச்சி தரும் ராமனின் பெயரை மீண்டும் மீண்டும் உச்சரிப்பதில் நான் மகிழ்கிறேன். அழகியே, 'ராமா' என்ற ஒரே பெயர் ஆயிரம் தெய்வ நாமங்களை உச்சரிப்பதற்குச் சமமான சக்தி வாய்ந்தது.",
      quiz: [
        {q:"தசரத மன்னர் ஏன் ஒரு சிறப்பு யாகம் செய்தார்?", opts:["மழைக்காக","ஒரு மகனுக்காக தேவர்களை வேண்ட","போர் வெற்றியைக் கொண்டாட"], a:1},
        {q:"ராமர் யாருடைய அவதாரம்?", opts:["சிவன்","விஷ்ணு","பிரம்மா"], a:1},
        {q:"அரசராகாமல் 14 ஆண்டுகள் காட்டிற்கு அனுப்பப்பட்டபோது ராமர் என்ன செய்தார்?", opts:["தந்தையுடன் வாதிட்டார்","தந்தையின் வாக்கைக் காப்பாற்ற அமைதியாக ஏற்றார்","வேறு ராஜ்யத்திற்கு ஓடினார்"], a:1},
        {q:"ராம நவமி அன்று சில கோயில்கள் சின்னமாக எந்த விழாவை கொண்டாடுகின்றன?", opts:["ராம பட்டாபிஷேகம்","ராமரின் திருமணம்","ராமரின் பிரியாவிடை"], a:0}
      ]
    },
    hi: {
      title: "श्री रामनवमी",
      sub: "भगवान राम का जन्मदिन",
      story: "प्राचीन नगरी अयोध्या में राजा दशरथ को लंबे समय तक कोई संतान नहीं थी, इसलिए उन्होंने एक पुत्र पाने के लिए देवताओं से प्रार्थना करते हुए एक विशेष यज्ञ किया। कुछ समय बाद उनकी रानी कौशल्या ने एक पुत्र को जन्म दिया, राम, जो भगवान विष्णु के अवतार थे, रावण का वध करने और सत्य व सम्मान से जीना क्या होता है यह दुनिया को दिखाने के लिए धरती पर आए थे। राम बड़े होकर बहादुर, दयालु बने और हमेशा अपनी बात निभाते थे, चाहे कितना भी कठिन क्यों न हो। जब उनके पिता ने राजगद्दी का वचन दिया था लेकिन बाद में उन्हें 14 वर्षों के लिए वन भेजना पड़ा, तो राम ने न बहस की, न गुस्सा किया, उन्होंने शांति से स्वीकार कर लिया, क्योंकि वे मुकुट के लिए लड़ने से बेहतर अपने पिता का वचन निभाना चाहते थे। वर्षों बाद, राम ने अपनी पत्नी सीता को बचाने के लिए रावण से युद्ध किया और उसे हराया, यही कहानी हम दशहरे पर याद करते हैं। रामनवमी वह दिन है जब हम उनके जन्म का उत्सव मनाते हैं: यह याद दिलाता है कि एक राजकुमार ने भी सुख और सत्ता से ज़्यादा सच्चाई और कर्तव्य को चुना।",
      temple: "मंदिर में भगवान राम के साथ सीता, लक्ष्मण और हनुमान का विशेष अभिषेक किया जाता है, अक्सर दोपहर के समय, जब माना जाता है कि राम का जन्म हुआ था। भक्त रामायण की कहानियाँ सुनाते हुए भजन गाते हैं, और कुछ मंदिरों में प्रतीकात्मक 'श्री राम पट्टाभिषेकम' (राम का राज्याभिषेक) मनाया जाता है।",
      why: "हम राम के जन्मदिन को याद करते हैं ताकि हमें याद रहे कि अच्छा इंसान होना, वचन निभाना, निष्पक्ष रहना, धैर्य रखना, सत्ता या सुख-सुविधा से ज़्यादा महत्वपूर्ण है। राजकुमार होते हुए भी, राम ने आसान रास्ता नहीं, सही रास्ता चुना।",
      shlokaSanskrit: "श्री राम राम रामेति रमे रामे मनोरमे ।\nसहस्रनाम तत्तुल्यं राम नाम वरानने ॥",
      shlokaTranslit: null,
      shlokaMeaning: "मैं बार-बार राम के नाम का जाप करने में आनंदित होता हूँ, जो सबसे सुंदर और मनभावन नाम है। हे सुंदरी, अकेला 'राम' नाम हज़ार ईश्वरीय नामों के जाप के समान शक्तिशाली है।",
      quiz: [
        {q:"राजा दशरथ ने विशेष यज्ञ क्यों किया?", opts:["वर्षा के लिए","पुत्र के लिए देवताओं से प्रार्थना","युद्ध विजय का उत्सव"], a:1},
        {q:"राम किसके अवतार थे?", opts:["शिव","विष्णु","ब्रह्मा"], a:1},
        {q:"जब राम को राजा बनने की बजाय 14 वर्ष वनवास जाना पड़ा, तो उन्होंने क्या किया?", opts:["पिता से बहस की","पिता का वचन निभाने के लिए शांति से स्वीकार किया","दूसरे राज्य भाग गए"], a:1},
        {q:"रामनवमी पर कुछ मंदिर प्रतीकात्मक रूप से कौन सा उत्सव मनाते हैं?", opts:["राम पट्टाभिषेकम","राम का विवाह","राम की विदाई"], a:0}
      ]
    }
  },

  ganeshchaturthi: {
    en: {
      title: "Ganesh Chaturthi (Vinayaka Chavithi)",
      sub: "The birthday of Lord Ganesha",
      story: "Goddess Parvati once wanted a guard to stand outside her door while she bathed, so no one would disturb her. She made a boy out of turmeric paste and brought him to life, telling him to let no one in. Soon after, Lord Shiva himself came home, but the boy, following his mother's instructions exactly, would not let even Shiva pass. Not knowing this was his own son, Shiva grew angry and, in the fight that followed, the boy lost his head. When Parvati saw what happened, she was heartbroken, and Shiva realized his mistake. To bring the boy back to life, Shiva sent his attendants to find a new head from the first creature they saw, and they returned with the head of an elephant. Shiva placed it on the boy and brought him back to life, naming him Ganesha, and declaring that he would be worshipped first, before any other god, at the start of anything new. That's why we always pray to Ganesha before starting something important, a new school year, a new house, even a new festival.",
      temple: "The temple installs and worships a Ganesha idol, often with abhishekam using coconut water, milk, and red flowers, which are considered his favorite. Devotees offer modakam (a sweet dumpling), said to be Ganesha's favorite food, and chant 'Om Gam Ganapataye Namaha' before starting any prayer.",
      why: "We pray to Ganesha first because he removes obstacles, so beginning anything, even a simple school day, with his blessing means starting with a clear, hopeful mind rather than worry. Offering his favorite modakam is our way of welcoming him with something we know brings him joy, just like we would for a guest we love.",
      shlokaSanskrit: "वक्रतुण्ड महाकाय सूर्यकोटि समप्रभ ।\nनिर्विघ्नं कुरु मे देव सर्वकार्येषु सर्वदा ॥",
      shlokaTranslit: "Vakratunda Mahakaya Suryakoti Samaprabha,\nNirvighnam Kuru Me Deva Sarva-karyeshu Sarvada",
      shlokaMeaning: "O Lord with the curved trunk and mighty body, whose brilliance equals a million suns, please make all my endeavors free of obstacles, always.",
      quiz: [
        {q:"What was the boy made from, before he came to life?", opts:["Clay","Turmeric paste","Wood"], a:1},
        {q:"Why didn't the boy let Shiva pass?", opts:["He didn't recognize him and was following his mother's instructions","He was scared","He was asleep"], a:0},
        {q:"What kind of new head did Ganesha receive?", opts:["A lion's head","A horse's head","An elephant's head"], a:2},
        {q:"What sweet is considered Ganesha's favorite food?", opts:["Modakam","Laddoo only","Halwa"], a:0}
      ]
    },
    te: {
      title: "వినాయక చవితి",
      sub: "గణేశుని జన్మదినం",
      story: "పార్వతీదేవి ఒకసారి స్నానం చేస్తున్నప్పుడు ఎవరూ భంగం కలిగించకుండా తలుపు వద్ద కాపలా కాయడానికి ఒక కాపలాదారుడు కావాలనుకుంది. ఆమె పసుపు ముద్దతో ఒక బాలుడిని తయారు చేసి, ప్రాణం పోసి, ఎవరినీ లోపలికి రానివ్వవద్దని చెప్పింది. కొద్దిసేపటికే శివుడు స్వయంగా ఇంటికి వచ్చాడు, కానీ తల్లి చెప్పినట్టుగా, ఆ బాలుడు శివుడిని కూడా లోపలికి రానివ్వలేదు. ఇతను తన కుమారుడేనని తెలియని శివుడు కోపగించుకున్నాడు, జరిగిన పోరాటంలో ఆ బాలుడు తలను కోల్పోయాడు. జరిగినది చూసిన పార్వతి హృదయవిదారకంగా బాధపడింది, శివుడు తన తప్పును గ్రహించాడు. బాలుడిని తిరిగి బతికించడానికి, శివుడు తన సేవకులను మొదట కనిపించిన జీవి తలను తీసుకురమ్మని పంపాడు, వారు ఏనుగు తలతో తిరిగి వచ్చారు. శివుడు దానిని బాలుడికి అమర్చి తిరిగి బతికించి, అతనికి గణేశుడు అని పేరు పెట్టాడు, ఇకపై ప్రతి కొత్త పని ప్రారంభంలో అతన్నే మొదట పూజించాలని ప్రకటించాడు. అందుకే మనం కొత్త పాఠశాల సంవత్సరం, కొత్త ఇల్లు, కొత్త పండుగ, ఏదైనా ముఖ్యమైనది మొదలుపెట్టేముందు ఎప్పుడూ గణేశుడిని ప్రార్థిస్తాము.",
      temple: "దేవాలయంలో గణేశ విగ్రహాన్ని ప్రతిష్ఠించి పూజిస్తారు, తరచుగా కొబ్బరి నీరు, పాలు, ఎర్రటి పువ్వులతో అభిషేకం చేస్తారు, ఇవి అతనికి ఇష్టమైనవిగా భావిస్తారు. భక్తులు మోదకం (అతనికి ఇష్టమైన తీపి వంటకం) సమర్పించి, ఏ ప్రార్థన ప్రారంభించే ముందైనా 'ఓం గం గణపతయే నమః' అని జపిస్తారు.",
      why: "గణేశుడు అడ్డంకులను తొలగిస్తాడు కాబట్టి మనం మొదట ఆయనను ప్రార్థిస్తాము, సాధారణ పాఠశాల రోజునైనా ఆయన ఆశీర్వాదంతో ప్రారంభించడం అంటే చింత కాకుండా స్పష్టమైన, ఆశాజనకమైన మనసుతో మొదలుపెట్టడం. అతనికి ఇష్టమైన మోదకం సమర్పించడం, మనం ప్రేమించే అతిథికి చేసినట్టుగా, అతనికి ఆనందం కలిగించే దానితో స్వాగతం పలకడమే.",
      shlokaSanskrit: "वक्रतुण्ड महाकाय सूर्यकोटि समप्रभ ।\nनिर्विघ्नं कुरु मे देव सर्वकार्येषु सर्वदा ॥",
      shlokaTranslit: "వక్రతుండ మహాకాయ సూర్యకోటి సమప్రభ,\nనిర్విఘ్నం కురు మే దేవ సర్వకార్యేషు సర్వదా",
      shlokaMeaning: "వంకర తొండం, మహా శరీరం కలిగి, కోటి సూర్యుల కాంతితో సమానమైన ప్రభువా, నా కార్యములన్నింటిలో ఎల్లప్పుడూ అడ్డంకులు లేకుండా చేయుము.",
      quiz: [
        {q:"బాలుడు ప్రాణం పోసుకునే ముందు దేనితో తయారు చేయబడ్డాడు?", opts:["మట్టి","పసుపు ముద్ద","చెక్క"], a:1},
        {q:"బాలుడు శివుడిని ఎందుకు లోపలికి రానివ్వలేదు?", opts:["అతన్ని గుర్తించలేదు, తల్లి మాట పాటించాడు","భయపడ్డాడు","నిద్రపోతున్నాడు"], a:0},
        {q:"గణేశుడికి ఏ జంతువు తల అమర్చబడింది?", opts:["సింహం తల","గుర్రం తల","ఏనుగు తల"], a:2},
        {q:"గణేశుడికి ఇష్టమైన తీపి వంటకం ఏది?", opts:["మోదకం","లడ్డూ మాత్రమే","హల్వా"], a:0}
      ]
    },
    ta: {
      title: "விநாயக சதுர்த்தி",
      sub: "விநாயகரின் பிறந்த நாள்",
      story: "பார்வதி தேவி ஒருமுறை குளிக்கும்போது யாரும் தொந்தரவு செய்யாதபடி வாசலில் காவல் காக்க ஒருவரை விரும்பினார். அவள் மஞ்சள் விழுதால் ஒரு சிறுவனை உருவாக்கி உயிர் கொடுத்து, யாரையும் உள்ளே அனுமதிக்க வேண்டாம் என்று சொன்னாள். சிறிது நேரத்தில் சிவன் தானே வீட்டிற்கு வந்தார், ஆனால் தாயின் வார்த்தையின்படி, அந்த சிறுவன் சிவனையும் உள்ளே அனுமதிக்கவில்லை. இவன் தன் சொந்த மகன் என்று தெரியாத சிவன் கோபமடைந்தார், நடந்த சண்டையில் சிறுவன் தலையை இழந்தான். நடந்ததைப் பார்த்த பார்வதி மனம் நொறுங்கினாள், சிவன் தன் தவறை உணர்ந்தார். சிறுவனை மீண்டும் உயிர்ப்பிக்க, சிவன் தன் பணியாளர்களை முதலில் தென்படும் உயிரினத்தின் தலையைக் கொண்டு வரச் சொன்னார், அவர்கள் ஒரு யானையின் தலையுடன் திரும்பினர். சிவன் அதை சிறுவனுக்குப் பொருத்தி மீண்டும் உயிர்ப்பித்து, அவனுக்கு விநாயகன் என்று பெயரிட்டு, இனிமேல் எந்த புதிய காரியத்தையும் தொடங்கும் முன் அவனை முதலில் வழிபட வேண்டும் என்று அறிவித்தார். அதனால்தான் புதிய பள்ளி ஆண்டு, புதிய வீடு, புதிய திருவிழா, முக்கியமான எதையும் தொடங்கும் முன் நாம் எப்போதும் விநாயகரை வேண்டுகிறோம்.",
      temple: "கோயிலில் விநாயகர் சிலை நிறுவப்பட்டு வழிபடப்படுகிறது, பெரும்பாலும் தேங்காய் நீர், பால், சிவப்பு பூக்களால் அபிஷேகம் செய்யப்படுகிறது, இவை அவருக்கு பிடித்தமானவை என்று கருதப்படுகின்றன. பக்தர்கள் மோதகம் (அவருக்கு பிடித்த இனிப்பு) வழங்கி, எந்த பிரார்த்தனையைத் தொடங்கும் முன்னும் 'ஓம் கம் கணபதயே நமஹ' என்று ஜபிக்கிறார்கள்.",
      why: "விநாயகர் தடைகளை நீக்குபவர் என்பதால் நாம் முதலில் அவரை வேண்டுகிறோம், ஒரு எளிய பள்ளி நாளைக் கூட அவரது ஆசியுடன் தொடங்குவது என்பது கவலையின்றி தெளிவான, நம்பிக்கையான மனதுடன் தொடங்குவதாகும். அவருக்குப் பிடித்த மோதகத்தை வழங்குவது, நாம் நேசிக்கும் விருந்தினருக்குச் செய்வது போல, அவருக்கு மகிழ்ச்சி தரும் ஒன்றால் வரவேற்பதாகும்.",
      shlokaSanskrit: "वक्रतुण्ड महाकाय सूर्यकोटि समप्रभ ।\nनिर्विघ्नं कुरु मे देव सर्वकार्येषु सर्वदा ॥",
      shlokaTranslit: "வக்ரதுண்ட மஹாகாய சூர்யகோடி சமப்ரப,\nநிர்விக்னம் குரு மே தேவ சர்வகார்யேஷு சர்வதா",
      shlokaMeaning: "வளைந்த தும்பிக்கையும் பெரிய உடலும் கொண்ட, கோடி சூரியனுக்கு நிகரான ஒளி கொண்ட இறைவா, என் அனைத்து முயற்சிகளிலும் எப்போதும் தடைகள் இல்லாமல் செய்யுங்கள்.",
      quiz: [
        {q:"சிறுவன் உயிர் பெறுவதற்கு முன் எதனால் உருவாக்கப்பட்டான்?", opts:["களிமண்","மஞ்சள் விழுது","மரம்"], a:1},
        {q:"சிறுவன் ஏன் சிவனை உள்ளே அனுமதிக்கவில்லை?", opts:["அவரை அடையாளம் காணவில்லை, தாயின் வார்த்தையைப் பின்பற்றினான்","பயந்தான்","தூங்கிக்கொண்டிருந்தான்"], a:0},
        {q:"விநாயகருக்கு எந்த விலங்கின் தலை பொருத்தப்பட்டது?", opts:["சிங்கத் தலை","குதிரைத் தலை","யானைத் தலை"], a:2},
        {q:"விநாயகருக்குப் பிடித்த இனிப்பு எது?", opts:["மோதகம்","லட்டு மட்டும்","அல்வா"], a:0}
      ]
    },
    hi: {
      title: "गणेश चतुर्थी (विनायक चविथि)",
      sub: "भगवान गणेश का जन्मदिन",
      story: "माता पार्वती एक बार स्नान करते समय चाहती थीं कि कोई द्वार पर पहरा दे ताकि कोई विघ्न न डाले। उन्होंने हल्दी के लेप से एक बालक बनाया और उसमें प्राण डालकर कहा कि किसी को अंदर न आने दे। कुछ ही देर में भगवान शिव स्वयं घर आए, लेकिन माँ के निर्देश का पालन करते हुए, बालक ने शिव को भी अंदर नहीं जाने दिया। यह न जानते हुए कि यह उनका ही पुत्र है, शिव क्रोधित हो गए, और हुई लड़ाई में बालक ने अपना सिर खो दिया। जब पार्वती ने यह देखा, वे बहुत दुखी हुईं, और शिव को अपनी गलती का एहसास हुआ। बालक को फिर से जीवित करने के लिए, शिव ने अपने सेवकों को भेजा कि जो भी पहला प्राणी मिले उसका सिर ले आएं, वे एक हाथी का सिर लेकर लौटे। शिव ने उसे बालक पर लगाकर उसे फिर से जीवित किया, उसका नाम गणेश रखा, और घोषणा की कि किसी भी नए काम की शुरुआत में सबसे पहले उन्हीं की पूजा होगी। इसीलिए हम कोई भी महत्वपूर्ण काम शुरू करने से पहले, नया स्कूल वर्ष, नया घर, नया त्योहार, हमेशा गणेश जी की पूजा करते हैं।",
      temple: "मंदिर में गणेश जी की मूर्ति स्थापित कर पूजा की जाती है, अक्सर नारियल पानी, दूध और लाल फूलों से अभिषेक किया जाता है, जो उन्हें प्रिय माने जाते हैं। भक्त मोदक (उनका प्रिय मिष्ठान) अर्पित करते हैं और किसी भी प्रार्थना से पहले 'ॐ गं गणपतये नमः' का जाप करते हैं।",
      why: "हम गणेश जी की पूजा सबसे पहले करते हैं क्योंकि वे बाधाओं को दूर करते हैं, इसलिए कोई भी काम, यहाँ तक कि एक साधारण स्कूल का दिन भी, उनके आशीर्वाद से शुरू करने का मतलब है चिंता की बजाय स्पष्ट, आशा भरे मन से शुरुआत करना। उनका प्रिय मोदक अर्पित करना हमारा तरीका है उन्हें उसी चीज़ से स्वागत करने का जो उन्हें खुशी देती है, जैसे हम किसी प्रिय अतिथि के लिए करते हैं।",
      shlokaSanskrit: "वक्रतुण्ड महाकाय सूर्यकोटि समप्रभ ।\nनिर्विघ्नं कुरु मे देव सर्वकार्येषु सर्वदा ॥",
      shlokaTranslit: null,
      shlokaMeaning: "हे टेढ़ी सूंड और विशाल शरीर वाले प्रभु, जिनका तेज करोड़ों सूर्यों के समान है, मेरे सभी कार्यों को हमेशा बाधाओं से मुक्त रखें।",

        {q:"गणेश जी का प्रिय मिष्ठान कौन सा है?", opts:["मोदक","केवल लड्डू","हलवा"], a:0}

  janmashtami: {
    en: {
      title: "Krishna Janmashtami",
      sub: "The birthday of Lord Krishna",
      story: "Long ago, a cruel king named Kamsa ruled the city of Mathura. A voice from the sky once warned him that his sister Devaki's eighth child would defeat him one day. Frightened, Kamsa locked Devaki and her husband Vasudeva in prison and took away each baby they had. But their eighth child was no ordinary baby, he was Lord Krishna, a form of Vishnu, sent to protect the world. On a dark, stormy night, Vasudeva carried baby Krishna across the flooding Yamuna river to keep him safe, and the river itself calmed down to let him pass. Krishna grew up in the village of Gokul, famous for his mischief, his love of butter, and the magical songs he played on his flute. As he grew older, he defeated many demons, and finally faced Kamsa himself, freeing his parents and his kingdom. Janmashtami is the day we celebrate Krishna's birthday: the day love, courage, and protection came into the world.",
      temple: "At midnight, the exact time Krishna was born, the deity is bathed in milk, honey, curd, and holy water in a ceremony called abhishekam. Devotees sing bhajans about Krishna's childhood, and a small cradle (jhula) with baby Krishna is gently rocked. Many families fast and stay awake until midnight, waiting eagerly, just like Krishna's parents once did.",
      why: "Abhishekam means offering our very best to God, just as we'd want to give our best to someone we love. Staying awake until midnight is our way of eagerly waiting for someone truly special, like staying up for a loved one arriving home late at night.",
      shlokaSanskrit: "कृष्णाय वासुदेवाय हरये परमात्मने ।\nप्रणतक्लेशनाशाय गोविन्दाय नमो नमः ॥",
      shlokaTranslit: "Krishnaya Vasudevaya Haraye Paramatmane,\nPranata-klesha-nashaya Govindaya Namo Namah",

      quiz: [

        {q:"What was Krishna especially famous for loving, as a child?", opts:["Butter","Sweets only","Toys"], a:0},
        {q:"What ceremony happens at midnight to mark Krishna's birth?", opts:["Aarti only","Abhishekam (bathing the deity)","Fireworks"], a:1}
      ]
    },
    te: {
      title: "శ్రీకృష్ణ జన్మాష్టమి",
      sub: "శ్రీకృష్ణుని జన్మదినం",
      story: "పూర్వం మథుర నగరాన్ని కంసుడు అనే క్రూరమైన రాజు పరిపాలించేవాడు. తన సోదరి దేవకి యొక్క ఎనిమిదవ సంతానం తనను సంహరిస్తుందని ఒక భవిష్యవాణి కంసుడిని భయపెట్టింది. అందుకే అతను దేవకిని, ఆమె భర్త వసుదేవుడిని చెరసాలలో బంధించి, పుట్టిన ప్రతి బిడ్డను తీసుకెళ్లేవాడు. కానీ ఎనిమిదవ బిడ్డ సాధారణమైనవాడు కాదు, అతడే విష్ణువు అవతారమైన శ్రీకృష్ణుడు, లోకాన్ని కాపాడటానికి వచ్చినవాడు. ఒక తుఫాను రాత్రి, వసుదేవుడు చిన్ని కృష్ణుడిని పొంగిపొర్లుతున్న యమునా నదిని దాటించి సురక్షితంగా గోకులం చేర్చాడు, నది కూడా శాంతించి దారి ఇచ్చింది. కృష్ణుడు గోకులంలో పెరిగి, తన అల్లరితనం, వెన్న మీద ప్రేమ, మురళి గానంతో ప్రసిద్ధి చెందాడు. పెద్దయ్యాక అనేక రాక్షసులను సంహరించి, చివరికి కంసుడిని ఎదుర్కొని తన తల్లిదండ్రులను, రాజ్యాన్ని విముక్తి చేశాడు. కృష్ణుని జన్మదినాన్నే మనం జన్మాష్టమిగా జరుపుకుంటాము.",
      temple: "కృష్ణుడు జన్మించిన అర్ధరాత్రి సమయంలో, పాలు, తేనె, పెరుగు, పవిత్ర జలంతో అభిషేకం చేస్తారు. భక్తులు కృష్ణుని బాల్య లీలల గురించి భజనలు పాడతారు, చిన్ని కృష్ణుని ఉయ్యాలను మెల్లగా ఊపుతారు. చాలా కుటుంబాలు ఉపవాసం ఉండి అర్ధరాత్రి వరకు మేల్కొని ఉంటారు.",
      why: "అభిషేకం అంటే మనం ప్రేమించే వారికి మన అత్యుత్తమమైనది ఇవ్వాలనుకున్నట్టుగా, భగవానుడికి మన శ్రేష్ఠమైనది సమర్పించడం. అర్ధరాత్రి వరకు మేల్కొని ఉండటం, మనం ప్రేమించే వారి రాక కోసం ఆత్రుతగా ఎదురుచూసినట్టుగా ఉంటుంది.",
      shlokaSanskrit: "कृष्णाय वासुदेवाय हरये परमात्मने ।\nप्रणतक्लेशनाशाय गोविन्दाय नमो नमः ॥",
      shlokaTranslit: "కృష్ణాయ వాసుదేవాయ హరయే పరమాత్మనే,\nప్రణతక్లేశనాశాయ గోవిందాయ నమో నమః",
      shlokaMeaning: "వాసుదేవుని కుమారుడైన, పరమాత్మ స్వరూపుడైన కృష్ణునికి పదే పదే నమస్కారములు, నమస్కరించువారి దుఃఖములను తొలగించువాడు గోవిందుడు.",

        {q:"చిన్నప్పుడు కృష్ణుడు దేనిని ఎక్కువగా ఇష్టపడేవాడు?", opts:["వెన్న","మిఠాయిలు మాత్రమే","బొమ్మలు"], a:0},

    ta: {
      title: "கிருஷ்ண ஜென்மாஷ்டமி",
      sub: "கிருஷ்ணரின் பிறந்த நாள்",
      story: "பண்டைக் காலத்தில் மதுரா நகரை காம்சன் என்ற கொடிய அரசன் ஆண்டு வந்தான். தன் சகோதரி தேவகியின் எட்டாவது குழந்தை தன்னைக் கொல்லும் என்ற ஒரு தெய்வீக எச்சரிக்கை அவனை பயமுறுத்தியது. அதனால் தேவகியையும் அவள் கணவன் வசுதேவரையும் சிறையில் அடைத்து, பிறந்த ஒவ்வொரு குழந்தையையும் எடுத்துச் சென்றான். ஆனால் எட்டாவது குழந்தை சாதாரணமானது அல்ல, அவரே விஷ்ணுவின் அவதாரமான கிருஷ்ணர், உலகைக் காக்க வந்தவர். ஒரு புயல் இரவில், வசுதேவர் சிறு கிருஷ்ணரை வெள்ளம் நிறைந்த யமுனை நதி வழியாகக் கொண்டு சென்றார், நதியும் அமைதியடைந்து வழி விட்டது. கிருஷ்ணர் கோகுலத்தில் வளர்ந்து, தன் குறும்புத்தனத்திற்கும், வெண்ணெயின் மீதான காதலுக்கும், புல்லாங்குழல் இசைக்கும் புகழ் பெற்றார். வளர்ந்தவுடன் பல அசுரர்களை வென்று, இறுதியில் காம்சனையே எதிர்கொண்டு, தன் பெற்றோரையும் நாட்டையும் விடுவித்தார். கிருஷ்ணரின் பிறந்தநாளையே நாம் ஜென்மாஷ்டமியாகக் கொண்டாடுகிறோம்.",
      temple: "கிருஷ்ணர் பிறந்த சரியான நேரமான நள்ளிரவில், பால், தேன், தயிர், புனித நீரால் அபிஷேகம் செய்யப்படுகிறது. பக்தர்கள் கிருஷ்ணரின் குழந்தைப் பருவ லீலைகளைப் பற்றிய பஜனைகளைப் பாடுகிறார்கள், சிறு கிருஷ்ணரின் தொட்டில் மெதுவாக ஆட்டப்படுகிறது. பல குடும்பங்கள் விரதம் இருந்து நள்ளிரவு வரை விழித்திருக்கின்றன.",
      why: "நாம் நேசிப்பவர்களுக்கு நமது சிறந்ததை கொடுக்க விரும்புவது போல, அபிஷேகம் என்பது கடவுளுக்கு நமது சிறந்ததை சமர்ப்பிப்பதாகும். நள்ளிரவு வரை விழித்திருப்பது, நாம் நேசிப்பவர் இரவில் வீடு திரும்புவதற்காக ஆவலுடன் காத்திருப்பது போன்றது.",
      shlokaSanskrit: "कृष्णाय वासुदेवाय हरये परमात्मने ।\nप्रणतक्लेशनाशाय गोविन्दाय नमो नमः ॥",
      shlokaTranslit: "கிருஷ்ணாய வாசுதேவாய ஹரயே பரமாத்மனே,\nப்ரணதக்லேச நாசாய கோவிந்தாய நமோ நமஹ",

      title: "श्री कृष्ण जन्माष्टमी",
      sub: "भगवान कृष्ण का जन्मदिन",
      story: "बहुत समय पहले, मथुरा नगरी पर कंस नाम का एक क्रूर राजा राज करता था। एक आकाशवाणी ने उसे चेतावनी दी थी कि उसकी बहन देवकी की आठवीं संतान उसका वध करेगी। डर के मारे कंस ने देवकी और उनके पति वसुदेव को कारागार में बंद कर दिया और उनकी हर संतान को छीन लिया। लेकिन उनकी आठवीं संतान कोई साधारण शिशु नहीं था, वे थे भगवान कृष्ण, विष्णु के अवतार, संसार की रक्षा के लिए भेजे गए। एक अंधेरी, तूफानी रात में, वसुदेव बाल कृष्ण को उफनती यमुना नदी पार कराकर सुरक्षित ले गए, और नदी स्वयं शांत होकर रास्ता दे दिया। कृष्ण गोकुल गाँव में पले-बढ़े, अपनी शरारतों, मक्खन के प्रेम और बांसुरी के जादुई संगीत के लिए प्रसिद्ध हुए। बड़े होकर उन्होंने कई राक्षसों का वध किया, और अंततः कंस का सामना कर अपने माता-पिता और राज्य को मुक्त कराया। जन्माष्टमी वह दिन है जब हम कृष्ण के जन्मदिन का उत्सव मनाते हैं: वह दिन जब प्रेम, साहस और सुरक्षा इस संसार में आई।",
      temple: "आधी रात को, ठीक उसी समय जब कृष्ण का जन्म हुआ था, दूध, शहद, दही और पवित्र जल से अभिषेक किया जाता है। भक्त कृष्ण की बाल लीलाओं के भजन गाते हैं, और बाल कृष्ण के साथ एक छोटा झूला धीरे-धीरे झुलाया जाता है। कई परिवार व्रत रखकर आधी रात तक जागते हैं।",
      why: "अभिषेक का अर्थ है भगवान को अपनी सबसे अच्छी चीज़ अर्पित करना, जैसे हम किसी प्रिय व्यक्ति को अपना सर्वश्रेष्ठ देना चाहते हैं। आधी रात तक जागना हमारा तरीका है किसी बहुत खास व्यक्ति की उत्सुकता से प्रतीक्षा करने का, जैसे किसी प्रियजन के देर रात घर लौटने का इंतज़ार करना।",
      shlokaSanskrit: "कृष्णाय वासुदेवाय हरये परमात्मने ।\nप्रणतक्लेशनाशाय गोविन्दाय नमो नमः ॥",
      shlokaTranslit: null,
      shlokaMeaning: "वसुदेव के पुत्र, परमात्मा स्वरूप कृष्ण को बार-बार नमस्कार, जो नमन करने वालों के सभी दुखों को दूर करते हैं, वे गोविंद हैं।",
      quiz: [
        {q:"भविष्यवाणी से डरने वाला क्रूर राजा कौन था?", opts:["रावण","कंस","दुर्योधन"], a:1},
        {q:"वसुदेव बाल कृष्ण को लेकर किस नदी को पार कर गए?", opts:["गंगा नदी","यमुना नदी","गोदावरी नदी"], a:1},
        {q:"बचपन में कृष्ण को सबसे ज़्यादा क्या पसंद था?", opts:["मक्खन","केवल मिठाइयाँ","खिलौने"], a:0},
        {q:"कृष्ण के जन्म के समय आधी रात को क्या होता है?", opts:["केवल आरती","अभिषेक","आतिशबाज़ी"], a:1}
      ]
    }
  },

  dussehra: {
    en: {
      title: "Dussehra (Vijayadashami)",
      sub: "The tenth day of victory, after nine nights of Navaratri",
      story: "For nine nights called Navaratri, we celebrate the Goddess Durga, brave, powerful, and full of light. A demon named Mahishasura had grown so strong that even the gods could not defeat him alone, because he could only be defeated by a woman. So all the gods combined their own power and energy into one being: Goddess Durga, riding a lion, holding a weapon in each of her many hands. For nine days and nights, Durga battled Mahishasura, and on the tenth day, Vijayadashami, she finally defeated him. That's why Dussehra means 'the tenth day of victory.' Many families also remember another story on this day: how Lord Rama defeated the ten-headed demon king Ravana, who had kidnapped Rama's wife, Sita. With the help of the devoted monkey-god Hanuman and a great army, Rama rescued Sita and defeated Ravana. In many places, people burn a giant statue of Ravana on this day to celebrate good winning over evil.",
      temple: "During the nine nights, the temple honors the Goddess in her different forms, with special decorations and daily puja. On Vijayadashami, there's also Ayudha Puja, blessing tools, books, and instruments that help us do good work, thanking them for serving us all year.",
      why: "Durga reminds us that real strength often comes from many good things joining together, not just one person alone. Ayudha Puja reminds us to be grateful for the things, books, tools, even a bicycle or cricket bat, that help us learn and do good work every day.",
      shlokaSanskrit: "सर्वमङ्गलमाङ्गल्ये शिवे सर्वार्थसाधिके ।\nशरण्ये त्र्यम्बके गौरि नारायणि नमोऽस्तु ते ॥",
      shlokaTranslit: "Sarva-mangala-mangalye Shive Sarvartha-sadhike,\nSharanye Tryambake Gauri Narayani Namo'stu Te",
      shlokaMeaning: "Salutations to you, O Goddess, who is the auspiciousness in all things auspicious, the giver of all that we truly need, our refuge, the three-eyed one, Gauri, Narayani.",
      quiz: [
        {q:"Why could the gods not defeat Mahishasura alone?", opts:["He could only be defeated by a woman","He was invisible","He lived underwater"], a:0},
        {q:"What does Vijayadashami mean?", opts:["Nine nights of fasting","The tenth day of victory","Festival of lights"], a:1},
        {q:"Who helped Rama rescue Sita from Ravana?", opts:["Hanuman","Kamsa","Narakasura"], a:0},
        {q:"What special puja happens on Vijayadashami, blessing tools and books?", opts:["Abhishekam","Ayudha Puja","Aarti"], a:1}
      ]
    },
    te: {
      title: "దసరా (విజయదశమి)",
      sub: "నవరాత్రుల తర్వాత విజయం సాధించిన పదవ రోజు",
      story: "నవరాత్రులు అనే తొమ్మిది రాత్రుల పాటు మనం దుర్గాదేవిని ఆరాధిస్తాము, ధైర్యవంతురాలు, శక్తిమంతురాలు, తేజోవంతురాలు. మహిషాసురుడు అనే రాక్షసుడు ఎంతటి బలవంతుడయ్యాడంటే, అతన్ని ఒక స్త్రీ మాత్రమే సంహరించగలదు కాబట్టి దేవతలు కూడా ఒంటరిగా అతన్ని ఓడించలేకపోయారు. అందుకే దేవతలందరూ తమ శక్తులను ఏకం చేసి దుర్గాదేవిని సృష్టించారు, సింహవాహనంపై కూర్చుని, తన అనేక చేతుల్లో ఆయుధాలు ధరించినది. తొమ్మిది రాత్రుల పోరాటం తర్వాత, పదవరోజైన విజయదశమి నాడు దుర్గాదేవి మహిషాసురుడిని సంహరించింది. అందుకే దసరాను 'విజయం సాధించిన పదవ రోజు' అని పిలుస్తారు. చాలామంది ఈరోజు మరో కథను కూడా గుర్తుచేసుకుంటారు, పది తలల రావణుడిని శ్రీరాముడు సంహరించిన కథ. రావణుడు రాముని భార్య సీతను అపహరించగా, హనుమంతుని సహాయంతో రాముడు సీతను రక్షించి రావణుడిని సంహరించాడు. చాలా చోట్ల ఈరోజు రావణుడి బొమ్మను తగలబెట్టి మంచి గెలుపును జరుపుకుంటారు.",
      temple: "తొమ్మిది రాత్రుల పాటు దేవాలయంలో దుర్గాదేవి వివిధ రూపాలను ప్రత్యేక అలంకరణలతో, రోజువారీ పూజలతో గౌరవిస్తారు. విజయదశమి నాడు ఆయుధ పూజ కూడా జరుగుతుంది, మనకు సహాయపడే పుస్తకాలు, పనిముట్లు, వాయిద్యాలను పూజించి వాటికి కృతజ్ఞతలు తెలుపుతారు.",
      why: "నిజమైన శక్తి తరచుగా ఒక్కరి నుండి కాకుండా, మంచి విషయాలన్నీ కలిసినప్పుడు వస్తుందని దుర్గాదేవి మనకు గుర్తుచేస్తుంది. ఆయుధ పూజ మనకు ప్రతిరోజూ నేర్చుకోవడానికి, మంచి పని చేయడానికి సహాయపడే పుస్తకాలు, పనిముట్ల పట్ల కృతజ్ఞత చూపమని గుర్తుచేస్తుంది.",
      shlokaSanskrit: "सर्वमङ्गलमाङ्गल्ये शिवे सर्वार्थसाधिके ।\nशरण्ये त्र्यम्बके गौरि नारायणि नमोऽस्तु ते ॥",
      shlokaTranslit: "సర్వమంగళ మాంగల్యే శివే సర్వార్థ సాధికే,\nశరణ్యే త్ర్యంబకే గౌరి నారాయణి నమోఽస్తు తే",
      shlokaMeaning: "అన్ని శుభాలలో శుభమైనదానికి, మనకు కావలసినదంతా ప్రసాదించే దానికి, మన శరణ్యురాలైన త్రినేత్ర గౌరీ నారాయణికి నమస్కారము.",
      quiz: [
        {q:"మహిషాసురుడిని దేవతలు ఒంటరిగా ఎందుకు ఓడించలేకపోయారు?", opts:["అతన్ని స్త్రీ మాత్రమే ఓడించగలదు","అతను అదృశ్యుడు","అతను నీటిలో నివసించేవాడు"], a:0},
        {q:"విజయదశమి అంటే అర్థం ఏమిటి?", opts:["తొమ్మిది రాత్రుల ఉపవాసం","విజయం సాధించిన పదవ రోజు","దీపాల పండుగ"], a:1},
        {q:"రావణుడి నుండి సీతను రక్షించడంలో రాముడికి ఎవరు సహాయం చేశారు?", opts:["హనుమంతుడు","కంసుడు","నరకాసురుడు"], a:0},
        {q:"విజయదశమి నాడు పనిముట్లు, పుస్తకాలను ఆశీర్వదించే పూజ ఏది?", opts:["అభిషేకం","ఆయుధ పూజ","హారతి"], a:1}
      ]
    },
    ta: {
      title: "தசரா (விஜயதசமி)",
      sub: "நவராத்திரி ஒன்பது இரவுகளுக்குப் பிறகான வெற்றியின் பத்தாம் நாள்",
      story: "நவராத்திரி எனப்படும் ஒன்பது இரவுகளில், நாம் தைரியமும் சக்தியும் ஒளியும் நிறைந்த துர்க்கை தேவியை வழிபடுகிறோம். மகிஷாசுரன் என்ற அசுரன் ஒரு பெண்ணால் மட்டுமே வெல்லப்பட முடியும் என்ற வரம் பெற்றிருந்ததால், தேவர்களால் தனித்தனியாக அவனை வெல்ல முடியவில்லை. எனவே அனைத்து தேவர்களும் தங்கள் சக்தியை ஒன்று சேர்த்து துர்க்கையை உருவாக்கினர், சிங்க வாகனத்தில் அமர்ந்து, தன் பல கைகளில் ஆயுதங்களை ஏந்தியவளாக. ஒன்பது இரவுகள் போரிட்ட பிறகு, பத்தாம் நாளான விஜயதசமி அன்று துர்க்கை மகிஷாசுரனை வென்றாள். அதனால்தான் தசராவை 'வெற்றியின் பத்தாம் நாள்' என்று அழைக்கிறோம். பல குடும்பங்கள் இந்நாளில் மற்றொரு கதையையும் நினைவு கூர்கின்றன, பத்து தலை இராவணனை ராமர் வென்ற கதை. இராவணன் ராமரின் மனைவி சீதையை கடத்திச் சென்றபோது, அனுமனின் உதவியுடன் ராமர் சீதையை மீட்டு இராவணனை வென்றார். பல இடங்களில் இந்நாளில் இராவணனின் பெரிய பொம்மையை எரித்து நன்மை வெற்றி பெறுவதைக் கொண்டாடுகின்றனர்.",
      temple: "ஒன்பது இரவுகளிலும் கோயிலில் தேவியின் பல்வேறு வடிவங்கள் சிறப்பு அலங்காரங்களுடனும், தினசரி பூஜைகளுடனும் கொண்டாடப்படுகின்றன. விஜயதசமி அன்று ஆயுத பூஜையும் நடைபெறுகிறது, நமக்கு உதவும் புத்தகங்கள், கருவிகள், இசைக்கருவிகளை வழிபட்டு நன்றி தெரிவிக்கிறோம்.",
      why: "உண்மையான வலிமை பெரும்பாலும் ஒருவரிடமிருந்து மட்டும் அல்ல, நல்ல பல விஷயங்கள் ஒன்று சேரும்போது வருகிறது என்பதை துர்க்கை நமக்கு நினைவூட்டுகிறாள். ஆயுத பூஜை, தினமும் நாம் கற்றுக்கொள்ளவும் நல்ல வேலை செய்யவும் உதவும் புத்தகங்கள், கருவிகளுக்கு நன்றி சொல்ல வேண்டும் என்பதை நினைவூட்டுகிறது.",
      shlokaSanskrit: "सर्वमङ्गलमाङ्गल्ये शिवे सर्वार्थसाधिके ।\nशरण्ये त्र्यम्बके गौरि नारायणि नमोऽस्तु ते ॥",
      shlokaTranslit: "சர்வமங்கள மாங்கல்யே சிவே சர்வார்த்த சாதிகே,\nசரண்யே த்ர்யம்பகே கௌரி நாராயணி நமோஸ்து தே",
      shlokaMeaning: "எல்லா மங்களங்களிலும் மங்களமானவளே, நாம் விரும்பும் அனைத்தையும் அளிப்பவளே, நமது புகலிடமான முக்கண்ணி கௌரி நாராயணிக்கு வணக்கம்.",
      quiz: [
        {q:"மகிஷாசுரனை தேவர்களால் தனியாக வெல்ல முடியாதது ஏன்?", opts:["ஒரு பெண்ணால் மட்டுமே வெல்லப்பட முடியும்","அவன் கண்ணுக்குத் தெரியாதவன்","அவன் நீருக்கடியில் வாழ்ந்தான்"], a:0},
        {q:"விஜயதசமி என்றால் என்ன பொருள்?", opts:["ஒன்பது இரவு விரதம்","வெற்றியின் பத்தாம் நாள்","விளக்குகளின் திருவிழா"], a:1},
        {q:"சீதையை இராவணனிடமிருந்து மீட்க ராமருக்கு உதவியது யார்?", opts:["அனுமன்","காம்சன்","நரகாசுரன்"], a:0},
        {q:"விஜயதசமி அன்று கருவிகளையும் புத்தகங்களையும் வழிபடும் பூஜை எது?", opts:["அபிஷேகம்","ஆயுத பூஜை","ஆரத்தி"], a:1}
      ]

    hi: {
      title: "दशहरा (विजयादशमी)",
      sub: "नवरात्रि की नौ रातों के बाद विजय का दसवाँ दिन",
      story: "नवरात्रि नाम की नौ रातों में हम देवी दुर्गा का उत्सव मनाते हैं, जो साहसी, शक्तिशाली और तेजोमय हैं। महिषासुर नाम का एक राक्षस इतना शक्तिशाली हो गया था कि देवता भी अकेले उसे हरा नहीं सकते थे, क्योंकि उसे केवल एक स्त्री ही हरा सकती थी। इसलिए सभी देवताओं ने अपनी शक्ति और ऊर्जा को मिलाकर एक देवी बनाई: देवी दुर्गा, सिंह पर सवार, अपने अनेक हाथों में एक-एक अस्त्र लिए। नौ दिन और रातों तक दुर्गा ने महिषासुर से युद्ध किया, और दसवें दिन, विजयादशमी, उन्होंने अंततः उसे हरा दिया। इसीलिए दशहरा का अर्थ है 'विजय का दसवाँ दिन'। कई परिवार इस दिन एक और कहानी भी याद करते हैं: कैसे भगवान राम ने दस सिर वाले राक्षस राजा रावण को हराया, जिसने राम की पत्नी सीता का अपहरण किया था। भक्त हनुमान और एक विशाल सेना की मदद से, राम ने सीता को बचाया और रावण को हराया। कई जगहों पर लोग इस दिन रावण की विशाल मूर्ति जलाकर अच्छाई की बुराई पर जीत का उत्सव मनाते हैं।",
      temple: "नौ रातों के दौरान मंदिर देवी के विभिन्न रूपों का सम्मान विशेष सजावट और दैनिक पूजा के साथ करता है। विजयादशमी पर आयुध पूजा भी होती है, उन औज़ारों, किताबों और वाद्ययंत्रों को आशीर्वाद देना जो हमें अच्छा काम करने में मदद करते हैं, साल भर सेवा देने के लिए उन्हें धन्यवाद देना।",
      why: "दुर्गा हमें याद दिलाती हैं कि असली शक्ति अक्सर कई अच्छी चीज़ों के एक साथ आने से मिलती है, न कि किसी एक व्यक्ति से। आयुध पूजा हमें उन चीज़ों, किताबें, औज़ार, यहाँ तक कि साइकिल या क्रिकेट बैट, के प्रति आभारी होना सिखाती है जो हमें रोज़ सीखने और अच्छा काम करने में मदद करती हैं।",
      shlokaSanskrit: "सर्वमङ्गलमाङ्गल्ये शिवे सर्वार्थसाधिके ।\nशरण्ये त्र्यम्बके गौरि नारायणि नमोऽस्तु ते ॥",
      shlokaTranslit: null,
      shlokaMeaning: "हे देवी, जो सभी शुभ वस्तुओं में शुभ हैं, जो हमारी हर आवश्यकता पूरी करती हैं, हमारी शरण, त्रिनेत्रा गौरी नारायणी, आपको नमस्कार।",
      quiz: [
        {q:"देवता अकेले महिषासुर को क्यों नहीं हरा सके?", opts:["उसे केवल एक स्त्री हरा सकती थी","वह अदृश्य था","वह पानी में रहता था"], a:0},
        {q:"विजयादशमी का क्या अर्थ है?", opts:["नौ रातों का व्रत","विजय का दसवाँ दिन","रोशनी का त्योहार"], a:1},
        {q:"सीता को रावण से बचाने में राम की मदद किसने की?", opts:["हनुमान","कंस","नरकासुर"], a:0},
        {q:"विजयादशमी पर औज़ारों और किताबों को आशीर्वाद देने वाली विशेष पूजा कौन सी है?", opts:["अभिषेक","आयुध पूजा","आरती"], a:1}
      ]
    }
  },

  diwali: {
    en: {
      title: "Diwali (Deepavali)",
      sub: "The festival of lights",
      story: "Diwali, or Deepavali, means 'a row of lights.' One story tells of the day Lord Rama finally came home to the city of Ayodhya, after 14 years away and after defeating the demon king Ravana. The people of Ayodhya were so overjoyed that they lit rows and rows of little clay lamps, called diyas, to light his path home in the dark night. Another story, much loved especially in South India, tells of Lord Krishna defeating a demon named Narakasura, who had captured and mistreated many innocent people. Krishna freed every single one of them, bringing light and freedom back into their lives. Both stories share the very same idea: light winning over darkness, and good winning over evil. That's really what every diya we light is saying.",
      temple: "The temple performs a special Lakshmi Puja, honoring the Goddess of wealth and well-being, along with an abhishekam for the main deity. Hundreds of diyas are lit around the temple, families wear new clothes, share sweets with neighbors and friends, and many places celebrate with fireworks.",
      why: "Lighting a diya is our way of saying: let's bring light, kindness, knowledge, courage, into the dark corners of the world, like sadness or unfairness. Sharing sweets and wearing something new reminds us of starting fresh, and being generous with the people around us.",
      shlokaSanskrit: "ॐ महालक्ष्म्यै च विद्महे विष्णुपत्न्यै च धीमहि ।\nतन्नो लक्ष्मीः प्रचोदयात् ॥",
      shlokaTranslit: "Om Mahalakshmyai Cha Vidmahe, Vishnu Patnyai Cha Dheemahi,\nTanno Lakshmi Prachodayat",
      shlokaMeaning: "We meditate upon the Great Goddess Lakshmi, the beloved of Lord Vishnu. May that Goddess Lakshmi inspire and guide us.",
      quiz: [
        {q:"What does 'Deepavali' actually mean?", opts:["A row of lights","A great feast","A day of rest"], a:0},
        {q:"How many years was Rama away before returning to Ayodhya?", opts:["7 years","14 years","20 years"], a:1},
        {q:"Which demon did Krishna defeat, freeing many captured people?", opts:["Ravana","Mahishasura","Narakasura"], a:2},
        {q:"Which Goddess is especially honored on Diwali?", opts:["Lakshmi","Saraswati","Durga"], a:0}
      ]
    },
    te: {
      title: "దీపావళి",
      sub: "దీపాల పండుగ",
      story: "దీపావళి అంటే 'దీపాల వరుస' అని అర్థం. ఒక కథ ప్రకారం, 14 సంవత్సరాల వనవాసం తర్వాత, రావణుడిని సంహరించి శ్రీరాముడు అయోధ్యకు తిరిగి వచ్చిన రోజు ఇది. అయోధ్య ప్రజలు అమితానందంతో చీకటి రాత్రిలో ఆయన దారిని వెలిగించడానికి వరుసలుగా చిన్న మట్టి దీపాలను (దీపాలు) వెలిగించారు. దక్షిణ భారతదేశంలో మరీ ఎక్కువగా ఇష్టపడే మరో కథ ప్రకారం, నరకాసురుడు అనే రాక్షసుడిని శ్రీకృష్ణుడు సంహరించి, అతను బంధించిన అనేకమంది అమాయకులను విడిపించాడు. ఈ రెండు కథలు ఒకే విషయాన్ని చెబుతాయి, చీకటిపై వెలుగు గెలుపు, చెడుపై మంచి గెలుపు. మనం వెలిగించే ప్రతి దీపం చెప్పేది ఇదే.",
      temple: "దేవాలయంలో లక్ష్మీదేవికి ప్రత్యేక పూజ, ప్రధాన దేవునికి అభిషేకం జరుగుతాయి. వందలాది దీపాలు వెలిగిస్తారు, కుటుంబాలు కొత్త బట్టలు ధరిస్తాయి, పరిచయస్తులతో మిఠాయిలు పంచుకుంటారు, అనేక చోట్ల బాణసంచా కాలుస్తారు.",
      why: "దీపం వెలిగించడం అంటే, దయ, జ్ఞానం, ధైర్యం వంటి వెలుగును, విచారం లేదా అన్యాయం వంటి చీకటి మూలలలోకి తీసుకురావాలని చెప్పడం. మిఠాయిలు పంచుకోవడం, కొత్త బట్టలు ధరించడం కొత్త ప్రారంభాన్ని, చుట్టూ ఉన్నవారితో ఔదార్యాన్ని గుర్తుచేస్తుంది.",
      shlokaSanskrit: "ॐ महालक्ष्म्यै च विद्महे विष्णुपत्न्यै च धीमहि ।\nतन्नो लक्ष्मीः प्रचोदयात् ॥",
      shlokaTranslit: "ఓం మహాలక్ష్మ్యై చ విద్మహే విష్ణుపత్న్యై చ ధీమహి,\nతన్నో లక్ష్మీః ప్రచోదయాత్",
      shlokaMeaning: "విష్ణువుకు ప్రియురాలైన మహాలక్ష్మీదేవిని మేము ధ్యానిస్తున్నాము. ఆ లక్ష్మీదేవి మాకు మంచి బుద్ధిని ప్రేరేపించుగాక.",
      quiz: [

        {q:"అయోధ్యకు తిరిగి రాకముందు రాముడు ఎన్ని సంవత్సరాలు వనవాసంలో ఉన్నాడు?", opts:["7 సంవత్సరాలు","14 సంవత్సరాలు","20 సంవత్సరాలు"], a:1},
        {q:"కృష్ణుడు ఏ రాక్షసుడిని సంహరించి బందీలను విడిపించాడు?", opts:["రావణుడు","మహిషాసురుడు","నరకాసురుడు"], a:2},
        {q:"దీపావళి నాడు ప్రత్యేకంగా ఏ దేవతను పూజిస్తారు?", opts:["లక్ష్మీదేవి","సరస్వతీదేవి","దుర్గాదేవి"], a:0}

    ta: {
      title: "தீபாவளி",
      sub: "விளக்குகளின் திருவிழா",
      story: "தீபாவளி என்றால் 'விளக்குகளின் வரிசை' என்று பொருள். ஒரு கதையின்படி, 14 ஆண்டுகள் வனவாசம் முடித்து, இராவணனை வென்று ராமர் அயோத்திக்குத் திரும்பிய நாள் இது. அயோத்தி மக்கள் மகிழ்ச்சியில் இருண்ட இரவில் அவரது வழியை ஒளிரச் செய்ய வரிசையாக சிறு மண் விளக்குகளை (தீபங்கள்) ஏற்றினர். தென்னிந்தியாவில் மிகவும் விரும்பப்படும் மற்றொரு கதையின்படி, நரகாசுரன் என்ற அசுரனை கிருஷ்ணர் வென்று, அவன் சிறைபிடித்திருந்த பலரையும் விடுவித்தார். இரு கதைகளும் ஒரே கருத்தைச் சொல்கின்றன, இருளை வெல்லும் ஒளி, தீமையை வெல்லும் நன்மை. நாம் ஏற்றும் ஒவ்வொரு தீபமும் இதைத்தான் சொல்கிறது.",
      temple: "கோயிலில் லக்ஷ்மி தேவிக்கு சிறப்பு பூஜையும், முதன்மை தெய்வத்திற்கு அபிஷேகமும் நடைபெறுகிறது. நூற்றுக்கணக்கான தீபங்கள் ஏற்றப்படுகின்றன, குடும்பங்கள் புதிய ஆடைகள் அணிகின்றன, நண்பர்களுடன் இனிப்புகளைப் பகிர்கின்றன, பல இடங்களில் பட்டாசுகளுடன் கொண்டாடுகின்றனர்.",
      why: "தீபம் ஏற்றுவது, கருணை, அறிவு, தைரியம் போன்ற ஒளியை, சோகம் அல்லது அநீதி போன்ற இருண்ட மூலைகளுக்குள் கொண்டு வர வேண்டும் என்பதைச் சொல்கிறது. இனிப்புகளைப் பகிர்வதும் புதிய ஆடை அணிவதும், புதிய தொடக்கத்தையும் தாராள மனதையும் நினைவூட்டுகிறது.",
      shlokaSanskrit: "ॐ महालक्ष्म्यै च विद्महे विष्णुपत्न्यै च धीमहि ।\nतन्नो लक्ष्मीः प्रचोदयात् ॥",
      shlokaTranslit: "ஓம் மஹாலக்ஷ்ம்யை ச வித்மஹே விஷ்ணுபத்ன்யை ச தீமஹி,\nதன்னோ லக்ஷ்மீ: ப்ரசோதயாத்",
      shlokaMeaning: "விஷ்ணுவின் அன்பு மனைவியான மகாலக்ஷ்மியை நாம் தியானிக்கிறோம். அந்த லக்ஷ்மி தேவி நமக்கு நல்ல அறிவை ஊக்குவிக்கட்டும்.",
      quiz: [

    hi: {

      sub: "रोशनी का त्योहार",
      story: "दीवाली, या दीपावली, का अर्थ है 'रोशनी की कतार'। एक कहानी के अनुसार, यह वह दिन है जब भगवान राम 14 वर्षों के वनवास और रावण का वध करने के बाद अयोध्या नगरी लौटे थे। अयोध्या के लोग इतने खुश हुए कि उन्होंने अंधेरी रात में उनके रास्ते को रोशन करने के लिए पंक्तियों में छोटे मिट्टी के दीये जलाए। दक्षिण भारत में विशेष रूप से पसंद की जाने वाली एक और कहानी के अनुसार, भगवान कृष्ण ने नरकासुर नाम के राक्षस को हराया, जिसने कई निर्दोष लोगों को बंदी बना रखा था। कृष्ण ने उन सभी को मुक्त कराया, उनके जीवन में फिर से रोशनी और आज़ादी लाई। दोनों कहानियाँ एक ही बात कहती हैं, अंधकार पर प्रकाश की जीत, और बुराई पर अच्छाई की जीत। यही तो हर दीया जलाते समय हम कहना चाहते हैं।",
      temple: "मंदिर में लक्ष्मी माता की विशेष पूजा होती है, जो धन और समृद्धि की देवी हैं, साथ ही मुख्य देवता का अभिषेक भी किया जाता है। मंदिर के चारों ओर सैकड़ों दीये जलाए जाते हैं, परिवार नए कपड़े पहनते हैं, पड़ोसियों और दोस्तों के साथ मिठाइयाँ बाँटते हैं, और कई जगहों पर आतिशबाज़ी के साथ उत्सव मनाया जाता है।",

      shlokaTranslit: null,
      shlokaMeaning: "हम महान देवी महालक्ष्मी का ध्यान करते हैं, जो भगवान विष्णु की प्रिय हैं। वह देवी लक्ष्मी हमें प्रेरित और मार्गदर्शन करें।",

      title: "శ్రీ గోదా కల్యాణం",
      sub: "గోదాదేవి (ఆండాళ్) దివ్య వివాహం",
      story: "పూర్వం దక్షిణ భారతదేశంలోని శ్రీవిల్లిపుత్తూరు నగరంలో, పెరియాళ్వార్ అనే సాధువు విష్ణువు కోసం తోటను చూసుకుంటూ ఒక తులసి మొక్క కింద ఒక పసిపాపను కనుగొన్నాడు. అతను ఆమెను తన కుమార్తెగా పెంచి, ఆమెకు గోదాదేవి అని పేరు పెట్టాడు. పెరిగే కొద్దీ, గోదాదేవి విష్ణువును ఎంతగా ప్రేమించిందంటే, తాను మరెవరినీ వివాహం చేసుకోనని నిర్ణయించుకుంది. ఆమె దేవాలయ దేవునికి ఉద్దేశించిన పూల దండలను ముందుగా తానే ధరించి, తర్వాత తిరిగి ఇచ్చేది, తాను భగవానుని వధువుననుకుంటూ, ఒకరోజు తండ్రి ఆమెను చూసేవరకు. కలత చెందే బదులు, ఆ రోజు ఆ దండను దేవునికి సమర్పించినప్పుడు, గోదాదేవి ఇప్పటికే దానిని స్వచ్ఛమైన భక్తితో ధరించినందున, భగవానుడు దానిని సంతోషంగా స్వీకరించాడని చెబుతారు. గోదాదేవి భగవానుని కోసం అందమైన పద్యాలు రచించింది, వాటినే తిరుప్పావై అని పిలుస్తారు. చివరికి, ఆమెను ఒక గొప్ప ఊరేగింపులో దేవాలయానికి తీసుకెళ్లి భగవానునితో దివ్య వివాహంలో ఐక్యం చేశారు, ఇదే శ్రీ గోదా కల్యాణం, ఒక భక్తురాలి ప్రేమ శాశ్వతమైనదిగా మారడాన్ని జరుపుకునే వేడుక.",
      temple: "దేవాలయం గోదాదేవి, భగవానుల మధ్య ఒక విస్తృతమైన కల్యాణోత్సవం నిర్వహిస్తుంది, వివాహ అలంకరణలు, పవిత్రమైన వివాహ దారం, తిరుప్పావై పద్యాల పఠనంతో సహా.",
      why: "గోదా కల్యాణం, స్వచ్ఛమైన, దృఢమైన హృదయంతో చేసే భక్తి శాశ్వతమైనదిగా మారేంత శక్తివంతమైనదని గుర్తుచేస్తుంది. తాను అమితంగా ప్రేమించినదాన్ని అనుసరించిన ఒక అమ్మాయి ధైర్యాన్ని కూడా ఇది జరుపుకుంటుంది.",
      shlokaSanskrit: "மார்கழித் திங்கள் மதிநிறைந்த நன்னாளால் ।\nநீராடப் போதுவீர் போதுமினோ நேரிழையீர் ॥",
      shlokaTranslit: "మార్గళిత్ తింగళ్ మదినిఱైంద నన్నాళాల్,\nనీరాడప్ పోదువీర్ పోదుమినో నేరిழైయీర్",
      shlokaMeaning: "ఈ అందమైన పౌర్ణమి మార్గళి మాసంలో, మనమందరం కలిసి స్నానం చేసి ప్రార్థించడానికి వెళ్దాం, మన అందమైన వస్త్రాలు ధరించి, స్నేహితులను ఈ పవిత్ర వ్రతంలో చేరమని పిలుస్తూ.",
      quiz: [
        {q:"పసిపాప గోదాదేవి ఎక్కడ కనిపించింది?", opts:["తులసి మొక్క కింద","నదిలో","అడవిలో"], a:0},
        {q:"సమర్పించే ముందు గోదాదేవి దండలతో ఏమి చేసేది?", opts:["ముందు తానే ధరించేది","పారేసేది","అమ్మేసేది"], a:0},
        {q:"గోదాదేవి విష్ణువు కోసం ఏ అందమైన పద్యాలు రచించింది?", opts:["తిరుప్పావై","వంటల పుస్తకం","నృత్య మార్గదర్శిని"], a:0},
        {q:"శ్రీ గోదా కల్యాణంలో ఏమి జరుపుకుంటారు?", opts:["భగవానునితో ఆమె వివాహం","ఆమె పుట్టినరోజు","ఆమె వీడ్కోలు"], a:0}
      ]
    },
    ta: {
      title: "ஸ்ரீ கோதா கல்யாணம்",
      sub: "கோதா தேவியின் (ஆண்டாள்) திருமணம்",
      story: "பண்டைக் காலத்தில் தென்னிந்தியாவில் உள்ள ஸ்ரீவில்லிபுத்தூரில், பெரியாழ்வார் என்ற துறவி விஷ்ணுவுக்காக தோட்டம் பராமரிக்கும்போது ஒரு துளசி செடியின் கீழ் ஒரு குழந்தையைக் கண்டெடுத்தார். அவர் அவளைத் தன் மகளாக வளர்த்து, அவளுக்கு கோதாதேவி என்று பெயரிட்டார். வளர்ந்தவுடன், கோதாதேவி விஷ்ணுவை மிகவும் நேசித்தாள், அவள் வேறு யாரையும் மணக்க மாட்டேன் என்று முடிவு செய்தாள். கோயில் தெய்வத்திற்கு உரிய பூமாலைகளை அவள் முதலில் தானே அணிந்துகொண்டு பின்பு திருப்பி கொடுப்பாள், தன்னை இறைவனின் மணப்பெண்ணாக கற்பனை செய்துகொண்டு, ஒரு நாள் தந்தை அவளைப் பார்க்கும் வரை. கோபப்படுவதற்குப் பதிலாக, அன்று அந்த மாலை தெய்வத்திற்கு சமர்ப்பிக்கப்பட்டபோது, கோதாதேவி ஏற்கனவே அதை தூய பக்தியுடன் அணிந்திருந்ததால், இறைவன் அதை மகிழ்ச்சியுடன் ஏற்றுக்கொண்டதாக சொல்லப்படுகிறது. கோதாதேவி இறைவனுக்காக அழகான பாசுரங்களை இயற்றினாள், அவையே திருப்பாவை. இறுதியில், அவள் ஒரு பெரிய ஊர்வலத்தில் கோயிலுக்கு அழைத்துச் செல்லப்பட்டு இறைவனுடன் திருமணத்தில் இணைந்தாள், இதுவே ஸ்ரீ கோதா கல்யாணம், ஒரு பக்தையின் அன்பு நித்தியமானதாக மாறுவதைக் கொண்டாடும் விழா.",
      temple: "கோயில் கோதாதேவிக்கும் இறைவனுக்கும் இடையே ஒரு விரிவான கல்யாணோத்சவம் நடத்துகிறது, திருமண அலங்காரங்கள், புனித திருமண நூல், திருப்பாவை பாசுரங்களின் ஓதுதலுடன்.",
      why: "கோதா கல்யாணம், தூய, உறுதியான இதயத்துடன் செய்யப்படும் பக்தி நித்தியமானதாக மாறும் அளவுக்கு சக்திவாய்ந்தது என்பதை நினைவூட்டுகிறது. தான் மிகவும் நேசித்ததைப் பின்பற்றிய ஒரு பெண்ணின் தைரியத்தையும் இது கொண்டாடுகிறது.",
      shlokaSanskrit: "மார்கழித் திங்கள் மதிநிறைந்த நன்னாளால் ।\nநீராடப் போதுவீர் போதுமினோ நேரிழையீர் ॥",
      shlokaTranslit: "மார்கழித் திங்கள் மதிநிறைந்த நன்னாளால்,\nநீராடப் போதுவீர் போதுமினோ நேரிழையீர்",
      shlokaMeaning: "இந்த அழகிய முழு நிலவு மார்கழி மாதத்தில், நாம் அனைவரும் சேர்ந்து நீராடி வழிபட செல்வோம், நமது சிறந்த ஆடைகளை அணிந்து, தோழிகளை இந்த புனித நோன்பில் சேர அழைத்து.",
      quiz: [
        {q:"குழந்தை கோதாதேவி எங்கு கிடைத்தாள்?", opts:["துளசி செடியின் கீழ்","ஆற்றில்","காட்டில்"], a:0},
        {q:"சமர்ப்பிக்கும் முன் கோதாதேவி மாலைகளுடன் என்ன செய்வாள்?", opts:["முதலில் தானே அணிவாள்","எறிந்துவிடுவாள்","விற்றுவிடுவாள்"], a:0},
        {q:"கோதாதேவி விஷ்ணுவுக்காக எந்த அழகான பாசுரங்களை இயற்றினாள்?", opts:["திருப்பாவை","ஒரு சமையல் புத்தகம்","நடன வழிகாட்டி"], a:0},
        {q:"ஸ்ரீ கோதா கல்யாணத்தில் என்ன கொண்டாடப்படுகிறது?", opts:["இறைவனுடன் அவளது திருமணம்","அவளது பிறந்தநாள்","அவளது பிரியாவிடை"], a:0}
      ]
    }
  },

  makarasankranti: {
    en: {

      story: "Makara Sankranti marks the day the sun begins its six-month journey northward, called Uttarayana, moving into the zodiac sign of Makara (Capricorn). Farmers celebrate it as a harvest festival, giving thanks for the crops that fed their families through the year. In Tamil Nadu, this same time is celebrated as Pongal, named after a sweet rice dish made by boiling fresh rice, milk, and jaggery until it overflows the pot, a symbol of abundance overflowing into the new season. Families decorate their homes with colorful kolams (rice flour designs), fly kites that dance in the winter sky, and give thanks to the sun, the cows, and the farmers who make their lives possible.",

    te: {

      why: "మకర సంక్రాంతి కేవలం భగవానుడికే కాకుండా, సూర్యుడికి, వర్షానికి, భూమికి, జంతువులకు, ప్రతిరోజూ నిశ్శబ్దంగా మన కంచాన్ని నింపే వ్యక్తులకు కూడా కృతజ్ఞులమై ఉండాలని గుర్తుచేస్తుంది.",
      shlokaSanskrit: "जपाकुसुम संकाशं काश्यपेयं महाद्युतिम् ।\nतमोऽरिं सर्वपापघ्नं प्रणतोऽस्मि दिवाकरम् ॥",

    ta: {
      title: "மகர சங்கராந்தி",
      sub: "சூரியனின் புதிய பருவத்திற்கான பயணம், அறுவடை நன்றி விழா",
      story: "மகர சங்கராந்தி சூரியன் தனது ஆறு மாத உத்தராயண பயணத்தைத் தொடங்கும் நாளைக் குறிக்கிறது, மகர ராசிக்குள் நுழைந்து. விவசாயிகள் இதை அறுவடைத் திருவிழாவாகக் கொண்டாடுகின்றனர், ஆண்டு முழுவதும் தங்கள் குடும்பங்களுக்கு உணவளித்த பயிர்களுக்கு நன்றி தெரிவித்து. தமிழ்நாட்டில், இதே காலம் பொங்கலாகக் கொண்டாடப்படுகிறது, புதிய அரிசி, பால், வெல்லத்தை பானை நிரம்பி வழியும் வரை காய்ச்சி தயாரிக்கப்படும் இனிப்பு உணவின் பெயரால், இது புதிய பருவத்திற்குள் வழியும் செழிப்பின் அடையாளம். குடும்பங்கள் தங்கள் வீடுகளை வண்ணமயமான கோலங்களால் அலங்கரிக்கின்றன, குளிர்கால வானில் நடனமாடும் பட்டங்களை பறக்கவிடுகின்றன, சூரியன், பசுக்கள், தங்கள் வாழ்க்கையை சாத்தியமாக்கும் விவசாயிகளுக்கு நன்றி தெரிவிக்கின்றன.",
      temple: "கோயில் ஒரு சிறப்பு சூரிய பூஜை செய்கிறது, முதன்மை தெய்வத்திற்கு அபிஷேகத்துடன், அடிக்கடி புதிதாக சமைத்த பொங்கல் அல்லது இனிப்பு சாதம் பக்தர்களுக்கு பிரசாதமாக வழங்கப்படுகிறது.",
      why: "மகர சங்கராந்தி, கடவுளுக்கு மட்டுமல்ல, சூரியனுக்கும், மழைக்கும், பூமிக்கும், விலங்குகளுக்கும், தினமும் அமைதியாக நமது தட்டை நிரப்பும் மனிதர்களுக்கும் நன்றியுள்ளவர்களாக இருக்க வேண்டும் என்பதை நினைவூட்டுகிறது.",
      shlokaSanskrit: "जपाकुसुम संकाशं काश्यपेयं महाद्युतिम् ।\nतमोऽरिं सर्वपापघ्नं प्रणतोऽस्मि दिवाकरम् ॥",
      shlokaTranslit: "ஜபாகுசும சங்காசம் காச்யபேயம் மஹாத்யுதிம்,\nதமோऽரிம் சர்வபாபக்நம் ப்ரணதோऽஸ்மி திவாகரம்",
      shlokaMeaning: "செம்பருத்தி மலர் போல ஒளிரும், கசியப முனிவரின் மகனான, மிகுந்த ஒளி கொண்ட, இருளின் எதிரியான, அனைத்து பாவங்களையும் அழிக்கும் சூரிய பகவானுக்கு நான் வணங்குகிறேன்.",
      quiz: [
        {q:"மகர சங்கராந்தி எதன் தொடக்கத்தைக் குறிக்கிறது?", opts:["உத்தராயணம், சூரியனின் வடக்கு பயணம்","மழைக்காலம்","குளிர்கால விடுமுறை"], a:0},
        {q:"தமிழ்நாட்டில் இந்த திருவிழாவிற்கு சிறப்பாக தயாரிக்கப்படும் இனிப்பு எது?", opts:["பொங்கல்","மோதகம்","லட்டு"], a:0},
        {q:"இந்த திருவிழாவின்போது குடும்பங்கள் எதை பறக்கவிடுகின்றன?", opts:["பட்டங்கள்","பலூன்கள்","காகித படகுகள்"], a:0},
        {q:"வழியும் பொங்கல் பானை எதைக் குறிக்கிறது?", opts:["புதிய பருவத்திற்குள் வழியும் செழிப்பு","சமையல் தவறு","குடும்பங்களுக்கு இடையேயான போட்டி"], a:0}

    te: {
      title: "శ్రీ మహాలక్ష్మి జయంతి",
      sub: "లక్ష్మీదేవి ఆవిర్భావ దినం",
      story: "దేవతలు, రాక్షసులు అమృతం కోసం మహాసముద్రాన్ని మథించినప్పుడు, అమృతం రాకముందే సముద్రం నుండి అనేక అద్భుతమైన వస్తువులు ఉద్భవించాయి. వాటిలో అత్యంత సుందరమైనది స్వయంగా లక్ష్మీదేవి, ఆమె కమలంపై కూర్చుని, ప్రకాశవంతంగా, చేతుల్లో కమల పుష్పాలు ధరించి సముద్రం నుండి ఉద్భవించింది. దేవతలందరూ ఆమె కృప, సౌందర్యం చూసి ఆశ్చర్యపోయారు. విష్ణువు ఆమెను తన శాశ్వత సహధర్మచారిణిగా ఎంచుకున్నాడు, ఆమె సంపద, సమృద్ధి, ధైర్యం, అదృష్టానికి దేవతగా మారింది, కేవలం ధనమే కాక ఆరోగ్యం, జ్ఞానం, ఇంటి ఆనందాన్ని కూడా ఆశీర్వదిస్తుంది. మహాలక్ష్మి జయంతి ఆమె ఈ రూపంలో ఆవిర్భవించిన రోజును జరుపుకుంటుంది, నిజమైన సమృద్ధి కేవలం అదృష్టం వల్ల కాక, ప్రయత్నం, సహనంతో మథించినప్పుడు ఉదయిస్తుందని గుర్తుచేస్తూ.",
      temple: "దేవాలయం లక్ష్మీదేవికి ప్రత్యేక అభిషేకం, పూజ చేస్తుంది, తరచుగా కమల పుష్పాలతో, భక్తులు తమ కుటుంబాల సమృద్ధి, శ్రేయస్సు కోసం ప్రార్థిస్తారు.",
      why: "లక్ష్మి జయంతి నిజమైన సంపద కేవలం డబ్బు కంటే ఎక్కువని గుర్తుచేస్తుంది, అందులో ఆరోగ్యం, జ్ఞానం, ధైర్యం, ఆనందకరమైన ఇల్లు కూడా ఉంటాయి, ఇవన్నీ తరచుగా సముద్ర మథనంలా సహనపూర్వక ప్రయత్నం నుండే వస్తాయి.",
      shlokaSanskrit: "नमस्तेऽस्तु महामाये श्रीपीठे सुरपूजिते ।\nशङ्खचक्रगदाहस्ते महालक्ष्मि नमोऽस्तु ते ॥",
      shlokaTranslit: "నమస్తేఽస్తు మహామాయే శ్రీపీఠే సురపూజితే,\nశంఖచక్రగదాహస్తే మహాలక్ష్మి నమోఽస్తు తే",
      shlokaMeaning: "మహామాయా, పవిత్ర పీఠంపై ఆసీనురాలైన, దేవతలచే పూజింపబడే, నీ చేతుల్లో శంఖం, చక్రం, గదను ధరించిన మహాలక్ష్మీ, నీకు నమస్కారం.",
      quiz: [
        {q:"సముద్ర మథనంలో లక్ష్మి ఎలా ఆవిర్భవించింది?", opts:["కమలంపై కూర్చుని సముద్రం నుండి ఉద్భవించి","ఆకాశం నుండి పడిపోయి","అడవి నుండి నడిచి వచ్చి"], a:0},
        {q:"లక్ష్మిని తన శాశ్వత సహధర్మచారిణిగా ఎవరు ఎంచుకున్నారు?", opts:["శివుడు","విష్ణువు","బ్రహ్మ"], a:1},
        {q:"సంపదతో పాటు లక్ష్మి ఇంకా ఏమి ఆశీర్వదిస్తుంది?", opts:["కేవలం బంగారం","ఆరోగ్యం, జ్ఞానం, ఆనందం కూడా","కేవలం దీర్ఘాయువు"], a:1},
        {q:"మహాలక్ష్మి జయంతి నిజమైన సంపదలో ఏమి ఉంటుందని గుర్తుచేస్తుంది?", opts:["కేవలం డబ్బు","ఆరోగ్యం, జ్ఞానం, ధైర్యం, ఆనందకరమైన ఇల్లు","కేవలం ఆభరణాలు"], a:1}
      ]
    },
    ta: {
      title: "ஸ்ரீ மகாலட்சுமி ஜயந்தி",
      sub: "லட்சுமி தேவியின் தோற்ற நாள்",
      story: "தேவர்களும் அசுரர்களும் அமிர்தத்திற்காக பெருங்கடலைக் கடைந்தபோது, அமிர்தம் வருவதற்கு முன் கடலிலிருந்து பல அற்புதமான பொருட்கள் தோன்றின. அவற்றில் மிக அழகானது லட்சுமி தேவியே, அவள் தாமரையில் அமர்ந்து, பிரகாசமாக, கைகளில் தாமரை மலர்களுடன் கடலிலிருந்து தோன்றினாள். தேவர்கள் அனைவரும் அவளது அருள், அழகைக் கண்டு வியந்தனர். விஷ்ணு அவளை தனது நித்திய துணையாகத் தேர்ந்தெடுத்தார், அவள் செல்வம், செழிப்பு, தைரியம், நல்வாழ்வின் தேவியானாள், செல்வத்தை மட்டுமல்ல நல்ல ஆரோக்கியம், ஞானம், மகிழ்ச்சியான வீட்டையும் அருளுகிறாள். மகாலட்சுமி ஜயந்தி அவள் இந்த வடிவில் தோன்றிய நாளைக் கொண்டாடுகிறது, உண்மையான செழிப்பு அதிர்ஷ்டத்தால் மட்டுமல்ல, முயற்சி, பொறுமையால் கடையும்போது எழுகிறது என்பதை நினைவூட்டுகிறது.",
      temple: "கோயில் லட்சுமி தேவிக்கு சிறப்பு அபிஷேகமும் பூஜையும் செய்கிறது, அடிக்கடி தாமரை மலர்களுடன், பக்தர்கள் தங்கள் குடும்பங்களின் செழிப்புக்கும் நல்வாழ்வுக்கும் பிரார்த்திக்கிறார்கள்.",
      why: "லட்சுமி ஜயந்தி உண்மையான செல்வம் பணத்தை விட அதிகம் என்பதை நினைவூட்டுகிறது, அதில் ஆரோக்கியம், ஞானம், தைரியம், மகிழ்ச்சியான வீடும் அடங்கும், இவை அனைத்தும் பெரும்பாலும் கடல் கடைவது போல பொறுமையான முயற்சியிலிருந்தே வருகின்றன.",
      shlokaSanskrit: "नमस्तेऽस्तु महामाये श्रीपीठे सुरपूजिते ।\nशङ्खचक्रगदाहस्ते महालक्ष्मि नमोऽस्तु ते ॥",
      shlokaTranslit: "நமஸ்தேஸ்து மஹாமாயே ஸ்ரீபீடே ஸுரபூஜிதே,\nசங்கசக்ரகதாஹஸ்தே மஹாலக்ஷ்மி நமோஸ்து தே",
      shlokaMeaning: "மகாமாயையே, புனித பீடத்தில் அமர்ந்தவளே, தேவர்களால் வழிபடப்படுபவளே, உன் கைகளில் சங்கு, சக்கரம், கதை ஏந்தியவளே, மகாலட்சுமியே, உனக்கு வணக்கம்.",
      quiz: [
        {q:"கடல் கடையும் போது லட்சுமி எப்படி தோன்றினாள்?", opts:["தாமரையில் அமர்ந்து கடலிலிருந்து எழுந்து","வானத்திலிருந்து விழுந்து","காட்டிலிருந்து நடந்து வந்து"], a:0},
        {q:"லட்சுமியை தனது நித்திய துணையாக யார் தேர்ந்தெடுத்தார்?", opts:["சிவன்","விஷ்ணு","பிரம்மா"], a:1},
        {q:"செல்வத்துடன் லட்சுமி வேறு எதை அருளுகிறாள்?", opts:["தங்கம் மட்டும்","ஆரோக்கியம், ஞானம், மகிழ்ச்சியும்","நீண்ட ஆயுள் மட்டும்"], a:1},
        {q:"மகாலட்சுமி ஜயந்தி உண்மையான செல்வத்தில் என்ன அடங்கும் என்று நினைவூட்டுகிறது?", opts:["பணம் மட்டும்","ஆரோக்கியம், ஞானம், தைரியம், மகிழ்ச்சியான வீடு","நகைகள் மட்டும்"], a:1}
      ]
    }
  },

  yugadi: {
    en: {
      title: "Yugadi (Ugadi)",
      sub: "The Telugu and Kannada New Year",
      story: "Yugadi, meaning 'the beginning of a new age,' is celebrated as the first day of the new year in the Telugu and Kannada calendars. According to belief, this is the day Lord Brahma began creating the universe, setting time itself into motion. On this day, families prepare a special dish called Ugadi Pachadi, a mixture of six different tastes, sweet jaggery, sour tamarind, bitter neem flowers, spicy chili, salty salt, and tangy raw mango, all mixed together in one small bowl. Eating this reminds everyone that life itself is a mixture of happiness, sadness, challenges, and surprises, all arriving together, and that we should accept the whole mixture with grace, not just the sweet parts.",
      temple: "The temple performs special new year prayers and often reads the Panchangam (the yearly almanac) aloud to the community, sharing predictions and important dates for the year ahead.",
      why: "Ugadi Pachadi teaches us, right at the start of a new year, that a good life isn't only about sweetness, it's about accepting every taste life brings, and finding balance in all of them.",
      shlokaSanskrit: "ॐ असतो मा सद्गमय । तमसो मा ज्योतिर्गमय ।\nमृत्योर्मा अमृतं गमय ॥",
      shlokaTranslit: "Om Asato Ma Sadgamaya, Tamaso Ma Jyotirgamaya,\nMrityor Ma Amritam Gamaya",
      shlokaMeaning: "Lead me from the unreal to the real, lead me from darkness to light, lead me from death to immortality.",
      quiz: [

        {q:"Who is believed to have begun creating the universe on this day?", opts:["Shiva","Brahma","Indra"], a:1},
        {q:"How many different tastes are mixed in Ugadi Pachadi?", opts:["Six","Three","Ten"], a:0},
        {q:"What does eating Ugadi Pachadi remind us of?", opts:["Only sweet things in life","Life is a mixture of many feelings","We should avoid bitter foods"], a:1}
      ]
    },
    hi: {
      title: "युगादि (उगादि)",
      sub: "तेलुगु और कन्नड़ नववर्ष",
      story: "युगादि, जिसका अर्थ है 'एक नए युग की शुरुआत,' तेलुगु और कन्नड़ पंचांगों में नए साल के पहले दिन के रूप में मनाया जाता है। मान्यता है कि यही वह दिन है जब भगवान ब्रह्मा ने सृष्टि की रचना शुरू की, समय को स्वयं गति में लाते हुए। इस दिन, परिवार उगादि पचड़ी नाम का एक विशेष व्यंजन तैयार करते हैं, जो छह अलग-अलग स्वादों का मिश्रण होता है, मीठा गुड़, खट्टी इमली, कड़वे नीम के फूल, तीखी मिर्च, नमकीन नमक, और तीखा कच्चा आम, सभी को एक छोटे कटोरे में मिलाया जाता है। इसे खाना सबको याद दिलाता है कि जीवन स्वयं खुशी, दुख, चुनौतियों, और आश्चर्यों का मिश्रण है, सब एक साथ आते हैं, और हमें केवल मीठे हिस्सों को नहीं, पूरे मिश्रण को शालीनता से स्वीकार करना चाहिए।",
      temple: "मंदिर विशेष नववर्ष प्रार्थनाएँ करता है और अक्सर पंचांग (वार्षिक कैलेंडर) को समुदाय के सामने पढ़कर सुनाता है, आने वाले वर्ष की भविष्यवाणियाँ और महत्वपूर्ण तिथियाँ साझा करते हुए।",
      why: "उगादि पचड़ी हमें, नए साल की शुरुआत में ही, यह सिखाती है कि एक अच्छा जीवन केवल मिठास के बारे में नहीं है, यह जीवन के हर स्वाद को स्वीकार करने और उन सबमें संतुलन खोजने के बारे में है।",
      shlokaSanskrit: "ॐ असतो मा सद्गमय । तमसो मा ज्योतिर्गमय ।\nमृत्योर्मा अमृतं गमय ॥",
      shlokaTranslit: null,
      shlokaMeaning: "मुझे असत्य से सत्य की ओर ले चलो, मुझे अंधकार से प्रकाश की ओर ले चलो, मुझे मृत्यु से अमरता की ओर ले चलो।",

    te: {
      title: "యుగాది (ఉగాది)",
      sub: "తెలుగు, కన్నడ నూతన సంవత్సరం",
      story: "యుగాది అంటే 'ఒక కొత్త యుగపు ఆరంభం' అని అర్థం, తెలుగు, కన్నడ క్యాలెండర్లలో కొత్త సంవత్సరపు మొదటి రోజుగా జరుపుకుంటారు. నమ్మకం ప్రకారం, ఇదే బ్రహ్మదేవుడు సృష్టిని ప్రారంభించిన రోజు, కాలాన్నే గమనంలోకి తెచ్చినది. ఈ రోజు, కుటుంబాలు ఉగాది పచ్చడి అనే ప్రత్యేక వంటకాన్ని తయారు చేస్తాయి, ఆరు వేర్వేరు రుచుల మిశ్రమం, తీపి బెల్లం, పుల్లని చింతపండు, చేదు వేప పువ్వు, కారంగా మిరపకాయ, ఉప్పు, వగరు మామిడికాయ, అన్నీ ఒక చిన్న గిన్నెలో కలిపి. దీనిని తినడం జీవితం అంటే సంతోషం, దుఃఖం, సవాళ్లు, ఆశ్చర్యాల మిశ్రమమని, అన్నీ కలిసి వస్తాయని, మనం తీపి భాగాలను మాత్రమే కాక మొత్తం మిశ్రమాన్ని దయతో స్వీకరించాలని గుర్తుచేస్తుంది.",
      temple: "దేవాలయం ప్రత్యేక నూతన సంవత్సర ప్రార్థనలు నిర్వహిస్తుంది, తరచుగా పంచాంగాన్ని సమాజం ముందు చదివి వినిపిస్తుంది, రాబోయే సంవత్సరపు అంచనాలు, ముఖ్యమైన తేదీలు పంచుకుంటూ.",
      why: "ఉగాది పచ్చడి కొత్త సంవత్సరపు ఆరంభంలోనే, మంచి జీవితం అంటే కేవలం తీపి గురించి కాదని, జీవితం తెచ్చే ప్రతి రుచిని స్వీకరించడం, వాటన్నింటిలో సమతుల్యతను కనుగొనడం అని నేర్పుతుంది.",
      shlokaSanskrit: "ॐ असतो मा सद्गमय । तमसो मा ज्योतिर्गमय ।\nमृत्योर्मा अमृतं गमय ॥",
      shlokaTranslit: "ఓం అసతో మా సద్గమయ, తమసో మా జ్యోతిర్గమయ,\nమృత్యోర్మా అమృతం గమయ",
      shlokaMeaning: "నన్ను అసత్యం నుండి సత్యం వైపు నడిపించు, నన్ను చీకటి నుండి వెలుగు వైపు నడిపించు, నన్ను మృత్యువు నుండి అమరత్వం వైపు నడిపించు.",
      quiz: [
        {q:"'యుగాది' అంటే అర్థం ఏమిటి?", opts:["సంవత్సరపు ముగింపు","ఒక కొత్త యుగపు ఆరంభం","పంట పండుగ"], a:1},

        {q:"ఉగాది పచ్చడిలో ఎన్ని రుచులు కలుపుతారు?", opts:["ఆరు","మూడు","పది"], a:0},
        {q:"ఉగాది పచ్చడి తినడం మనకు ఏమి గుర్తుచేస్తుంది?", opts:["జీవితంలో తీపి విషయాలు మాత్రమే","జీవితం అనేక భావాల మిశ్రమం","చేదు ఆహారాలను నివారించాలి"], a:1}

    ta: {
      title: "உகாதி (யுகாதி)",
      sub: "தெலுங்கு, கன்னட புத்தாண்டு",
      story: "உகாதி என்றால் 'ஒரு புதிய யுகத்தின் தொடக்கம்' என்று பொருள், தெலுங்கு, கன்னட நாட்காட்டிகளில் புத்தாண்டின் முதல் நாளாகக் கொண்டாடப்படுகிறது. நம்பிக்கையின்படி, இதுவே பிரம்மா படைப்பைத் தொடங்கிய நாள், காலத்தையே இயக்கத்தில் வைத்தது. இந்நாளில், குடும்பங்கள் உகாதி பச்சடி என்ற சிறப்பு உணவைத் தயாரிக்கின்றன, ஆறு வெவ்வேறு சுவைகளின் கலவை, இனிப்பான வெல்லம், புளிப்பான புளி, கசப்பான வேப்பம் பூக்கள், காரமான மிளகாய், உப்பு, துவர்ப்பான மாங்காய், அனைத்தும் ஒரு சிறிய கிண்ணத்தில் கலக்கப்படுகின்றன. இதை உண்பது வாழ்க்கை என்பது மகிழ்ச்சி, சோகம், சவால்கள், ஆச்சரியங்களின் கலவை, அனைத்தும் ஒன்றாக வருகின்றன, இனிப்பான பகுதிகளை மட்டும் அல்ல, முழு கலவையையும் அருளுடன் ஏற்றுக்கொள்ள வேண்டும் என்பதை நினைவூட்டுகிறது.",
      temple: "கோயில் சிறப்பு புத்தாண்டு பிரார்த்தனைகளை நடத்துகிறது, அடிக்கடி பஞ்சாங்கத்தை சமூகத்திற்கு முன் வாசித்து, வரவிருக்கும் ஆண்டின் கணிப்புகள், முக்கியமான தேதிகளைப் பகிர்கிறது.",
      why: "உகாதி பச்சடி, புத்தாண்டின் தொடக்கத்திலேயே, ஒரு நல்ல வாழ்க்கை என்பது இனிப்பு மட்டுமல்ல, வாழ்க்கை கொண்டுவரும் ஒவ்வொரு சுவையையும் ஏற்று, அவை அனைத்திலும் சமநிலையைக் கண்டறிவது என்பதைக் கற்பிக்கிறது.",
      shlokaSanskrit: "ॐ असतो मा सद्गमय । तमसो मा ज्योतिर्गमय ।\nमृत्योर्मा अमृतं गमय ॥",
      shlokaTranslit: "ஓம் அஸதோ மா ஸத்கமய, தமஸோ மா ஜ்யோதிர்கமய,\nம்ருத்யோர்மா அம்ருதம் கமய",
      shlokaMeaning: "என்னை பொய்யிலிருந்து உண்மைக்கு அழைத்துச் செல்லுங்கள், என்னை இருளிலிருந்து ஒளிக்கு அழைத்துச் செல்லுங்கள், என்னை மரணத்திலிருந்து அமரத்துவத்திற்கு அழைத்துச் செல்லுங்கள்.",
      quiz: [
        {q:"'உகாதி' என்றால் என்ன பொருள்?", opts:["ஆண்டின் முடிவு","ஒரு புதிய யுகத்தின் தொடக்கம்","அறுவடை திருவிழா"], a:1},
        {q:"இந்நாளில் யார் படைப்பைத் தொடங்கினார் என நம்பப்படுகிறது?", opts:["சிவன்","பிரம்மா","இந்திரன்"], a:1},
        {q:"உகாதி பச்சடியில் எத்தனை சுவைகள் கலக்கப்படுகின்றன?", opts:["ஆறு","மூன்று","பத்து"], a:0},
        {q:"உகாதி பச்சடி உண்பது நமக்கு எதை நினைவூட்டுகிறது?", opts:["வாழ்க்கையில் இனிப்பானவை மட்டும்","வாழ்க்கை பல உணர்வுகளின் கலவை","கசப்பான உணவுகளை தவிர்க்க வேண்டும்"], a:1}
      ]
    }
