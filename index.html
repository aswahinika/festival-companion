      title: "హనుమాన్ జయంతి",
      sub: "హనుమంతుని జన్మదినం",
      story: "శిశువుగా, హనుమంతుడు అసాధారణంగా బలవంతుడు, అల్లరివాడు. ఒక ఉదయం, ఆకాశంలో ఎర్రగా ప్రకాశించే సూర్యుడిని చూసి, బాల హనుమంతుడు దానిని పండిన పండుగా భావించి, దానిని పట్టుకుని తినడానికి ఆకాశంలోకి ఎగిరాడు. అతను ఎంత ఎత్తుగా, వేగంగా ఎగిరాడంటే దేవేంద్రుడు కూడా కంగారుపడి తన వజ్రాయుధంతో కొట్టాడు, దీనివల్ల హనుమంతుడు పడిపోయి తన దవడను గాయపరచుకున్నాడు, అందుకే అతన్ని హనుమాన్, 'వాచిన దవడ కలవాడు' అని కూడా పిలుస్తారు. అతని తండ్రి, వాయుదేవుడు, కోపంతో నిరసనగా ప్రపంచం నుండి గాలిని ఉపసంహరించుకున్నాడు, దేవతలు వాయువును శాంతింపజేయడానికి బాల హనుమంతుడికి శక్తి, జ్ఞానం, అమరత్వం వంటి అద్భుతమైన వరాలు ఇచ్చే వరకు. హనుమంతుడు పెరిగి రాముని అత్యంత భక్తుడైన సహాయకుడయ్యాడు, తన అద్భుత శక్తి, విధేయతతో సీతను రావణుడి నుండి రక్షించడంలో సహాయపడి, ఒకే ఎగురులో సముద్రాన్ని దాటి లంక చేరుకున్నాడు.",
      temple: "దేవాలయం హనుమంతుని విగ్రహానికి ప్రత్యేక అభిషేకం చేసి, సిందూరం, వెన్నను సమర్పిస్తుంది, వీటిని భక్తులు అతనికి ప్రత్యేకంగా ఇష్టమైనవిగా భావిస్తారు.",
      why: "నిజమైన శక్తిని ఇతరుల సేవలో ఉపయోగించడం ఉత్తమమని, మన కోసం కాదని, భక్తి, విధేయత అసాధ్యమైనదాన్ని కూడా సాధ్యం చేయగలవని హనుమంతుడు గుర్తుచేస్తాడు.",
      shlokaSanskrit: "मनोजवं मारुततुल्यवेगं जितेन्द्रियं बुद्धिमतां वरिष्ठम् ।\nवातात्मजं वानरयूथमुख्यं श्रीरामदूतं शरणं प्रपद्ये ॥",
      shlokaTranslit: "మనోజవం మారుతతుల్యవేగం జితేంద్రియం బుద్ధిమతాం వరిష్ఠం,\nవాతాత్మజం వానరయూథముఖ్యం శ్రీరామదూతం శరణం ప్రపద్యే",
      shlokaMeaning: "మనసు వలె వేగవంతుడు, వాయువు వలె వేగంగా ఉన్నవాడు, ఇంద్రియాలను జయించినవాడు, బుద్ధిమంతులలో శ్రేష్ఠుడు, వాయుదేవుని కుమారుడు, వానర సేనలో ముఖ్యుడు, శ్రీరాముని భక్త దూతయైన హనుమంతుని నేను శరణు వేడుతున్నాను.",
      quiz: [
        {q:"బాల హనుమంతుడు ఉదయించే సూర్యుడిని దేనిగా భావించాడు?", opts:["పండిన పండు","బంతి","దీపం"], a:0},
        {q:"హనుమంతుని తండ్రి ఎవరు?", opts:["ఇంద్రుడు","వాయుదేవుడు","సూర్యుడు"], a:1},
        {q:"సీతను రక్షించడంలో సహాయపడటానికి హనుమంతుడు ఏ అద్భుత కార్యం చేశాడు?", opts:["సముద్రాన్ని దాటి లంకకు ఎగిరాడు","పడవ కట్టాడు","రావణుడిని మర్యాదగా అడిగాడు"], a:0},
        {q:"హనుమంతుడు మన శక్తిని దేనికోసం ఉపయోగించాలని గుర్తుచేస్తాడు?", opts:["కేవలం మన కోసం","ఇతరుల సేవలో","పోరాటాలు గెలవడానికి"], a:1}
      ]
    },
    ta: {
      title: "அனுமன் ஜயந்தி",
      sub: "அனுமனின் பிறந்த நாள்",
      story: "குழந்தையாக இருந்தபோது, அனுமன் அசாதாரணமான வலிமையும் குறும்பும் கொண்டவனாக இருந்தான். ஒரு காலையில், வானில் சிவப்பாக ஒளிரும் சூரியன் உதயமாவதைக் கண்டு, சிறு அனுமன் அதை பழுத்த பழம் என்று தவறாக நினைத்து, அதைப் பிடித்து உண்ண வானத்தில் குதித்தான். அவன் மிக உயரமாகவும் வேகமாகவும் பறந்ததால், தேவேந்திரன் கூட பயந்து தன் வஜ்ராயுதத்தால் தாக்கினான், இதனால் அனுமன் விழுந்து தாடையை காயப்படுத்திக்கொண்டான், அதனால்தான் அவனை அனுமன், 'வீங்கிய தாடை உடையவன்' என்றும் அழைக்கிறோம். அவனது தந்தை, வாயு தேவன், கோபமடைந்து எதிர்ப்பாக உலகிலிருந்து காற்றை முழுவதும் திரும்பப் பெற்றான், தேவர்கள் வாயுவை அமைதிப்படுத்த சிறு அனுமனுக்கு வலிமை, ஞானம், அமரத்துவம் போன்ற அபூர்வ வரங்களை அருளும் வரை. அனுமன் வளர்ந்து ராமரின் மிகவும் பக்தியுள்ள உதவியாளனானான், தனது அபார வலிமையும் விசுவாசமும் கொண்டு சீதையை இராவணனிடமிருந்து மீட்க உதவினான், ஒரே தாவலில் கடலைத் தாண்டி இலங்கை சென்றான்.",
      temple: "கோயில் அனுமன் சிலைக்கு சிறப்பு அபிஷேகம் செய்து சிந்தூரமும் வெண்ணெயும் வழங்குகிறது, இவை அவனுக்கு மிகவும் பிடித்தமானவை என்று பக்தர்கள் நம்புகிறார்கள்.",
      why: "உண்மையான வலிமையை நமக்காக அல்ல, மற்றவர்களுக்கு சேவை செய்யப் பயன்படுத்துவதே சிறந்தது என்றும், பக்தியும் விசுவாசமும் சாத்தியமற்றதையும் சாத்தியமாக்க முடியும் என்றும் அனுமன் நினைவூட்டுகிறான்.",
      shlokaSanskrit: "मनोजवं मारुततुल्यवेगं जितेन्द्रियं बुद्धिमतां वरिष्ठम् ।\nवातात्मजं वानरयूथमुख्यं श्रीरामदूतं शरणं प्रपद्ये ॥",
      shlokaTranslit: "மனோஜவம் மாருததுல்யவேகம் ஜிதேந்திரியம் புத்திமதாம் வரிஷ்டம்,\nவாதாத்மஜம் வானரயூதமுக்யம் ஸ்ரீராமதூதம் சரணம் ப்ரபத்யே",
      shlokaMeaning: "மனதைப் போல வேகமானவனும், காற்றைப் போல விரைவானவனும், புலன்களை வென்றவனும், ஞானிகளில் சிறந்தவனும், வாயு தேவனின் மகனும், வானர சேனையின் தலைவனும், ஸ்ரீராமரின் பக்தியுள்ள தூதுவனுமான அனுமனிடம் நான் சரணடைகிறேன்.",
      quiz: [
        {q:"சிறு அனுமன் உதயமாகும் சூரியனை எதுவென்று நினைத்தான்?", opts:["பழுத்த பழம்","பந்து","விளக்கு"], a:0},
        {q:"அனுமனின் தந்தை யார்?", opts:["இந்திரன்","வாயு தேவன்","சூரியன்"], a:1},
        {q:"சீதையை மீட்க உதவ அனுமன் என்ன அபூர்வ செயலைச் செய்தான்?", opts:["கடலைத் தாண்டி இலங்கைக்குத் தாவினான்","படகு கட்டினான்","இராவணனிடம் மரியாதையாகக் கேட்டான்"], a:0},
        {q:"நமது வலிமையை எதற்காகப் பயன்படுத்த வேண்டும் என்று அனுமன் நினைவூட்டுகிறான்?", opts:["நமக்காக மட்டும்","மற்றவர்களுக்கு சேவை செய்ய","சண்டைகளில் வெல்ல"], a:1}
      ]
    }
  },

  sivalayavarshikotsavam: {
    en: {
      title: "Sivalaya Varshikotsavam",
      sub: "The annual festival of the temple's Shiva shrine",
      story: "Every temple that has its own Shiva Aalayam (a separate shrine for Lord Shiva) celebrates a special multi-day festival each year to honor that shrine specifically, called the Varshikotsavam, meaning 'yearly celebration.' During these days, the temple retells stories of Shiva's marriage to Parvati, his role as the cosmic dancer (Nataraja), and his compassion in protecting the world. Each day of the festival often has a different theme or procession, giving the community several days to celebrate Shiva together, not just for one night like Maha Shivaratri, but across an entire joyful festival period.",
      temple: "Over several days, the Shiva Aalayam holds special abhishekams, processions of the utsava murti (festival deity) around the temple grounds, and cultural programs like music and dance in Shiva's honor.",
      why: "Having an annual festival, not just one special night, reminds us that devotion isn't only for the biggest occasions, it's something worth celebrating together as a community, again and again, every year.",
      shlokaSanskrit: "कर्पूरगौरं करुणावतारं संसारसारं भुजगेन्द्रहारम् ।\nसदावसन्तं हृदयारविन्दे भवं भवानीसहितं नमामि ॥",

      shlokaMeaning: "I bow to Shiva, white as camphor, the very form of compassion, the essence of all existence, wearing a garland of serpents, who always dwells in the lotus of my heart, together with Goddess Bhavani (Parvati).",
      quiz: [
        {q:"What does 'Varshikotsavam' mean?", opts:["A daily prayer","A yearly celebration","A wedding"], a:1},
        {q:"What kind of shrine has its own Varshikotsavam here?", opts:["The Shiva Aalayam","The parking lot","The kitchen"], a:0},
        {q:"What is carried around the temple grounds during the festival?", opts:["The utsava murti (festival deity)","A copy of the Vedas only","A flag only"], a:0},
        {q:"How is Varshikotsavam different from Maha Shivaratri?", opts:["It happens every hour","It celebrates across several days, not just one night","It only happens once in a lifetime"], a:1}
      ]
    },
    hi: {
      title: "शिवालय वार्षिकोत्सवम्",
      sub: "मंदिर के शिव मंदिर का वार्षिक उत्सव",
      story: "हर वह मंदिर जिसमें अपना अलग शिवालय (भगवान शिव के लिए एक अलग मंदिर) होता है, हर साल उस मंदिर विशेष के सम्मान में एक विशेष बहु-दिवसीय उत्सव मनाता है, जिसे वार्षिकोत्सवम् कहते हैं, जिसका अर्थ है 'वार्षिक उत्सव।' इन दिनों के दौरान, मंदिर शिव के पार्वती से विवाह, ब्रह्मांडीय नर्तक (नटराज) के रूप में उनकी भूमिका, और संसार की रक्षा में उनकी करुणा की कहानियाँ फिर से सुनाता है। उत्सव के हर दिन का अक्सर एक अलग विषय या शोभायात्रा होती है, जिससे समुदाय को शिव का उत्सव साथ मनाने के लिए, केवल महाशिवरात्रि की एक रात नहीं, बल्कि पूरी एक आनंदमय उत्सव अवधि मिलती है।",
      temple: "कई दिनों में, शिवालय विशेष अभिषेक, मंदिर परिसर में उत्सव मूर्ति (उत्सव देवता) की शोभायात्राएँ, और शिव के सम्मान में संगीत व नृत्य जैसे सांस्कृतिक कार्यक्रम आयोजित करता है।",
      why: "केवल एक विशेष रात ही नहीं, बल्कि एक वार्षिक उत्सव होना हमें याद दिलाता है कि भक्ति केवल सबसे बड़े अवसरों के लिए नहीं है, यह हर साल बार-बार समुदाय के साथ मिलकर मनाने लायक चीज़ है।",
      shlokaSanskrit: "कर्पूरगौरं करुणावतारं संसारसारं भुजगेन्द्रहारम् ।\nसदावसन्तं हृदयारविन्दे भवं भवानीसहितं नमामि ॥",
      shlokaTranslit: null,
      shlokaMeaning: "मैं शिव को नमन करता हूँ, जो कपूर के समान श्वेत हैं, करुणा के साक्षात् अवतार हैं, समस्त अस्तित्व के सार हैं, सर्पों की माला पहनते हैं, जो सदा मेरे हृदय कमल में देवी भवानी (पार्वती) के साथ निवास करते हैं।",
      quiz: [

    te: {
      title: "శివాలయ వార్షికోత్సవం",
      sub: "దేవాలయంలోని శివాలయ వార్షిక ఉత్సవం",
      story: "సొంత శివాలయం (శివుని కోసం ప్రత్యేక ఆలయం) ఉన్న ప్రతి దేవాలయం, ఆ ఆలయాన్ని ప్రత్యేకంగా గౌరవించడానికి ప్రతి సంవత్సరం ఒక ప్రత్యేక బహుళ-దినాల ఉత్సవం జరుపుకుంటుంది, దీనిని వార్షికోత్సవం అని పిలుస్తారు, అంటే 'వార్షిక వేడుక.' ఈ రోజుల్లో, దేవాలయం శివుని పార్వతితో వివాహం, విశ్వ నర్తకుడిగా (నటరాజ) అతని పాత్ర, ప్రపంచాన్ని రక్షించడంలో అతని కరుణ కథలను తిరిగి చెబుతుంది. ఉత్సవంలో ప్రతి రోజుకు తరచుగా వేరే ఇతివృత్తం లేదా ఊరేగింపు ఉంటుంది, సమాజానికి శివుని కలిసి జరుపుకోవడానికి, మహాశివరాత్రి వలె కేవలం ఒక రాత్రి కాకుండా, మొత్తం ఆనందకరమైన ఉత్సవ కాలాన్ని అందిస్తుంది.",
      temple: "అనేక రోజుల పాటు, శివాలయం ప్రత్యేక అభిషేకాలు, దేవాలయ ఆవరణ చుట్టూ ఉత్సవ మూర్తి ఊరేగింపులు, శివుని గౌరవార్థం సంగీతం, నృత్యం వంటి సాంస్కృతిక కార్యక్రమాలు నిర్వహిస్తుంది.",
      why: "కేవలం ఒక ప్రత్యేక రాత్రి కాకుండా, వార్షిక ఉత్సవం ఉండటం, భక్తి కేవలం అతిపెద్ద సందర్భాలకే కాదని, ప్రతి సంవత్సరం మళ్లీ మళ్లీ సమాజంతో కలిసి జరుపుకోదగినదని గుర్తుచేస్తుంది.",
      shlokaSanskrit: "कर्पूरगौरं करुणावतारं संसारसारं भुजगेन्द्रहारम् ।\nसदावसन्तं हृदयारविन्दे भवं भवानीसहितं नमामि ॥",
      shlokaTranslit: "కర్పూరగౌరం కరుణావతారం సంసారసారం భుజగేంద్రహారం,\nసదావసంతం హృదయారవిందే భవం భవానీసహితం నమామి",
      shlokaMeaning: "కర్పూరం వలె తెల్లగా ఉండే, కరుణా స్వరూపుడైన, సమస్త అస్తిత్వ సారమైన, సర్పాల హారం ధరించిన, నా హృదయ కమలంలో ఎల్లప్పుడూ భవానీ (పార్వతి) సమేతుడై నివసించే శివునికి నేను నమస్కరిస్తున్నాను.",
      quiz: [
        {q:"'వార్షికోత్సవం' అంటే అర్థం ఏమిటి?", opts:["రోజువారీ ప్రార్థన","వార్షిక వేడుక","వివాహం"], a:1},
        {q:"ఇక్కడ ఏ ఆలయానికి సొంత వార్షికోత్సవం ఉంది?", opts:["శివాలయం","పార్కింగ్ స్థలం","వంటగది"], a:0},
        {q:"ఉత్సవం సమయంలో దేవాలయ ఆవరణ చుట్టూ ఏమి తీసుకువెళతారు?", opts:["ఉత్సవ మూర్తి","వేదాల ప్రతి మాత్రమే","జెండా మాత్రమే"], a:0},
        {q:"వార్షికోత్సవం మహాశివరాత్రికి ఎలా భిన్నంగా ఉంటుంది?", opts:["ఇది ప్రతి గంటకు జరుగుతుంది","ఇది ఒక రాత్రి కాకుండా అనేక రోజులు జరుపుకుంటారు","ఇది జీవితంలో ఒకసారి మాత్రమే జరుగుతుంది"], a:1}
      ]
    },
    ta: {
      title: "சிவாலய வார்ஷிகோத்சவம்",
      sub: "கோயிலின் சிவாலயத்தின் ஆண்டு விழா",
      story: "தனது சொந்த சிவாலயம் (சிவனுக்கான தனி ஆலயம்) கொண்ட ஒவ்வொரு கோயிலும், அந்த ஆலயத்தை சிறப்பாக கௌரவிக்க ஒவ்வொரு ஆண்டும் ஒரு சிறப்பு பல நாள் விழாவைக் கொண்டாடுகிறது, இதை வார்ஷிகோத்சவம் என்று அழைக்கிறோம், அதாவது 'ஆண்டு விழா.' இந்த நாட்களில், கோயில் சிவனின் பார்வதியுடனான திருமணம், அண்ட நடனராஜனாக (நடராஜர்) அவரது பங்கு, உலகைப் பாதுகாப்பதில் அவரது கருணை ஆகிய கதைகளை மீண்டும் சொல்கிறது. விழாவின் ஒவ்வொரு நாளும் அடிக்கடி வெவ்வேறு கருப்பொருள் அல்லது ஊர்வலம் கொண்டிருக்கும், சமூகம் சிவனை ஒன்றாக கொண்டாட, மகா சிவராத்திரி போல ஒரே ஒரு இரவு மட்டுமல்ல, முழு மகிழ்ச்சியான விழா காலம் முழுவதும்.",
      temple: "பல நாட்களில், சிவாலயம் சிறப்பு அபிஷேகங்கள், கோயில் வளாகம் முழுவதும் உற்சவ மூர்த்தி ஊர்வலங்கள், சிவனின் மரியாதைக்காக இசை, நடனம் போன்ற கலாச்சார நிகழ்ச்சிகளை நடத்துகிறது.",
      why: "ஒரே ஒரு சிறப்பு இரவு மட்டுமல்ல, ஆண்டு விழா இருப்பது, பக்தி என்பது மிகப்பெரிய சந்தர்ப்பங்களுக்கு மட்டும் அல்ல, ஒவ்வொரு ஆண்டும் மீண்டும் மீண்டும் சமூகத்துடன் சேர்ந்து கொண்டாடத் தகுந்தது என்பதை நினைவூட்டுகிறது.",
      shlokaSanskrit: "कर्पूरगौरं करुणावतारं संसारसारं भुजगेन्द्रहारम् ।\nसदावसन्तं हृदयारविन्दे भवं भवानीसहितं नमामि ॥",
      shlokaTranslit: "கர்பூரகௌரம் கருணாவதாரம் ஸம்ஸாரஸாரம் புஜகேந்த்ரஹாரம்,\nஸதாவஸந்தம் ஹ்ருதயாரவிந்தே பவம் பவானீஸஹிதம் நமாமி",
      shlokaMeaning: "கற்பூரம் போல வெண்மையானவரும், கருணையின் வடிவமும், அனைத்து இருப்பின் சாரமும், பாம்புகளின் மாலை அணிந்தவரும், எப்போதும் என் இதய தாமரையில் பவானி (பார்வதி) உடன் வசிப்பவருமான சிவனை நான் வணங்குகிறேன்.",
      quiz: [
        {q:"'வார்ஷிகோத்சவம்' என்றால் என்ன பொருள்?", opts:["தினசரி பிரார்த்தனை","ஆண்டு விழா","திருமணம்"], a:1},
        {q:"இங்கு எந்த ஆலயத்திற்கு சொந்த வார்ஷிகோத்சவம் உள்ளது?", opts:["சிவாலயம்","வாகன நிறுத்துமிடம்","சமையலறை"], a:0},
        {q:"விழாவின்போது கோயில் வளாகம் முழுவதும் என்ன கொண்டு செல்லப்படுகிறது?", opts:["உற்சவ மூர்த்தி","வேதங்களின் நகல் மட்டும்","கொடி மட்டும்"], a:0},
        {q:"வார்ஷிகோத்சவம் மகா சிவராத்திரியிலிருந்து எப்படி வேறுபடுகிறது?", opts:["இது ஒவ்வொரு மணி நேரமும் நடக்கும்","இது ஒரு இரவு அல்ல, பல நாட்களில் கொண்டாடப்படுகிறது","இது வாழ்நாளில் ஒரே ஒரு முறை நடக்கும்"], a:1}
      ]
    }
  },

  tamilnewyearvishu: {
    en: {
      title: "Tamil New Year (Puthandu) & Vishu",
      sub: "The solar new year, celebrated across Tamil Nadu and Kerala",
      story: "On the same day each April, Tamil families celebrate Puthandu, their solar new year, while Kerala families celebrate Vishu. Both mark the sun entering a new zodiac sign and beginning a fresh solar year. In Tamil homes, the day begins with families visiting the temple and preparing a special meal representing all six tastes of life, much like Ugadi. In Kerala, families prepare something special the night before called the Vishukkani, an arrangement of auspicious items, a mirror, gold jewelry, fruits, rice, and flowers, arranged carefully so that it's the very first thing family members see when they open their eyes on New Year's morning, believed to bring good fortune for the rest of the year.",
      temple: "The temple holds special new year prayers, and families often visit first thing in the morning to receive blessings before starting anything else that day.",
      why: "Starting the year by seeing something beautiful and auspicious first, or by visiting the temple before anything else, reminds us to begin new chapters of our lives with gratitude and good intention, not rushing straight into the busyness of daily life.",
      shlokaSanskrit: "स्वस्ति प्रजाभ्यः परिपालयन्तां न्यायेन मार्गेण महीं महीशाः ।\nगोब्राह्मणेभ्यः शुभमस्तु नित्यं लोकाः समस्ताः सुखिनो भवन्तु ॥",
      shlokaTranslit: "Swasti Prajabhyah Paripalayantam Nyayena Margena Mahim Mahishah,\nGo-brahmanebhyah Shubhamastu Nityam Lokah Samastah Sukhino Bhavantu",
      shlokaMeaning: "May all beings be well. May rulers govern the world with justice, along the right path. May goodness always be with the gentle and the wise. May all the worlds be happy.",
      quiz: [
        {q:"What do Puthandu and Vishu both mark?", opts:["The sun entering a new zodiac sign, beginning a new solar year","The end of winter","A king's birthday"], a:0},
        {q:"What is the Vishukkani in Kerala?", opts:["An arrangement of auspicious items seen first on New Year's morning","A type of sweet","A firework"], a:0},
        {q:"What do Tamil families often prepare, similar to Ugadi Pachadi?", opts:["A meal with all six tastes of life","Only sweets","Only rice"], a:0},
        {q:"Why do families try to see something auspicious first on New Year's morning?", opts:["It's believed to bring good fortune for the year","It's required by law","It's just for photos"], a:0}
      ]
    },
    hi: {
      title: "तमिल नववर्ष (पुत्तांडु) और विषु",
      sub: "सौर नववर्ष, तमिलनाडु और केरल में मनाया जाता है",
      story: "हर अप्रैल में एक ही दिन, तमिल परिवार अपना सौर नववर्ष पुत्तांडु मनाते हैं, जबकि केरल के परिवार विषु मनाते हैं। दोनों सूर्य के एक नई राशि में प्रवेश और एक नए सौर वर्ष की शुरुआत को चिह्नित करते हैं। तमिल घरों में, दिन की शुरुआत परिवार के मंदिर जाने और युगादि की तरह जीवन के सभी छह स्वादों को दर्शाने वाला एक विशेष भोजन तैयार करने से होती है। केरल में, परिवार एक रात पहले विषुक्कणि नामक कुछ खास तैयार करते हैं, शुभ वस्तुओं की एक व्यवस्था, एक दर्पण, सोने के आभूषण, फल, चावल, फूल, इतनी सावधानी से सजाए जाते हैं कि यह नववर्ष की सुबह परिवार के सदस्यों की आँखें खुलते ही सबसे पहली चीज़ हो, जिसे शेष वर्ष के लिए सौभाग्य लाने वाला माना जाता है।",
      temple: "मंदिर विशेष नववर्ष प्रार्थनाएँ आयोजित करता है, और परिवार अक्सर उस दिन कुछ और शुरू करने से पहले सुबह सबसे पहले आशीर्वाद लेने के लिए जाते हैं।",
      why: "साल की शुरुआत में सबसे पहले कुछ सुंदर और शुभ देखना, या किसी और चीज़ से पहले मंदिर जाना, हमें अपने जीवन के नए अध्याय कृतज्ञता और अच्छे इरादे के साथ शुरू करने की याद दिलाता है, दैनिक व्यस्तता में सीधे भागने के बजाय।",
      shlokaSanskrit: "स्वस्ति प्रजाभ्यः परिपालयन्तां न्यायेन मार्गेण महीं महीशाः ।\nगोब्राह्मणेभ्यः शुभमस्तु नित्यं लोकाः समस्ताः सुखिनो भवन्तु ॥",
      shlokaTranslit: null,
      shlokaMeaning: "सभी प्राणी कल्याण से रहें। शासक न्याय के मार्ग पर चलते हुए संसार पर शासन करें। सज्जनों और विद्वानों के साथ सदा शुभ हो। सभी लोक सुखी हों।",
      quiz: [
        {q:"पुत्तांडु और विषु दोनों किसे चिह्नित करते हैं?", opts:["सूर्य का एक नई राशि में प्रवेश, नए सौर वर्ष की शुरुआत","सर्दी का अंत","एक राजा का जन्मदिन"], a:0},
        {q:"केरल में विषुक्कणि क्या है?", opts:["नववर्ष की सुबह सबसे पहले देखी जाने वाली शुभ वस्तुओं की व्यवस्था","एक प्रकार की मिठाई","एक आतिशबाज़ी"], a:0},
        {q:"तमिल परिवार अक्सर उगादि पचड़ी जैसा क्या तैयार करते हैं?", opts:["जीवन के सभी छह स्वादों वाला भोजन","केवल मिठाई","केवल चावल"], a:0},
        {q:"परिवार नववर्ष की सुबह सबसे पहले शुभ चीज़ क्यों देखना चाहते हैं?", opts:["माना जाता है कि यह साल भर सौभाग्य लाता है","यह कानून द्वारा आवश्यक है","यह केवल फ़ोटो के लिए है"], a:0}
      ]
    },
    te: {
      title: "తమిళ నూతన సంవత్సరం (పుత్తాండు), విషు",
      sub: "తమిళనాడు, కేరళలో జరుపుకునే సౌర నూతన సంవత్సరం",
      story: "ప్రతి ఏప్రిల్ లో ఒకే రోజు, తమిళ కుటుంబాలు తమ సౌర నూతన సంవత్సరం పుత్తాండును జరుపుకుంటాయి, కేరళ కుటుంబాలు విషును జరుపుకుంటాయి. రెండూ సూర్యుడు కొత్త రాశిలోకి ప్రవేశించడాన్ని, కొత్త సౌర సంవత్సరం ప్రారంభాన్ని సూచిస్తాయి. తమిళ ఇళ్లలో, రోజు కుటుంబాలు దేవాలయాన్ని సందర్శించడం, ఉగాది వలె జీవితంలోని అన్ని ఆరు రుచులను సూచించే ప్రత్యేక భోజనం సిద్ధం చేయడంతో ప్రారంభమవుతుంది. కేరళలో, కుటుంబాలు ముందు రాత్రి విషుక్కణి అనే ప్రత్యేకమైనదాన్ని సిద్ధం చేస్తాయి, శుభప్రదమైన వస్తువుల అమరిక, అద్దం, బంగారు ఆభరణాలు, పండ్లు, బియ్యం, పువ్వులు, జాగ్రత్తగా అమర్చి, నూతన సంవత్సరపు ఉదయం కుటుంబ సభ్యులు కళ్లు తెరిచినప్పుడు మొదట చూసేది ఇదే అయ్యేలా, ఇది మిగిలిన సంవత్సరానికి అదృష్టాన్ని తెస్తుందని నమ్ముతారు.",
      temple: "దేవాలయం ప్రత్యేక నూతన సంవత్సర ప్రార్థనలు నిర్వహిస్తుంది, కుటుంబాలు తరచుగా ఆ రోజు మరేదైనా ప్రారంభించే ముందు ఉదయాన్నే ఆశీర్వాదాలు పొందడానికి వెళతాయి.",
      why: "సంవత్సరాన్ని ముందుగా అందమైన, శుభప్రదమైనదాన్ని చూడటం ద్వారా, లేదా మరేదైనా చేయడానికి ముందు దేవాలయాన్ని సందర్శించడం ద్వారా ప్రారంభించడం, మన జీవితంలోని కొత్త అధ్యాయాలను కృతజ్ఞతతో, మంచి ఉద్దేశంతో ప్రారంభించాలని గుర్తుచేస్తుంది, రోజువారీ హడావిడిలోకి నేరుగా పరుగెత్తకుండా.",
      shlokaSanskrit: "स्वस्ति प्रजाभ्यः परिपालयन्तां न्यायेन मार्गेण महीं महीशाः ।\nगोब्राह्मणेभ्यः शुभमस्तु नित्यं लोकाः समस्ताः सुखिनो भवन्तु ॥",
      shlokaTranslit: "స్వస్తి ప్రజాభ్యః పరిపాలయంతాం న్యాయేన మార్గేణ మహీం మహీశాః,\nగోబ్రాహ్మణేభ్యః శుభమస్తు నిత్యం లోకాః సమస్తాః సుఖినో భవంతు",
      shlokaMeaning: "అందరూ శ్రేయస్సుతో ఉందురు గాక. పాలకులు న్యాయ మార్గంలో ప్రపంచాన్ని పరిపాలించుదురు గాక. సజ్జనులు, పండితులకు ఎల్లప్పుడూ శుభం కలుగుగాక. అన్ని లోకాలు సుఖంగా ఉండుగాక.",
      quiz: [
        {q:"పుత్తాండు, విషు రెండూ దేనిని సూచిస్తాయి?", opts:["సూర్యుడు కొత్త రాశిలోకి ప్రవేశించడం, కొత్త సౌర సంవత్సర ప్రారంభం","శీతాకాలం ముగింపు","ఒక రాజు పుట్టినరోజు"], a:0},
        {q:"కేరళలో విషుక్కణి అంటే ఏమిటి?", opts:["నూతన సంవత్సరపు ఉదయం మొదట చూసే శుభప్రదమైన వస్తువుల అమరిక","ఒక రకమైన తీపి","బాణసంచా"], a:0},
        {q:"తమిళ కుటుంబాలు ఉగాది పచ్చడి వలె తరచుగా ఏమి సిద్ధం చేస్తాయి?", opts:["జీవితంలోని అన్ని ఆరు రుచులతో కూడిన భోజనం","తీపి పదార్థాలు మాత్రమే","బియ్యం మాత్రమే"], a:0},
        {q:"నూతన సంవత్సరపు ఉదయం కుటుంబాలు మొదట శుభప్రదమైనదాన్ని ఎందుకు చూడాలనుకుంటాయి?", opts:["ఇది సంవత్సరానికి అదృష్టాన్ని తెస్తుందని నమ్ముతారు","ఇది చట్టప్రకారం అవసరం","ఇది కేవలం ఫోటోల కోసం"], a:0}
      ]
    },
    ta: {
      title: "தமிழ் புத்தாண்டு (புத்தாண்டு), விஷு",
      sub: "தமிழ்நாடு, கேரளா முழுவதும் கொண்டாடப்படும் சூரிய புத்தாண்டு",
      story: "ஒவ்வொரு ஏப்ரலிலும் அதே நாளில், தமிழ் குடும்பங்கள் தங்கள் சூரிய புத்தாண்டான புத்தாண்டையும், கேரள குடும்பங்கள் விஷுவையும் கொண்டாடுகின்றன. இரண்டும் சூரியன் புதிய ராசியில் நுழைவதையும், புதிய சூரிய ஆண்டின் தொடக்கத்தையும் குறிக்கின்றன. தமிழ் வீடுகளில், நாள் குடும்பங்கள் கோயிலுக்குச் சென்று, உகாதி போலவே வாழ்க்கையின் அனைத்து ஆறு சுவைகளையும் குறிக்கும் சிறப்பு உணவைத் தயாரிப்பதுடன் தொடங்குகிறது. கேரளாவில், குடும்பங்கள் முந்தைய இரவு விஷுக்கணி என்ற சிறப்பு ஏற்பாட்டைத் தயார் செய்கின்றன, சுபகரமான பொருட்களின் அமைப்பு, ஒரு கண்ணாடி, தங்க நகைகள், பழங்கள், அரிசி, பூக்கள், கவனமாக அமைக்கப்பட்டு, புத்தாண்டு காலையில் குடும்ப உறுப்பினர்கள் கண் திறந்தவுடன் முதலில் காணும் பொருளாக இருக்கும் வகையில், இது மீதமுள்ள ஆண்டிற்கு அதிர்ஷ்டத்தைக் கொண்டுவரும் என நம்பப்படுகிறது.",
      temple: "கோயில் சிறப்பு புத்தாண்டு பிரார்த்தனைகளை நடத்துகிறது, குடும்பங்கள் அடிக்கடி அன்று வேறு எதையும் தொடங்குவதற்கு முன் காலையில் ஆசி பெற செல்கின்றன.",
      why: "ஆண்டை அழகான, சுபகரமான ஒன்றை முதலில் பார்ப்பதன் மூலம், அல்லது வேறு எதற்கும் முன் கோயிலுக்குச் செல்வதன் மூலம் தொடங்குவது, நமது வாழ்க்கையின் புதிய அத்தியாயங்களை நன்றியுணர்வுடனும் நல்ல எண்ணத்துடனும் தொடங்க வேண்டும் என்பதை நினைவூட்டுகிறது, தினசரி பரபரப்பில் நேரடியாக விரையாமல்.",
      shlokaSanskrit: "स्वस्ति प्रजाभ्यः परिपालयन्तां न्यायेन मार्गेण महीं महीशाः ।\nगोब्राह्मणेभ्यः शुभमस्तु नित्यं लोकाः समस्ताः सुखिनो भवन्तु ॥",
      shlokaTranslit: "ஸ்வஸ்தி ப்ரஜாப்யஹ பரிபாலயந்தாம் ந்யாயேன மார்கேண மஹீம் மஹீஷாஹ,\nகோப்ராஹ்மணேப்யஹ சுபமஸ்து நித்யம் லோகாஹ ஸமஸ்தாஹ ஸுகினோ பவந்து",
      shlokaMeaning: "அனைத்து உயிர்களும் நன்றாக இருக்கட்டும். ஆட்சியாளர்கள் நீதி வழியில் உலகை ஆளட்டும். நல்லோர், அறிஞர்களுக்கு எப்போதும் நன்மை உண்டாகட்டும். அனைத்து உலகங்களும் மகிழ்ச்சியாக இருக்கட்டும்.",
      quiz: [
        {q:"புத்தாண்டு, விஷு இரண்டும் எதைக் குறிக்கின்றன?", opts:["சூரியன் புதிய ராசியில் நுழைவது, புதிய சூரிய ஆண்டின் தொடக்கம்","குளிர்காலத்தின் முடிவு","ஒரு அரசனின் பிறந்தநாள்"], a:0},
        {q:"கேரளாவில் விஷுக்கணி என்றால் என்ன?", opts:["புத்தாண்டு காலையில் முதலில் காணப்படும் சுபகரமான பொருட்களின் அமைப்பு","ஒரு வகை இனிப்பு","பட்டாசு"], a:0},
        {q:"உகாதி பச்சடி போல தமிழ் குடும்பங்கள் அடிக்கடி என்ன தயார் செய்கின்றன?", opts:["வாழ்க்கையின் அனைத்து ஆறு சுவைகளுடன் கூடிய உணவு","இனிப்புகள் மட்டும்","அரிசி மட்டும்"], a:0},
        {q:"புத்தாண்டு காலையில் குடும்பங்கள் ஏன் முதலில் சுபகரமான ஒன்றைக் காண முயற்சிக்கின்றன?", opts:["இது ஆண்டிற்கு அதிர்ஷ்டத்தைக் கொண்டுவரும் என நம்பப்படுகிறது","இது சட்டப்படி தேவை","இது புகைப்படங்களுக்காக மட்டும்"], a:0}
      ]
    }
  },

  akshayatritiya: {
    en: {
      title: "Akshaya Tritiya",
      sub: "The day of never-diminishing abundance",
      story: "'Akshaya' means something that never decreases, no matter how much is given away, and Akshaya Tritiya is considered one of the most auspicious days of the entire year, believed to bring lasting good fortune to whatever is begun on this day. According to stories, on this very day the sage Vyasa began narrating the great epic Mahabharata, and Lord Ganesha agreed to write it down as fast as Vyasa could speak, without ever stopping his pen. It's also remembered as the day the Pandava brothers received an Akshaya Patra, a magical bowl that would never run empty of food no matter how many people it fed, as long as it was used to help others.",
      temple: "The temple performs special abhishekams on this day, and many devotees choose to begin new ventures, make donations, or give charity, believing that whatever is given away on this day returns to them multiplied.",
      why: "Akshaya Tritiya reminds us that true abundance grows the more it is shared, not the more it is hoarded, just like the magical bowl that never ran empty when used to feed others.",
      shlokaSanskrit: "ॐ पूर्णमदः पूर्णमिदं पूर्णात्पूर्णमुदच्यते ।\nपूर्णस्य पूर्णमादाय पूर्णमेवावशिष्यते ॥",
      shlokaTranslit: "Om Purnamadah Purnamidam Purnat Purnamudachyate,\nPurnasya Purnamadaya Purnamevavashishyate",
      shlokaMeaning: "That is whole, this is whole. From that wholeness, this wholeness comes. Even after taking wholeness from wholeness, wholeness alone remains.",
      quiz: [
        {q:"What does 'Akshaya' mean?", opts:["Something that never decreases","A type of gold","A festival of colors"], a:0},
        {q:"Who agreed to write down the Mahabharata as fast as Vyasa could speak?", opts:["Hanuman","Ganesha","Indra"], a:1},
        {q:"What was special about the Akshaya Patra given to the Pandavas?", opts:["It never ran empty of food when used to help others","It was made of pure gold","It could fly"], a:0},
        {q:"What does Akshaya Tritiya teach us about abundance?", opts:["It grows the more it is hoarded","It grows the more it is shared","It only comes from luck"], a:1}
      ]
    },
    hi: {
      title: "अक्षय तृतीया",
      sub: "कभी न घटने वाली समृद्धि का दिन",
      story: "'अक्षय' का अर्थ है कुछ ऐसा जो कभी कम नहीं होता, चाहे कितना भी दिया जाए, और अक्षय तृतीया को पूरे साल के सबसे शुभ दिनों में से एक माना जाता है, जिसकी मान्यता है कि इस दिन शुरू की गई कोई भी चीज़ स्थायी सौभाग्य लाती है। कथाओं के अनुसार, इसी दिन ऋषि वेदव्यास ने महान महाकाव्य महाभारत सुनाना शुरू किया था, और भगवान गणेश ने वेदव्यास जितनी तेज़ी से बोल सकें, उतनी ही तेज़ी से बिना कलम रोके लिखने के लिए सहमति दी थी। यह उस दिन के रूप में भी याद किया जाता है जब पांडव भाइयों को अक्षय पात्र मिला, एक जादुई कटोरा जो कभी भोजन से खाली नहीं होता था, चाहे उससे कितने भी लोगों को खिलाया जाए, जब तक इसका उपयोग दूसरों की मदद के लिए किया जाता रहे।",
      temple: "मंदिर इस दिन विशेष अभिषेक करता है, और कई भक्त नए काम शुरू करना, दान देना, या परोपकार करना चुनते हैं, यह मानते हुए कि इस दिन दी गई कोई भी चीज़ गुणा होकर उनके पास वापस लौटती है।",
      why: "अक्षय तृतीया हमें याद दिलाती है कि असली समृद्धि जितनी अधिक बाँटी जाती है, उतनी ही बढ़ती है, जितना अधिक जमा की जाती है उतनी नहीं, ठीक उस जादुई कटोरे की तरह जो दूसरों को खिलाने के लिए उपयोग होने पर कभी खाली नहीं होता था।",
      shlokaSanskrit: "ॐ पूर्णमदः पूर्णमिदं पूर्णात्पूर्णमुदच्यते ।\nपूर्णस्य पूर्णमादाय पूर्णमेवावशिष्यते ॥",
      shlokaTranslit: null,
      shlokaMeaning: "वह पूर्ण है, यह पूर्ण है। उस पूर्णता से यह पूर्णता आती है। पूर्णता से पूर्णता लेने के बाद भी, पूर्णता ही शेष रहती है।",
      quiz: [
        {q:"'अक्षय' का क्या अर्थ है?", opts:["कुछ ऐसा जो कभी कम नहीं होता","एक प्रकार का सोना","रंगों का त्योहार"], a:0},

        {q:"पांडवों को मिले अक्षय पात्र में क्या खास था?", opts:["दूसरों की मदद के लिए उपयोग होने पर यह कभी भोजन से खाली नहीं होता था","यह शुद्ध सोने से बना था","यह उड़ सकता था"], a:0},
        {q:"अक्षय तृतीया हमें समृद्धि के बारे में क्या सिखाती है?", opts:["यह जितना जमा किया जाए उतना बढ़ता है","यह जितना बाँटा जाए उतना बढ़ता है","यह केवल भाग्य से आता है"], a:1}

    te: {
      title: "అక్షయ తృతీయ",
      sub: "ఎన్నటికీ తరగని సమృద్ధి దినం",
      story: "'అక్షయ' అంటే ఎంత ఇచ్చినా తరగనిది అని అర్థం, అక్షయ తృతీయ మొత్తం సంవత్సరంలో అత్యంత శుభప్రదమైన రోజులలో ఒకటిగా పరిగణించబడుతుంది, ఈ రోజు ప్రారంభించినది ఏదైనా శాశ్వత అదృష్టాన్ని తెస్తుందని నమ్ముతారు. కథల ప్రకారం, ఇదే రోజు వ్యాస మహర్షి గొప్ప మహాభారత ఇతిహాసాన్ని చెప్పడం ప్రారంభించారు, గణేశుడు వ్యాసుడు ఎంత వేగంగా చెప్పగలిగితే అంత వేగంగా, కలం ఆపకుండా రాయడానికి అంగీకరించాడు. పాండవ సోదరులు అక్షయ పాత్రను పొందిన రోజుగా కూడా దీనిని గుర్తుంచుకుంటారు, ఎంతమందికి తినిపించినా ఆహారంతో ఎప్పటికీ ఖాళీ కాని మాయా పాత్ర, అది ఇతరులకు సహాయం చేయడానికి ఉపయోగించినంత కాలం.",
      temple: "దేవాలయం ఈ రోజు ప్రత్యేక అభిషేకాలు నిర్వహిస్తుంది, చాలామంది భక్తులు కొత్త పనులు ప్రారంభించడం, విరాళాలు ఇవ్వడం, దానం చేయడం ఎంచుకుంటారు, ఈ రోజు ఇచ్చినది రెట్టింపై తిరిగి వస్తుందని నమ్ముతూ.",
      why: "అక్షయ తృతీయ నిజమైన సమృద్ధి ఎంత దాచుకుంటే అంత కాక, ఎంత పంచుకుంటే అంత పెరుగుతుందని గుర్తుచేస్తుంది, ఇతరులకు ఆహారం పెట్టడానికి ఉపయోగించినప్పుడు ఎప్పటికీ ఖాళీ కాని ఆ మాయా పాత్ర వలె.",
      shlokaSanskrit: "ॐ पूर्णमदः पूर्णमिदं पूर्णात्पूर्णमुदच्यते ।\nपूर्णस्य पूर्णमादाय पूर्णमेवावशिष्यते ॥",
      shlokaTranslit: "ఓం పూర్ణమదః పూర్ణమిదం పూర్ణాత్పూర్ణముదచ్యతే,\nపూర్ణస్య పూర్ణమాదాయ పూర్ణమేవావశిష్యతే",
      shlokaMeaning: "అది పూర్ణం, ఇది పూర్ణం. ఆ పూర్ణత్వం నుండి ఈ పూర్ణత్వం వస్తుంది. పూర్ణత్వం నుండి పూర్ణత్వం తీసుకున్న తర్వాత కూడా, పూర్ణత్వమే మిగిలి ఉంటుంది.",
      quiz: [
        {q:"'అక్షయ' అంటే అర్థం ఏమిటి?", opts:["ఎప్పటికీ తరగనిది","ఒక రకమైన బంగారం","రంగుల పండుగ"], a:0},
        {q:"వ్యాసుడు ఎంత వేగంగా చెప్పగలిగితే అంత వేగంగా మహాభారతం రాయడానికి ఎవరు అంగీకరించారు?", opts:["హనుమంతుడు","గణేశుడు","ఇంద్రుడు"], a:1},
        {q:"పాండవులకు లభించిన అక్షయ పాత్రలో ఏమి ప్రత్యేకం?", opts:["ఇతరులకు సహాయం చేయడానికి ఉపయోగించినప్పుడు అది ఎప్పటికీ ఆహారంతో ఖాళీ కాదు","ఇది స్వచ్ఛమైన బంగారంతో చేయబడింది","ఇది ఎగరగలదు"], a:0},
        {q:"అక్షయ తృతీయ సమృద్ధి గురించి మనకు ఏమి నేర్పుతుంది?", opts:["ఇది ఎంత దాచుకుంటే అంత పెరుగుతుంది","ఇది ఎంత పంచుకుంటే అంత పెరుగుతుంది","ఇది కేవలం అదృష్టం నుండి వస్తుంది"], a:1}
      ]
    },
    ta: {
      title: "அக்ஷய திருதியை",
      sub: "ஒருபோதும் குறையாத செழிப்பின் நாள்",
      story: "'அக்ஷயா' என்றால் எவ்வளவு கொடுத்தாலும் ஒருபோதும் குறையாதது என்று பொருள், அக்ஷய திருதியை ஆண்டு முழுவதும் மிகவும் சுபகரமான நாட்களில் ஒன்றாகக் கருதப்படுகிறது, இந்த நாளில் தொடங்கப்படும் எதுவும் நீடித்த அதிர்ஷ்டத்தைக் கொண்டுவரும் என நம்பப்படுகிறது. கதைகளின்படி, இதே நாளில் வியாச முனிவர் பெரிய மகாபாரத காவியத்தை சொல்லத் தொடங்கினார், விநாயகர் வியாசர் எவ்வளவு வேகமாக சொல்ல முடியுமோ அவ்வளவு வேகமாக, தன் பேனையை நிறுத்தாமல் எழுத ஒப்புக்கொண்டார். பாண்டவ சகோதரர்கள் அக்ஷய பாத்திரத்தைப் பெற்ற நாளாகவும் இது நினைவுகூரப்படுகிறது, எத்தனை பேருக்கு உணவளித்தாலும் உணவால் ஒருபோதும் காலியாகாத மாய பாத்திரம், அது மற்றவர்களுக்கு உதவ பயன்படுத்தப்படும் வரை.",
      temple: "கோயில் இந்நாளில் சிறப்பு அபிஷேகங்களை நடத்துகிறது, பல பக்தர்கள் புதிய முயற்சிகளைத் தொடங்குவது, நன்கொடை அளிப்பது அல்லது தர்மம் செய்வதைத் தேர்ந்தெடுக்கிறார்கள், இந்நாளில் கொடுக்கப்படும் எதுவும் பன்மடங்காக திரும்பி வரும் என நம்பி.",
      why: "அக்ஷய திருதியை உண்மையான செழிப்பு எவ்வளவு பகிரப்படுகிறதோ அவ்வளவு வளர்கிறது, எவ்வளவு சேமிக்கப்படுகிறதோ அவ்வளவு அல்ல என்பதை நினைவூட்டுகிறது, மற்றவர்களுக்கு உணவளிக்க பயன்படுத்தப்படும்போது ஒருபோதும் காலியாகாத அந்த மாய பாத்திரத்தைப் போல.",
      shlokaSanskrit: "ॐ पूर्णमदः पूर्णमिदं पूर्णात्पूर्णमुदच्यते ।\nपूर्णस्य पूर्णमादाय पूर्णमेवावशिष्यते ॥",
      shlokaTranslit: "ஓம் பூர்ணமதஹ பூர்ணமிதம் பூர்ணாத் பூர்ணமுதச்யதே,\nபூர்ணஸ்ய பூர்ணமாதாய பூர்ணமேவாவசிஷ்யதே",
      shlokaMeaning: "அது முழுமையானது, இது முழுமையானது. அந்த முழுமையிலிருந்து இந்த முழுமை வருகிறது. முழுமையிலிருந்து முழுமையை எடுத்த பின்னரும், முழுமையே எஞ்சியிருக்கும்.",
      quiz: [
        {q:"'அக்ஷயா' என்றால் என்ன பொருள்?", opts:["ஒருபோதும் குறையாதது","ஒரு வகை தங்கம்","வண்ணங்களின் திருவிழா"], a:0},
        {q:"வியாசர் எவ்வளவு வேகமாக சொல்ல முடியுமோ அவ்வளவு வேகமாக மகாபாரதத்தை எழுத யார் ஒப்புக்கொண்டார்?", opts:["அனுமன்","விநாயகர்","இந்திரன்"], a:1},
        {q:"பாண்டவர்களுக்குக் கிடைத்த அக்ஷய பாத்திரத்தில் என்ன சிறப்பு?", opts:["மற்றவர்களுக்கு உதவ பயன்படுத்தும்போது அது ஒருபோதும் உணவால் காலியாகாது","இது தூய தங்கத்தால் ஆனது","இது பறக்க முடியும்"], a:0},
        {q:"அக்ஷய திருதியை செழிப்பைப் பற்றி நமக்கு என்ன கற்பிக்கிறது?", opts:["இது எவ்வளவு சேமிக்கப்படுகிறதோ அவ்வளவு வளரும்","இது எவ்வளவு பகிரப்படுகிறதோ அவ்வளவு வளரும்","இது அதிர்ஷ்டத்திலிருந்து மட்டுமே வரும்"], a:1}
      ]
    }
  },

  brahmotsavam: {
    en: {
      title: "Brahmotsavam",
      sub: "The grandest annual festival of the temple, nine days of celebration",
      story: "Brahmotsavam, meaning 'Brahma's great festival,' is said to have first been performed by Lord Brahma himself in gratitude to Lord Venkateswara. It is the single grandest festival of the year at temples dedicated to Venkateswara, lasting nine days, during which the deity is taken out of the sanctum each day on a different divine vehicle called a vahana, such as Garuda (the divine eagle), Hanumantha, Simha (a lion), Gaja (an elephant), and a beautifully decorated chariot (Ratha), so the entire community, not just those who enter the sanctum, gets a chance to receive the Lord's blessing as he processes through the streets. Thousands of devotees gather each night to see the deity in a new form and vehicle, celebrating together for over a week.",
      temple: "Each evening during Brahmotsavam, the temple holds a grand procession, with the deity dressed differently and mounted on a different vahana, accompanied by music, dance, and chanting, as devotees line the temple grounds to watch and receive blessings.",
      why: "Brahmotsavam reminds us that celebration is best when it's shared widely, bringing the Lord out to the whole community rather than keeping the celebration only inside the temple walls.",
      shlokaSanskrit: "शान्ताकारं भुजगशयनं पद्मनाभं सुरेशं विश्वाधारं गगनसदृशं मेघवर्णं शुभाङ्गम् ।\nलक्ष्मीकान्तं कमलनयनं योगिभिर्ध्यानगम्यं वन्दे विष्णुं भवभयहरं सर्वलोकैकनाथम् ॥",
      shlokaTranslit: "Shantakaram Bhujagashayanam Padmanabham Suresham Vishvadharam Gaganasadrisham Meghavarnam Shubhangam,\nLakshmikantam Kamalanayanam Yogibhirdhyanagamyam Vande Vishnum Bhavabhayaharam Sarvalokaikanatham",
      shlokaMeaning: "I bow to Vishnu, peaceful in form, reclining on the serpent, lotus-naveled, lord of the gods, support of the universe, vast as the sky, cloud-hued, of auspicious form, beloved of Lakshmi, lotus-eyed, reached through meditation by sages, remover of the fear of worldly existence, the one Lord of all the worlds.",

    hi: {
      title: "ब्रह्मोत्सवम्",
      sub: "मंदिर का सबसे भव्य वार्षिक उत्सव, नौ दिनों का उत्सव",
      story: "ब्रह्मोत्सवम्, जिसका अर्थ है 'ब्रह्मा का महान उत्सव,' कहा जाता है कि इसे सबसे पहले स्वयं भगवान ब्रह्मा ने भगवान वेंकटेश्वर के प्रति कृतज्ञता में मनाया था। यह वेंकटेश्वर को समर्पित मंदिरों में साल का सबसे भव्य उत्सव है, जो नौ दिनों तक चलता है, जिसके दौरान देवता को हर दिन गर्भगृह से एक अलग दिव्य वाहन पर बाहर निकाला जाता है, जैसे गरुड़ (दिव्य ईगल), हनुमंत, सिंह, गज (हाथी), और सुंदर सजाया हुआ रथ, ताकि पूरा समुदाय, न केवल गर्भगृह में प्रवेश करने वाले, सड़कों से गुज़रते हुए भगवान का आशीर्वाद पाने का मौका पाएं। हज़ारों भक्त हर रात देवता को एक नए रूप और वाहन में देखने के लिए इकट्ठा होते हैं, एक सप्ताह से अधिक समय तक साथ उत्सव मनाते हुए।",
      temple: "ब्रह्मोत्सवम् के दौरान हर शाम, मंदिर एक भव्य शोभायात्रा आयोजित करता है, जिसमें देवता को अलग-अलग तरह से सजाया जाता है और एक अलग वाहन पर बिठाया जाता है, संगीत, नृत्य, और मंत्रोच्चार के साथ, जबकि भक्त देखने और आशीर्वाद पाने के लिए मंदिर परिसर में कतार लगाते हैं।",
      why: "ब्रह्मोत्सवम् हमें याद दिलाता है कि उत्सव तब सबसे अच्छा होता है जब वह व्यापक रूप से साझा किया जाए, भगवान को केवल मंदिर की दीवारों के भीतर रखने के बजाय पूरे समुदाय के सामने लाया जाए।",
      shlokaSanskrit: "शान्ताकारं भुजगशयनं पद्मनाभं सुरेशं विश्वाधारं गगनसदृशं मेघवर्णं शुभाङ्गम् ।\nलक्ष्मीकान्तं कमलनयनं योगिभिर्ध्यानगम्यं वन्दे विष्णुं भवभयहरं सर्वलोकैकनाथम् ॥",
      shlokaTranslit: null,
      shlokaMeaning: "मैं विष्णु को नमन करता हूँ, जो शांत स्वरूप हैं, सर्प पर शयन करते हैं, कमल-नाभि वाले, देवताओं के स्वामी, विश्व के आधार, आकाश के समान विशाल, मेघ-वर्ण, शुभ अंगों वाले, लक्ष्मी के प्रिय, कमल-नयन, योगियों द्वारा ध्यान से प्राप्त किए जाने वाले, सांसारिक भय के नाशक, सभी लोकों के एकमात्र स्वामी हैं।",
      quiz: [
        {q:"'ब्रह्मोत्सवम्' का क्या अर्थ है?", opts:["ब्रह्मा का महान उत्सव","फसल उत्सव","विवाह का दिन"], a:0},
        {q:"ब्रह्मोत्सवम् आमतौर पर कितने दिनों तक चलता है?", opts:["एक दिन","नौ दिन","पूरे एक महीने"], a:1},
        {q:"इस उत्सव में 'वाहन' क्या है?", opts:["एक दिव्य वाहन जिस पर देवता को ले जाया जाता है","एक प्रकार की मिठाई","एक संगीत वाद्य यंत्र"], a:0},
        {q:"ब्रह्मोत्सवम् के दौरान देवता सड़कों से क्यों गुज़रते हैं?", opts:["ताकि पूरा समुदाय आशीर्वाद पा सके, न केवल गर्भगृह में मौजूद लोग","ताज़ी हवा लेने के लिए","अन्य मंदिरों को देखने के लिए"], a:0}
      ]

    te: {
      title: "బ్రహ్మోత్సవం",
      sub: "దేవాలయపు అత్యంత గొప్ప వార్షిక ఉత్సవం, తొమ్మిది రోజుల వేడుక",
      story: "బ్రహ్మోత్సవం అంటే 'బ్రహ్మ యొక్క గొప్ప ఉత్సవం' అని అర్థం, దీనిని మొదట స్వయంగా బ్రహ్మదేవుడు వేంకటేశ్వరునికి కృతజ్ఞతగా నిర్వహించాడని చెబుతారు. వేంకటేశ్వరునికి అంకితమైన దేవాలయాలలో ఇది సంవత్సరంలో అత్యంత గొప్ప ఉత్సవం, తొమ్మిది రోజుల పాటు కొనసాగుతుంది, ఈ సమయంలో దేవుడిని ప్రతిరోజూ గర్భగుడి నుండి వేరే దివ్య వాహనంపై బయటకు తీసుకువస్తారు, గరుడ (దివ్య గరుడపక్షి), హనుమంతుడు, సింహం, గజం (ఏనుగు), అందంగా అలంకరించిన రథం వంటివి, తద్వారా గర్భగుడిలోకి ప్రవేశించేవారే కాక, మొత్తం సమాజం వీధుల గుండా ఊరేగుతున్నప్పుడు భగవానుని ఆశీర్వాదం పొందే అవకాశం పొందుతారు. వేలాది భక్తులు ప్రతి రాత్రి దేవుడిని కొత్త రూపంలో, వాహనంలో చూడటానికి గుమిగూడతారు, ఒక వారానికి పైగా కలిసి జరుపుకుంటూ.",
      temple: "బ్రహ్మోత్సవం సమయంలో ప్రతి సాయంత్రం, దేవాలయం ఒక గొప్ప ఊరేగింపు నిర్వహిస్తుంది, దేవుడిని వేర్వేరుగా అలంకరించి, వేరే వాహనంపై కూర్చోబెట్టి, సంగీతం, నృత్యం, మంత్రోచ్చారణతో, భక్తులు చూడటానికి, ఆశీర్వాదాలు పొందడానికి దేవాలయ ఆవరణలో వరుసలో నిలబడతారు.",
      why: "బ్రహ్మోత్సవం ఉత్సవం విస్తృతంగా పంచుకున్నప్పుడే ఉత్తమంగా ఉంటుందని గుర్తుచేస్తుంది, భగవానుని దేవాలయ గోడల లోపలే ఉంచడం కంటే మొత్తం సమాజం ముందుకు తీసుకురావడం మేలు.",
      shlokaSanskrit: "शान्ताकारं भुजगशयनं पद्मनाभं सुरेशं विश्वाधारं गगनसदृशं मेघवर्णं शुभाङ्गम् ।\nलक्ष्मीकान्तं कमलनयनं योगिभिर्ध्यानगम्यं वन्दे विष्णुं भवभयहरं सर्वलोकैकनाथम् ॥",
      shlokaTranslit: "శాంతాకారం భుజగశయనం పద్మనాభం సురేశం విశ్వాధారం గగనసదృశం మేఘవర్ణం శుభాంగం,\nలక్ష్మీకాంతం కమలనయనం యోగిభిర్ధ్యానగమ్యం వందే విష్ణుం భవభయహరం సర్వలోకైకనాథం",
      shlokaMeaning: "శాంత స్వరూపుడు, సర్పశయనుడు, పద్మనాభుడు, దేవతల ప్రభువు, విశ్వానికి ఆధారం, ఆకాశమంత విశాలమైన, మేఘవర్ణుడు, శుభాంగుడు, లక్ష్మీకాంతుడు, కమలనయనుడు, యోగులచే ధ్యానం ద్వారా చేరుకోబడేవాడు, సాంసారిక భయాన్ని పోగొట్టేవాడు, సర్వలోకాలకు ఏకైక ప్రభువైన విష్ణువుకు నేను నమస్కరిస్తున్నాను.",
      quiz: [
        {q:"'బ్రహ్మోత్సవం' అంటే అర్థం ఏమిటి?", opts:["బ్రహ్మ యొక్క గొప్ప ఉత్సవం","పంట వేడుక","వివాహ దినం"], a:0},
        {q:"బ్రహ్మోత్సవం సాధారణంగా ఎన్ని రోజులు జరుగుతుంది?", opts:["ఒక రోజు","తొమ్మిది రోజులు","పూర్తి నెల రోజులు"], a:1},
        {q:"ఈ ఉత్సవంలో 'వాహనం' అంటే ఏమిటి?", opts:["దేవుడిని మోసుకెళ్లే దివ్య వాహనం","ఒక రకమైన తీపి","ఒక సంగీత వాయిద్యం"], a:0},
        {q:"బ్రహ్మోత్సవం సమయంలో దేవుడు వీధుల గుండా ఎందుకు ఊరేగుతాడు?", opts:["గర్భగుడిలో ఉన్నవారే కాక, మొత్తం సమాజం ఆశీర్వాదం పొందడానికి","తాజా గాలి పీల్చుకోవడానికి","ఇతర దేవాలయాలను సందర్శించడానికి"], a:0}
      ]
    },
    ta: {
      title: "பிரம்மோத்சவம்",
      sub: "கோயிலின் மிகப் பெரிய ஆண்டு விழா, ஒன்பது நாள் கொண்டாட்டம்",
      story: "பிரம்மோத்சவம் என்றால் 'பிரம்மாவின் பெரிய திருவிழா' என்று பொருள், இதை முதலில் பிரம்மா தேவனே வெங்கடேஸ்வரருக்கு நன்றி தெரிவிக்க நடத்தினார் என்று சொல்லப்படுகிறது. வெங்கடேஸ்வரருக்கு அர்ப்பணிக்கப்பட்ட கோயில்களில் இது ஆண்டின் மிகப் பெரிய திருவிழா, ஒன்பது நாட்கள் நீடிக்கும், இந்த நேரத்தில் இறைவன் ஒவ்வொரு நாளும் கருவறையிலிருந்து வேறு வேறு தெய்வீக வாகனத்தில் வெளியே கொண்டு வரப்படுகிறார், கருடன் (தெய்வீக கழுகு), அனுமந்தர், சிம்மம், கஜம் (யானை), அழகாக அலங்கரிக்கப்பட்ட தேர் போன்றவை, இதனால் கருவறைக்குள் நுழைபவர்கள் மட்டுமல்ல, முழு சமூகமும் தெருக்கள் வழியாக ஊர்வலம் செல்லும்போது இறைவனின் ஆசியைப் பெறும் வாய்ப்பைப் பெறுகிறார்கள். ஆயிரக்கணக்கான பக்தர்கள் ஒவ்வொரு இரவும் இறைவனை புதிய வடிவத்திலும் வாகனத்திலும் காண கூடுகிறார்கள், ஒரு வாரத்திற்கும் மேலாக சேர்ந்து கொண்டாடுகிறார்கள்.",
      temple: "பிரம்மோத்சவத்தின்போது ஒவ்வொரு மாலையும், கோயில் ஒரு பெரிய ஊர்வலத்தை நடத்துகிறது, இறைவன் வித்தியாசமாக அலங்கரிக்கப்பட்டு, வேறு வாகனத்தில் அமர்த்தப்பட்டு, இசை, நடனம், மந்திரங்களுடன், பக்தர்கள் பார்க்கவும் ஆசி பெறவும் கோயில் வளாகத்தில் வரிசையில் நிற்கிறார்கள்.",
      why: "பிரம்மோத்சவம் கொண்டாட்டம் பரவலாக பகிரப்படும்போது சிறந்தது என்பதை நினைவூட்டுகிறது, இறைவனை கோயில் சுவர்களுக்குள் மட்டும் வைப்பதை விட முழு சமூகத்திற்கும் கொண்டு வருவது சிறந்தது.",
      shlokaSanskrit: "शान्ताकारं भुजगशयनं पद्मनाभं सुरेशं विश्वाधारं गगनसदृशं मेघवर्णं शुभाङ्गम् ।\nलक्ष्मीकान्तं कमलनयनं योगिभिर्ध्यानगम्यं वन्दे विष्णुं भवभयहरं सर्वलोकैकनाथम् ॥",

      story: "குரு பூர்ணிமா முழு நிலவு நாளில் வியாச முனிவரை கௌரவிக்க கொண்டாடப்படுகிறது, நான்கு வேதங்களை தொகுத்து, இதுவரை இயற்றப்பட்ட மிகப்பெரிய காவியங்களில் ஒன்றான மகாபாரதத்தை எழுதிய பெருமைக்குரிய முனிவர். அவர் உலகிற்கு அத்தகைய பரந்த அறிவை அளித்ததால், அவர் அனைத்து காலத்திலும் மிகப்பெரிய குருக்களில் ஒருவராக நினைவுகூரப்படுகிறார், இந்நாள் வியாசரை மட்டுமல்ல, வாழ்நாள் முழுவதும் மாணவர்களுடன் தங்கள் அறிவைப் பகிர்ந்த ஒவ்வொரு ஆசிரியரையும் குருவையும் கௌரவிக்கும் வழியாக மாறியது. இந்திய பாரம்பரியத்தில், ஒரு குரு ஆழமான மரியாதையுடன் நடத்தப்படுகிறார், வெறும் உண்மைகளைக் கற்பிப்பதற்காக மட்டுமல்ல, ஒரு விளக்கு மற்றொரு விளக்கை ஏற்றுவது போல, ஒரு மாணவனின் முழு வளர்ச்சிக்கும் வழிகாட்டுவதற்காக.",
      temple: "கோயில் வியாசருக்கும், பாரம்பரியத்துடன் தொடர்புடைய மற்ற மரியாதைக்குரிய குருக்கள் மற்றும் துறவிகளுக்கும் சிறப்பு பிரார்த்தனைகளை வழங்குகிறது, பல மாணவர்கள் இந்நாளை பள்ளியிலோ, இசையிலோ, ஆன்மீக கல்வியிலோ தங்கள் சொந்த ஆசிரியர்களுக்கு சிறப்பாக நன்றி தெரிவிக்க பயன்படுத்துகிறார்கள்.",
      why: "குரு பூர்ணிமா யாரும் முழுவதுமாக தனியாக கற்றுக்கொள்வதில்லை என்பதையும், மதிப்புமிக்க எதையாவது அறிந்த ஒவ்வொருவரும் ஒருமுறை மற்றொருவரிடமிருந்து கற்றுக்கொண்டார்கள் என்பதையும், இன்று அந்த நபர்களுக்கு நன்றி சொல்லும் நாள் என்பதையும் நினைவூட்டுகிறது.",
      shlokaSanskrit: "गुरुर्ब्रह्मा गुरुर्विष्णुः गुरुर्देवो महेश्वरः ।\nगुरुः साक्षात् परं ब्रह्म तस्मै श्रीगुरवे नमः ॥",
      shlokaTranslit: "குருர்ப்ரஹ்மா குருர்விஷ்ணுஹு குருர்தேவோ மஹேஷ்வரஹ,\nகுருஹு ஸாக்ஷாத் பரம் ப்ரஹ்ம தஸ்மை ஸ்ரீகுரவே நமஹ",
      shlokaMeaning: "குரு பிரம்மா, குரு விஷ்ணு, குரு பெரிய தேவனான சிவன். குரு உண்மையில் பரம சத்தியமே, அந்த மரியாதைக்குரிய குருவிற்கு வணக்கம்.",
      quiz: [
        {q:"குரு பூர்ணிமா அன்று சிறப்பாக எந்த முனிவர் கௌரவிக்கப்படுகிறார்?", opts:["வியாசர்","வால்மீகி","நாரதர்"], a:0},
        {q:"வியாசர் எதைத் தொகுத்து எழுதிய பெருமைக்குரியவர்?", opts:["நான்கு வேதங்களும் மகாபாரதமும்","சமையல் புத்தகங்கள் மட்டும்","கவிதைகள் மட்டும்"], a:0},
        {q:"குரு ஸ்லோகம் குருவை எதனுடன் ஒப்பிடுகிறது?", opts:["பிரம்மா, விஷ்ணு, சிவன் இணைந்து","ஒரு அரசனுடன்","ஒரு வீரருடன்"], a:0},
        {q:"குரு பூர்ணிமா என்ன செய்வதற்கு நல்ல நாள்?", opts:["உங்கள் சொந்த ஆசிரியர்களுக்கு நன்றி சொல்வது","பள்ளியைத் தவிர்ப்பது","நாள் முழுவதும் தூங்குவது"], a:0}
      ]
    }
  },

  pavithrotsavam: {
    en: {
      title: "Pavithrotsavam",
      sub: "A festival of purification and correction",
      story: "Throughout the year, even the most careful priests may accidentally make small errors during the many daily rituals performed for the deity, perhaps a chant said slightly wrong, or a step in a ceremony missed. Pavithrotsavam is a special festival held to correct and purify any of these small mistakes made over the year. During this festival, a sacred thread called the Pavitram, woven with great care and blessed through Vedic chanting, is offered to the deity as a symbol of making everything whole and correct again, like carefully mending a small tear in a beautiful cloth.",
      temple: "Priests perform elaborate Vedic rituals over several days, culminating in offering the Pavitram to the deity, along with a special homam (sacred fire ceremony) to purify the temple's yearly worship.",
      why: "Pavithrotsavam reminds us that it's alright to make small mistakes, even in our most important efforts, as long as we care enough to notice them and set things right again.",
      shlokaSanskrit: "ॐ सह नाववतु । सह नौ भुनक्तु । सह वीर्यं करवावहै ।\nतेजस्विनावधीतमस्तु मा विद्विषावहै ॥",
      shlokaTranslit: "Om Saha Nau Avatu, Saha Nau Bhunaktu, Saha Viryam Karavavahai,\nTejasvinavadhitamastu Ma Vidvishavahai",
      shlokaMeaning: "May we be protected together. May we be nourished together. May we work together with great energy. May our learning be brilliant and effective. May we never hate one another.",
      quiz: [
        {q:"What might happen accidentally over a year of daily temple rituals?", opts:["Small errors or missed steps","The temple runs out of flowers","Nothing ever goes wrong"], a:0},
        {q:"What is offered to the deity during Pavithrotsavam?", opts:["The Pavitram, a sacred thread","A new idol","A book"], a:0},
        {q:"What does Pavithrotsavam help 'correct'?", opts:["Small ritual mistakes made over the year","The temple's construction","The calendar"], a:0},
        {q:"What does this festival teach us about mistakes?", opts:["It's fine to notice and fix them","We should hide them","We should never admit them"], a:0}
      ]
    },

      story: "पूरे साल, सबसे सावधान पुजारी भी देवता के लिए किए जाने वाले कई दैनिक अनुष्ठानों में कभी-कभी छोटी गलतियाँ कर सकते हैं, शायद कोई मंत्र थोड़ा गलत बोला गया हो, या किसी समारोह का कोई चरण छूट गया हो। पवित्रोत्सवम् एक विशेष त्योहार है जो साल भर में हुई इन छोटी गलतियों को सुधारने और शुद्ध करने के लिए मनाया जाता है। इस त्योहार के दौरान, पवित्रम् नामक एक पवित्र धागा, जिसे बड़ी सावधानी से बुना गया है और वैदिक मंत्रोच्चार से आशीर्वादित किया गया है, देवता को अर्पित किया जाता है, जो सब कुछ फिर से पूर्ण और सही बनाने का प्रतीक है, ठीक जैसे किसी सुंदर वस्त्र में छोटे से फटे हिस्से को सावधानी से सिलना।",

        {q:"पवित्रोत्सवम् किसे 'सुधारने' में मदद करता है?", opts:["साल भर में हुई छोटी अनुष्ठान गलतियाँ","मंदिर के निर्माण को","कैलेंडर को"], a:0},
        {q:"यह त्योहार हमें गलतियों के बारे में क्या सिखाता है?", opts:["उन्हें नोटिस करना और ठीक करना ठीक है","हमें उन्हें छुपाना चाहिए","हमें कभी स्वीकार नहीं करना चाहिए"], a:0}

    te: {
      title: "పవిత్రోత్సవం",
      sub: "శుద్ధీకరణ, సవరణ ఉత్సవం",
      story: "ఏడాది పొడవునా, అత్యంత జాగ్రత్తగా ఉండే పూజారులు కూడా దేవుని కోసం నిర్వహించే అనేక దైనందిన ఆచారాలలో అనుకోకుండా చిన్న తప్పులు చేయవచ్చు, బహుశా ఒక మంత్రం కొంచెం తప్పుగా చెప్పబడి ఉండవచ్చు, లేదా ఒక వేడుకలో ఒక అడుగు మిస్ అయ్యి ఉండవచ్చు. పవిత్రోత్సవం అనేది ఏడాది పొడవునా జరిగిన ఈ చిన్న తప్పులను సరిచేసి శుద్ధి చేయడానికి జరిపే ఒక ప్రత్యేక ఉత్సవం. ఈ ఉత్సవం సమయంలో, పవిత్రం అనే పవిత్రమైన దారం, గొప్ప జాగ్రత్తతో నేయబడి, వేద మంత్రోచ్చారణ ద్వారా ఆశీర్వదించబడి, దేవునికి సమర్పించబడుతుంది, ఇది ప్రతిదీ మళ్లీ సంపూర్ణంగా, సరిగ్గా చేయడానికి సంకేతంగా, ఒక అందమైన వస్త్రంలో చిన్న చిరుగును జాగ్రత్తగా కుట్టినట్టుగా.",
      temple: "పూజారులు అనేక రోజుల పాటు విస్తృతమైన వేద ఆచారాలు నిర్వహిస్తారు, చివరికి దేవునికి పవిత్రం సమర్పించడంతో ముగుస్తుంది, దేవాలయపు వార్షిక ఆరాధనను శుద్ధి చేయడానికి ఒక ప్రత్యేక హోమంతో పాటు.",
      why: "పవిత్రోత్సవం మన అత్యంత ముఖ్యమైన ప్రయత్నాలలో కూడా చిన్న తప్పులు చేయడం పరవాలేదని గుర్తుచేస్తుంది, మనం వాటిని గమనించి మళ్లీ సరిచేసుకోవాలని పట్టించుకున్నంత కాలం.",
      shlokaSanskrit: "ॐ सह नाववतु । सह नौ भुनक्तु । सह वीर्यं करवावहै ।\nतेजस्विनावधीतमस्तु मा विद्विषावहै ॥",
      shlokaTranslit: "ఓం సహ నావవతు, సహ నౌ భునక్తు, సహ వీర్యం కరవావహై,\nతేజస్వినావధీతమస్తు మా విద్విషావహై",
      shlokaMeaning: "మనం ఇద్దరం కలిసి రక్షించబడుదాం. మనం ఇద్దరం కలిసి పోషించబడుదాం. మనం గొప్ప శక్తితో కలిసి పనిచేద్దాం. మన అభ్యాసం తేజోవంతంగా, ప్రభావవంతంగా ఉండుగాక. మనం ఎప్పుడూ ఒకరినొకరు ద్వేషించకుందాం.",
      quiz: [
        {q:"ఏడాది పొడవునా దైనందిన దేవాలయ ఆచారాలలో అనుకోకుండా ఏమి జరగవచ్చు?", opts:["చిన్న తప్పులు లేదా మిస్ అయిన అడుగులు","దేవాలయంలో పూలు అయిపోవడం","ఎప్పుడూ ఏమీ తప్పు జరగదు"], a:0},

    ta: {
      title: "பவித்ரோத்சவம்",
      sub: "தூய்மைப்படுத்தல் மற்றும் திருத்தத்தின் திருவிழா",
      story: "ஆண்டு முழுவதும், மிகவும் கவனமான பூசாரிகள் கூட தெய்வத்திற்காக செய்யப்படும் பல தினசரி சடங்குகளில் தற்செயலாக சிறிய தவறுகளைச் செய்யலாம், ஒருவேளை ஒரு மந்திரம் சற்று தவறாக சொல்லப்பட்டிருக்கலாம், அல்லது ஒரு சடங்கில் ஒரு படி தவறவிடப்பட்டிருக்கலாம். பவித்ரோத்சவம் என்பது ஆண்டு முழுவதும் செய்யப்பட்ட இந்த சிறிய தவறுகளை திருத்தி தூய்மைப்படுத்த நடத்தப்படும் ஒரு சிறப்பு திருவிழா. இந்த திருவிழாவின்போது, பவித்திரம் என்ற புனித நூல், மிகுந்த கவனத்துடன் நெய்யப்பட்டு, வேத மந்திரங்களால் ஆசிர்வதிக்கப்பட்டு, தெய்வத்திற்கு சமர்ப்பிக்கப்படுகிறது, இது எல்லாவற்றையும் மீண்டும் முழுமையாகவும் சரியாகவும் மாற்றுவதன் அடையாளமாக, ஒரு அழகான துணியில் சிறிய கிழிசலை கவனமாக தைப்பது போல.",
      temple: "பூசாரிகள் பல நாட்களில் விரிவான வேத சடங்குகளை நடத்துகிறார்கள், இறுதியில் பவித்திரத்தை தெய்வத்திற்கு சமர்ப்பிப்பதுடன் முடிவடைகிறது, கோயிலின் ஆண்டு வழிபாட்டை தூய்மைப்படுத்த ஒரு சிறப்பு ஹோமத்துடன்.",
      why: "பவித்ரோத்சவம் நமது மிக முக்கியமான முயற்சிகளிலும் சிறிய தவறுகள் செய்வது பரவாயில்லை என்பதை நினைவூட்டுகிறது, நாம் அவற்றைக் கவனித்து மீண்டும் சரிசெய்ய அக்கறை காட்டும் வரை.",
      shlokaSanskrit: "ॐ सह नाववतु । सह नौ भुनक्तु । सह वीर्यं करवावहै ।\nतेजस्विनावधीतमस्तु मा विद्विषावहै ॥",
      shlokaTranslit: "ஓம் ஸஹ நாவவது, ஸஹ நௌ புனக்து, ஸஹ வீர்யம் கரவாவஹை,\nதேஜஸ்வினாவதீதமஸ்து மா வித்விஷாவஹை",
      shlokaMeaning: "நாம் இருவரும் சேர்ந்து பாதுகாக்கப்படுவோம். நாம் இருவரும் சேர்ந்து போஷிக்கப்படுவோம். நாம் பெரும் ஆற்றலுடன் சேர்ந்து பணியாற்றுவோம். நமது கற்றல் ஒளிமயமாகவும் பயனுள்ளதாகவும் இருக்கட்டும். நாம் ஒருபோதும் ஒருவரையொருவர் வெறுக்காமல் இருப்போம்.",
      quiz: [
        {q:"ஆண்டு முழுவதும் தினசரி கோயில் சடங்குகளில் தற்செயலாக என்ன நடக்கலாம்?", opts:["சிறிய தவறுகள் அல்லது தவறவிடப்பட்ட படிகள்","கோயிலில் பூக்கள் தீர்ந்துவிடுவது","ஒருபோதும் எதுவும் தவறாக நடக்காது"], a:0},
        {q:"பவித்ரோத்சவத்தின்போது தெய்வத்திற்கு என்ன சமர்ப்பிக்கப்படுகிறது?", opts:["பவித்திரம், ஒரு புனித நூல்","புதிய சிலை","ஒரு புத்தகம்"], a:0},
        {q:"பவித்ரோத்சவம் எதை 'திருத்த' உதவுகிறது?", opts:["ஆண்டு முழுவதும் செய்யப்பட்ட சிறிய சடங்கு தவறுகள்","கோயில் கட்டுமானம்","நாட்காட்டி"], a:0},
        {q:"இந்த திருவிழா தவறுகளைப் பற்றி நமக்கு என்ன கற்பிக்கிறது?", opts:["அவற்றைக் கவனித்து சரிசெய்வது பரவாயில்லை","நாம் அவற்றை மறைக்க வேண்டும்","நாம் ஒருபோதும் ஒப்புக்கொள்ளக்கூடாது"], a:0}
      ]

    te: {
      title: "శ్రీవారు జయంతి",
      sub: "వేంకటేశ్వరుని ఆవిర్భావ దినం",
      story: "'శ్రీవారు' అనేది దక్షిణ భారతదేశంలో దేవాలయపు ప్రధాన దేవుడైన వేంకటేశ్వరుని గౌరవప్రదంగా సూచించే మార్గం, ఈ యుగంలో భక్తులను ఆశీర్వదించడానికి, రక్షించడానికి తిరుమల కొండలలో భూమిపై ఆవిర్భవించాడని నమ్మే విష్ణువు రూపం. శ్రీవారు జయంతి భగవానుని ఆవిర్భావ దినాన్ని జరుపుకుంటుంది, దూరంగా ఉన్న స్వర్గంలోనే ఉండటానికి బదులుగా, హృదయపూర్వకంగా వచ్చే ఎవరికైనా అందుబాటులో ఉండటానికి, తన భక్తులకు దగ్గరగా ఉండటానికి ఆయన ఈ ప్రత్యేక రూపంలో ప్రత్యక్షం కావడాన్ని ఎంచుకున్నప్పుడు.",
      temple: "దేవాలయం ప్రధాన దేవునికి ఒక గొప్ప అభిషేకం, ప్రత్యేక అలంకారం చేస్తుంది, రోజంతా అతని 1,000 నామాలు (విష్ణు సహస్రనామం) నిరంతరం జపిస్తారు.",
      why: "శ్రీవారు జయంతి దైవం దూరంగా ఉండటానికి బదులుగా సాధారణ ప్రజలకు దగ్గరగా రావడాన్ని ఎంచుకుందని, ఎంత ముఖ్యమైనవారైనా లేదా సాధారణమైనవారైనా ఎవరైనా పిలిచి వినిపించుకోగలరని గుర్తుచేస్తుంది.",
      shlokaSanskrit: "कौसल्या सुप्रजा राम पूर्वा सन्ध्या प्रवर्तते ।\nउत्तिष्ठ नरशार्दूल कर्तव्यं दैवमाह्निकम् ॥",
      shlokaTranslit: "కౌసల్యా సుప్రజా రామ పూర్వా సంధ్యా ప్రవర్తతే,\nఉత్తిష్ఠ నరశార్దూల కర్తవ్యం దైవమాహ్నికం",
      shlokaMeaning: "ఓ కౌసల్య శ్రేష్ఠ పుత్రుడైన రామా, ఉదయపు సంధ్య వచ్చింది. దయచేసి మేల్కొనుము, ఓ నరశ్రేష్ఠుడా, నీ పవిత్ర దైనందిన కర్తవ్యాలను నిర్వర్తించుము. (ఈ ఉదయపు శ్లోకం తిరుమలలో ప్రతిరోజూ పాడబడుతుంది, భగవానుడిని రోజు కోసం మేల్కొల్పే స్వాగత గీతం.)",

    ta: {
      title: "ஸ்ரீவாரு ஜயந்தி",
      sub: "வெங்கடேஸ்வரரின் தோற்ற நாள்",
      story: "'ஸ்ரீவாரு' என்பது தென்னிந்தியாவில் கோயிலின் முதன்மை தெய்வமான வெங்கடேஸ்வரரை மரியாதையுடன் குறிப்பிடும் வழி, இந்த யுகத்தில் பக்தர்களை ஆசீர்வதிக்கவும் பாதுகாக்கவும் திருமலை மலைகளில் பூமியில் தோன்றியதாக நம்பப்படும் விஷ்ணுவின் வடிவம். ஸ்ரீவாரு ஜயந்தி இறைவனின் தோற்ற நாளைக் கொண்டாடுகிறது, தொலைவில் உள்ள சொர்க்கத்தில் மட்டும் இருப்பதற்குப் பதிலாக, மனமார்ந்து வரும் எவருக்கும் அணுகக்கூடியதாக, தன் பக்தர்களுக்கு நெருக்கமாக இருக்க அவர் இந்த குறிப்பிட்ட வடிவில் வெளிப்படுவதைத் தேர்ந்தெடுத்தபோது.",
      temple: "கோயில் முதன்மை தெய்வத்திற்கு ஒரு பெரிய அபிஷேகமும் சிறப்பு அலங்காரமும் செய்கிறது, நாள் முழுவதும் அவரது 1,000 நாமங்கள் (விஷ்ணு சஹஸ்ரநாமம்) தொடர்ந்து ஓதப்படுகின்றன.",
      why: "ஸ்ரீவாரு ஜயந்தி தெய்வீகம் தொலைவில் இருப்பதற்குப் பதிலாக சாதாரண மக்களுக்கு நெருக்கமாக வர தேர்ந்தெடுத்தது என்றும், எவ்வளவு முக்கியமானவராக அல்லது சாதாரணமானவராக இருந்தாலும் யாரும் அழைத்து கேட்கப்படலாம் என்றும் நினைவூட்டுகிறது.",
      shlokaSanskrit: "कौसल्या सुप्रजा राम पूर्वा सन्ध्या प्रवर्तते ।\nउत्तिष्ठ नरशार्दूल कर्तव्यं दैवमाह्निकम् ॥",
      shlokaTranslit: "கௌஸல்யா ஸுப்ரஜா ராம பூர்வா ஸந்த்யா ப்ரவர்ததே,\nஉத்திஷ்ட நரசார்தூல கர்தவ்யம் தைவமாஹ்நிகம்",
      shlokaMeaning: "கௌசல்யையின் சிறந்த மகனான ராமா, காலை அந்தி வந்துவிட்டது. தயவுசெய்து விழித்திரு, மனிதர்களில் புலியே, உனது புனித தினசரி கடமைகளைச் செய்யுங்கள். (இந்த காலை ஸ்லோகம் திருமலையில் தினமும் பாடப்படுகிறது, இறைவனை நாளுக்கு எழுப்பும் வரவேற்பு பாடலாக.)",
      quiz: [
        {q:"'ஸ்ரீவாரு' மரியாதையுடன் எதைக் குறிக்கிறது?", opts:["வெங்கடேஸ்வரர்","ஒரு வகை பூசாரி","ஒரு திருவிழா உணவு"], a:0},
        {q:"வெங்கடேஸ்வரர் எங்கு தோன்றியதாக நம்பப்படுகிறது?", opts:["திருமலை மலைகள்","இமயமலை","கடல்"], a:0},
        {q:"ஸ்ரீவாரு ஜயந்தியின்போது தொடர்ந்து எது ஓதப்படுகிறது?", opts:["விஷ்ணு சஹஸ்ரநாமம், அவரது 1,000 நாமங்கள்","மளிகை பட்டியல்","பருவங்களைப் பற்றிய கவிதை"], a:0},
        {q:"ஸ்ரீவாரு ஜயந்தி இறைவனைப் பற்றி நமக்கு என்ன நினைவூட்டுகிறது?", opts:["இது எப்போதும் தொலைவில் இருக்கும்","இது சாதாரண பக்தர்களுக்கு நெருக்கமாக வர தேர்ந்தெடுத்தது","இது ஒரு முறை மட்டுமே தோன்றும்"], a:1}
      ]
    }
  },

    te: {
      title: "స్కంద షష్ఠి",
      sub: "సూరపద్మన రాక్షసుడిపై సుబ్రహ్మణ్యుని విజయం",
      story: "సూరపద్మన అనే శక్తివంతమైన రాక్షసుడు సంవత్సరాల తపస్సు ద్వారా అపారమైన శక్తిని పొందాడు, అతను మూడు లోకాలలో భీభత్సం సృష్టించడం ప్రారంభించాడు, దేవతలు కూడా భయంతో పారిపోయేంతగా. అటువంటి శక్తివంతమైన రాక్షసుడిని ఓడించడానికి, దేవతలకు ఈ పనికి ప్రత్యేకంగా జన్మించిన యోధుడు అవసరమయ్యాడు, కాబట్టి శివుడు, పార్వతీదేవి కుమారుడు స్కందుడు, సుబ్రహ్మణ్యుడు, మురుగన్, లేదా కార్తికేయుడు అని కూడా పిలువబడేవాడు, శక్తివంతమైన ఆరు ముఖాల యోధ దేవుడిగా జన్మించాడు, అతని తల్లి అతనికి వేల్ అనే శక్తివంతమైన ఈటెను ఇచ్చింది. స్కందుడు దేవతల సైన్యాలను ఆరు రోజుల పాటు యుద్ధంలో నడిపించాడు, ఆరవ రోజు, స్కంద షష్ఠి అని పిలువబడే రోజున, అతను చివరకు సూరపద్మనుడిని ఓడించి మూడు లోకాలలో శాంతిని పునరుద్ధరించాడు.",
      temple: "దేవాలయం సుబ్రహ్మణ్యునికి ఆరు రోజుల ప్రత్యేక ప్రార్థనలు నిర్వహిస్తుంది, ఆరవ రోజున సూరసంహారం అనే గొప్ప యుద్ధాన్ని పునరాభినయనం చేయడంతో ముగుస్తుంది, రాక్షసుని ఓటమిని జరుపుకుంటూ.",
      why: "స్కంద షష్ఠి, మనం ధైర్యంగా, సిద్ధంగా, సరైనదాని కోసం నిలబడటానికి సిద్ధంగా ఉన్నప్పుడు అత్యంత కష్టతరమైన సమస్యలను కూడా పరిష్కరించవచ్చని గుర్తుచేస్తుంది, కోపంతో కాక ధైర్యం, ఉద్దేశ్యంతో మార్గనిర్దేశం చేయబడి.",
      shlokaSanskrit: "षडाननं चन्दनलेपिताङ्गं महोरसं दिव्यमयूरवाहनम् ।\nरुद्रस्य सूनुं सुरसैन्यनाथं गुहं सदाऽहं शरणं प्रपद्ये ॥",
      shlokaTranslit: "షడాననం చందనలేపితాంగం మహోరసం దివ్యమయూరవాహనం,\nరుద్రస్య సూనుం సురసైన్యనాథం గుహం సదాఽహం శరణం ప్రపద్యే",
      shlokaMeaning: "నేను ఎల్లప్పుడూ గుహ (స్కందుడు) శరణు వేడుకుంటాను, ఆరు ముఖాలు కలిగిన, చందనం పూసిన శరీరం కలిగిన, విశాలమైన వక్షస్థలం కలిగిన, దివ్య నెమలిపై స్వారీ చేసే, రుద్రుని (శివుని) కుమారుడైన, దేవతల సైన్యానికి అధిపతి అయిన వాడు.",
      quiz: [

        {q:"యుద్ధంలో ఏ రోజున స్కందుడు చివరకు రాక్షసుడిని ఓడించాడు?", opts:["మొదటి రోజు","ఆరవ రోజు","పదవ రోజు"], a:1}

    ta: {
      title: "ஸ்கந்த சஷ்டி",
      sub: "சூரபத்மன் அசுரனை சுப்ரமணியன் வெற்றி கொண்டது",
      story: "சூரபத்மன் என்ற சக்திவாய்ந்த அசுரன் பல ஆண்டுகள் தவம் செய்து அபார சக்தியைப் பெற்றான், அவன் மூன்று உலகங்களையும் பயமுறுத்தத் தொடங்கினான், தேவர்களே பயந்து ஓடும் அளவிற்கு. அத்தகைய சக்திவாய்ந்த அசுரனை வெல்ல, தேவர்களுக்கு இந்த பணிக்காக சிறப்பாக பிறந்த ஒரு போர்வீரன் தேவைப்பட்டான், எனவே சிவனும் பார்வதி தேவியும் மகனான ஸ்கந்தன், சுப்ரமணியன், முருகன், அல்லது கார்த்திகேயன் என்றும் அழைக்கப்படுபவன், ஒரு சக்திவாய்ந்த ஆறு முக போர் தெய்வமாக பிறந்தான், அவனது தாய் அவனுக்கு வேல் என்ற சக்திவாய்ந்த ஈட்டியை அளித்தாள். ஸ்கந்தன் தேவர்களின் படைகளை ஆறு நாட்கள் போரில் வழிநடத்தினான், ஆறாம் நாள், ஸ்கந்த சஷ்டி என்று அழைக்கப்படும் நாளில், அவன் இறுதியில் சூரபத்மனை வென்று மூன்று உலகங்களிலும் அமைதியை மீட்டெடுத்தான்.",
      temple: "கோயில் சுப்ரமணியனுக்கு ஆறு நாட்கள் சிறப்பு பிரார்த்தனைகளை நடத்துகிறது, ஆறாம் நாளில் சூரசம்ஹாரம் என்ற பெரிய போரை மீண்டும் நடித்துக் காட்டுவதுடன் முடிவடைகிறது, அசுரனின் தோல்வியைக் கொண்டாடுகிறது.",
      why: "ஸ்கந்த சஷ்டி, நாம் தைரியமாக, தயாராக, சரியானதற்காக நிற்கத் தயாராக இருக்கும்போது மிகக் கடினமான பிரச்சனைகளையும் தீர்க்க முடியும் என்பதை நினைவூட்டுகிறது, கோபத்தால் அல்ல, தைரியம் மற்றும் நோக்கத்தால் வழிநடத்தப்பட்டு.",
      shlokaSanskrit: "षडाननं चन्दनलेपिताङ्गं महोरसं दिव्यमयूरवाहनम् ।\nरुद्रस्य सूनुं सुरसैन्यनाथं गुहं सदाऽहं शरणं प्रपद्ये ॥",
      shlokaTranslit: "ஷடானனம் சந்தனலேபிதாங்கம் மஹோரஸம் திவ்யமயூரவாஹனம்,\nருத்ரஸ்ய ஸூனும் ஸுரஸைன்யநாதம் குஹம் ஸதாஹம் சரணம் ப்ரபத்யே",
      shlokaMeaning: "நான் எப்போதும் குஹனிடம் (ஸ்கந்தன்) சரணடைகிறேன், ஆறு முகங்களைக் கொண்டவனும், சந்தனம் பூசிய உடலைக் கொண்டவனும், அகன்ற மார்பைக் கொண்டவனும், தெய்வீக மயிலில் சவாரி செய்பவனும், ருத்திரனின் (சிவனின்) மகனும், தேவர்களின் படைத் தலைவனுமான அவனிடம்.",
      quiz: [
        {q:"ஸ்கந்தன் எந்த சக்திவாய்ந்த அசுரனை வெல்ல வேண்டியிருந்தது?", opts:["இராவணன்","சூரபத்மன்","நரகாசுரன்"], a:1},
        {q:"ஸ்கந்தனின் தாய் அவனுக்கு எந்த ஆயுதத்தை அளித்தாள்?", opts:["வில்","வேல் என்ற ஈட்டி","வாள்"], a:1},
        {q:"ஸ்கந்தனின் வலிமைமிக்க வடிவத்தில் எத்தனை முகங்கள் உள்ளன?", opts:["இரண்டு","நான்கு","ஆறு"], a:2},
        {q:"போரின் எந்த நாளில் ஸ்கந்தன் இறுதியாக அசுரனை வென்றான்?", opts:["முதல் நாள்","ஆறாம் நாள்","பத்தாம் நாள்"], a:1}
      ]
    }

    te: {
      title: "అయ్యప్ప మండల కాలం ఆరంభం",
      sub: "అయ్యప్ప స్వామి భక్తుల కోసం 41-రోజుల వ్రతం ప్రారంభం",
      story: "అయ్యప్ప స్వామి శివుడు, మోహిని (విష్ణువు ధరించిన స్త్రీ రూపం) కుమారుడిగా నమ్ముతారు, మహిషి అనే శక్తివంతమైన గేదె-రాక్షసిని ఓడించడానికి జన్మించాడు. అతన్ని శిశువుగా కనుగొన్న దయగల రాజుచే పెంచబడిన అయ్యప్ప పెరిగి గొప్ప యోధుడయ్యాడు, చివరికి బ్రహ్మచారి యోగిగా ఉండాలని ఎంచుకున్నాడు, శబరిమల కొండలలో ధ్యానం చేస్తూ, కులం లేదా నేపథ్యంతో సంబంధం లేకుండా హృదయపూర్వకమైన భక్తితో వచ్చిన ఎవరినైనా ఆశీర్వదిస్తూ. ప్రతి సంవత్సరం ఈ రోజున, శబరిమల పవిత్ర యాత్ర చేయాలనుకునే భక్తులు మండల వ్రతం అనే కఠినమైన 41-రోజుల వ్రతాన్ని ప్రారంభిస్తారు, సాధారణ నలుపు లేదా నీలం వస్త్రాలు ధరించి, విలాసాలకు దూరంగా ఉండి, ప్రార్థన కోసం త్వరగా మేల్కొని, సాధారణంగా జీవిస్తూ, రాబోయే యాత్ర కోసం తమ మనసు, శరీరాన్ని సిద్ధం చేసుకుంటారు.",
      temple: "దేవాలయం మండల కాలం ప్రారంభాన్ని సూచించడానికి ఒక ప్రత్యేక వేడుక నిర్వహిస్తుంది, వ్రతానికి సిద్ధమవుతున్న భక్తులు పూర్తి 41 రోజుల పాటు ధరించడానికి ఆశీర్వదించబడిన మాలను పొందుతారు.",
      why: "మండల వ్రతం నిజంగా అర్థవంతమైనది ఏదైనా చేరుకోవడం, అది యాత్ర అయినా, లక్ష్యమైనా, లేదా మనలో మార్పైనా, సాధారణంగా ఒకే ప్రయత్నం నుండి కాక నిజమైన క్రమశిక్షణ, సహనం నుండి వస్తుందని గుర్తుచేస్తుంది.",
      shlokaSanskrit: "स्वामिये शरणम् अय्यप्पा",
      shlokaTranslit: "స్వామియే శరణం అయ్యప్పా",
      shlokaMeaning: "ఓ అయ్యప్ప స్వామీ, నేను నీ శరణు వేడుతున్నాను. ఈ సరళమైన, శక్తివంతమైన నినాదాన్ని యాత్రికులు శబరిమలకు వారి పూర్తి ప్రయాణంలో పలుకుతారు.",
      quiz: [

    ta: {
      title: "அய்யப்பன் மண்டல காலம் தொடக்கம்",
      sub: "அய்யப்பன் பக்தர்களுக்கான 41-நாள் விரதத்தின் தொடக்கம்",
      story: "அய்யப்பன் சிவனுக்கும் மோகினிக்கும் (விஷ்ணு எடுத்த பெண் வடிவம்) மகனாக நம்பப்படுகிறார், மகிஷி என்ற சக்திவாய்ந்த எருமை-அசுரியை வெல்ல பிறந்தார். அவரை குழந்தையாகக் கண்டெடுத்த ஒரு கருணையுள்ள அரசனால் வளர்க்கப்பட்ட அய்யப்பன், வளர்ந்து ஒரு பெரிய போர்வீரனானார், இறுதியில் ஒரு பிரம்மச்சாரி யோகியாக இருக்க தேர்ந்தெடுத்தார், சபரிமலை மலைகளில் தியானம் செய்து, சாதி அல்லது பின்னணி எதுவாக இருந்தாலும் மனமார்ந்த பக்தியுடன் வரும் எவரையும் ஆசீர்வதித்தார். ஒவ்வொரு ஆண்டும் இந்நாளில், சபரிமலைக்கு புனித யாத்திரை செய்ய விரும்பும் பக்தர்கள் மண்டல விரதம் என்ற கடுமையான 41-நாள் விரதத்தைத் தொடங்குகிறார்கள், எளிய கருப்பு அல்லது நீல ஆடைகள் அணிந்து, ஆடம்பரங்களைத் தவிர்த்து, பிரார்த்தனைக்காக அதிகாலையில் எழுந்து, எளிமையாக வாழ்ந்து, முன்னிருக்கும் யாத்திரைக்காக தங்கள் மனதையும் உடலையும் தயார் செய்கிறார்கள்.",
      temple: "கோயில் மண்டல காலத்தின் தொடக்கத்தைக் குறிக்க ஒரு சிறப்பு விழாவை நடத்துகிறது, விரதத்திற்குத் தயாராகும் பக்தர்கள் முழு 41 நாட்களும் அணிய ஆசிர்வதிக்கப்பட்ட மாலையைப் பெறுகிறார்கள்.",
      why: "மண்டல விரதம், உண்மையிலேயே அர்த்தமுள்ள எதையும் அடைவது, அது யாத்திரையாக இருந்தாலும், இலக்காக இருந்தாலும், அல்லது நம்மில் ஒரு மாற்றமாக இருந்தாலும், பொதுவாக ஒரே ஒரு தருணத்தின் முயற்சியிலிருந்து அல்ல, உண்மையான ஒழுக்கம் மற்றும் பொறுமையிலிருந்து வருகிறது என்பதை நினைவூட்டுகிறது.",
      shlokaSanskrit: "स्वामिये शरणम् अय्यप्पा",
      shlokaTranslit: "ஸ்வாமியே சரணம் ஐயப்பா",
      shlokaMeaning: "ஓ அய்யப்ப சுவாமி, நான் உன்னிடம் சரணடைகிறேன். இந்த எளிய, சக்திவாய்ந்த முழக்கம் யாத்ரீகர்களால் சபரிமலைக்கு அவர்களின் முழு பயணத்திலும் சொல்லப்படுகிறது.",
      quiz: [

        {q:"மண்டல விரதம் எத்தனை நாள் விரதம்?", opts:["7 நாட்கள்","41 நாட்கள்","100 நாட்கள்"], a:1},
        {q:"மண்டல விரதத்தின்போது பக்தர்கள் என்ன செய்கிறார்கள்?", opts:["எளிமையாக வாழ்வது, பிரார்த்திப்பது, ஆடம்பரங்களைத் தவிர்ப்பது","இனிப்புகள் மட்டும் சாப்பிடுவது","உலகம் முழுவதும் பயணிப்பது"], a:0}

let currentLang = 'en';
let currentFest = 'janmashtami';
let quizState = {};

// Pick the current calendar year's data if available, otherwise fall back
// to the most recent year we have data for (so the app never breaks even
// if a year's dates haven't been added yet).
const availableYears = Object.keys(DATES).sort();
const thisYear = String(new Date().getFullYear());
const currentYear = DATES[thisYear] ? thisYear : availableYears[availableYears.length - 1];
const yearDates = DATES[currentYear];

function buildFestivalDropdown(){
  const select = document.getElementById('festSelect');
  const keys = Object.keys(DATA);
  const sorted = keys.slice().sort((a, b) => {
    const sa = (yearDates[a] && yearDates[a].sort) || '99-99';
    const sb = (yearDates[b] && yearDates[b].sort) || '99-99';
    return sa.localeCompare(sb);
  });
  select.innerHTML = sorted.map(k => {
    const langForFest = DATA[k][currentLang] ? currentLang : 'en';
    const title = DATA[k][langForFest].title;
    const dateStr = yearDates[k] ? yearDates[k].display : '';
    const selected = k === currentFest ? ' selected' : '';
    return `<option value="${k}"${selected}>${dateStr}: ${title}</option>`;
  }).join('');

  const label = document.getElementById('calendarYearLabel');
  label.textContent = `Festival Calendar, ${currentYear}`;
}

function render(){
  const langForFest = DATA[currentFest][currentLang] ? currentLang : 'en';
  const f = DATA[currentFest][langForFest];
  const ui = UI_STRINGS[langForFest];
  const root = document.getElementById('cardRoot');
  root.setAttribute('lang', langForFest);

  if(!quizState[currentFest+langForFest]){
    quizState[currentFest+langForFest] = { answered: new Array(f.quiz.length).fill(false), correctCount: 0 };
  }
  const qs = quizState[currentFest+langForFest];
  const allAnswered = qs.answered.every(a=>a);

  let quizHtml = f.quiz.map((item, i) => {
    const optsHtml = item.opts.map((opt, j) => {
      let cls = 'opt';
      let disabled = qs.answered[i] ? 'disabled' : '';
      if(qs.answered[i]){
        if(j === item.a) cls += ' correct';
        else if(qs.selected && qs.selected[i] === j) cls += ' wrong';
      }
      return `<button class="${cls}" ${disabled} onclick="answerQuiz(${i},${j})">${opt}</button>`;
    }).join('');
    return `<div class="quiz-q">
      <p class="qtext">${i+1}. ${item.q}</p>
      <div class="opts">${optsHtml}</div>
    </div>`;
  }).join('');

  root.innerHTML = `
    <div class="icon-wrap">${ICONS[currentFest]}</div>
    <p class="festival-title">${f.title}</p>
    <p class="festival-sub">${f.sub}</p>

    <div class="section">
      <div class="section-label">${ui.story}<span class="rule"></span></div>
      <p>${f.story}</p>
    </div>

    <div class="section">
      <div class="section-label">${ui.temple}<span class="rule"></span></div>
      <p>${f.temple}</p>
    </div>

    <div class="section">
      <div class="section-label">${ui.why}<span class="rule"></span></div>
      <p>${f.why}</p>
    </div>

    <div class="section">
      <div class="section-label">${ui.shloka}<span class="rule"></span></div>
      <div class="shloka-box">
        <p class="shloka-sanskrit">${f.shlokaSanskrit.replace(/\n/g,'<br>')}</p>
        ${f.shlokaTranslit ? `<p class="shloka-translit">${f.shlokaTranslit.replace(/\n/g,'<br>')}</p>` : ''}
        <p class="shloka-meaning">${f.shlokaMeaning}</p>
      </div>
    </div>

    <div class="section">
      <div class="section-label">${ui.quiz}<span class="rule"></span></div>
      ${quizHtml}
      <div class="quiz-score ${allAnswered ? 'show' : ''}">${ui.scorePrefix} ${qs.correctCount}/${f.quiz.length} ${ui.scoreSuffix}</div>
      ${allAnswered ? `<button class="reset-btn" onclick="resetQuiz()">${ui.tryAgain}</button>` : ''}
    </div>
  `;
}

function answerQuiz(qIndex, optIndex){
  const langForFest = DATA[currentFest][currentLang] ? currentLang : 'en';
  const key = currentFest+langForFest;
  const qs = quizState[key];
  if(qs.answered[qIndex]) return;
  qs.answered[qIndex] = true;
  if(!qs.selected) qs.selected = {};
  qs.selected[qIndex] = optIndex;
  if(optIndex === DATA[currentFest][langForFest].quiz[qIndex].a){
    qs.correctCount++;
  }
  render();
}

function resetQuiz(){
  const langForFest = DATA[currentFest][currentLang] ? currentLang : 'en';
  quizState[currentFest+langForFest] = { answered: new Array(DATA[currentFest][langForFest].quiz.length).fill(false), correctCount: 0, selected: {} };
  render();
}

document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    buildFestivalDropdown();
    render();
  });
});

document.getElementById('festSelect').addEventListener('change', (e)=>{
  currentFest = e.target.value;
  render();
});

buildFestivalDropdown();
render();
</script>
